<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#111422;
  border-right:1px solid #00ffdd;
  padding:10px;
}
.user{
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
.user:hover{background:#1a1f35;}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}
#header{
  padding:10px;
  border-bottom:1px solid #00ffdd;
}
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGES */
.msg{
  max-width:70%;
  padding:8px;
  margin-bottom:10px;
  border-radius:8px;
}
.me{
  background:#00ffdd;
  color:black;
  margin-left:auto;
}
.other{
  background:#111422;
}
.meta{
  font-size:10px;
  opacity:0.7;
}

/* INPUT */
#inputBox{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #00ffdd;
}
input{
  flex:1;
  padding:8px;
}
button{
  background:#00ffdd;
  border:none;
  padding:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>🟢 Users</h3>
  <div id="usersList"></div>
  <hr>
  <button onclick="goGlobal()">🌐 Global Chat</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="header">Global Chat</div>
  <div id="messages"></div>
  <div id="inputBox">
    <input id="msg" placeholder="Type message...">
    <button id="send">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* ✅ Firebase Config */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* STATE */
let currentUser, username;
let currentChat = "global";
let currentDMUser = null;
let unsubscribe = null;

/* ELEMENTS */
const usersList = document.getElementById("usersList");
const messagesDiv = document.getElementById("messages");
const header = document.getElementById("header");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    alert("Session expired. Login again.");
    return location.href="index.html";
  }

  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);

  username = snap.exists()
    ? snap.data().username
    : user.email.split("@")[0];

  await updateDoc(userRef,{
    online:true,
    lastSeen:serverTimestamp()
  });

  loadUsers();
  startGlobal();
});

/* LOAD USERS */
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    usersList.innerHTML="";

    snap.forEach(d=>{
      if(d.id===currentUser.uid) return;

      const data=d.data();

      const div=document.createElement("div");
      div.className="user";

      div.innerHTML=`
        <span>${data.username}</span>
        <span>${data.online?"🟢":"⚫"}</span>
      `;

      div.onclick=()=>{
        currentChat="dm";
        currentDMUser=d.id;
        header.innerText="DM: "+data.username;
        startDM();
      };

      usersList.appendChild(div);
    });
  });
}

/* CHAT ID */
function getChatId(a,b){
  return [a,b].sort().join("_");
}

/* GLOBAL CHAT */
function startGlobal(){
  if(unsubscribe) unsubscribe();

  const q=query(collection(db,"messages"),orderBy("timestamp"));

  unsubscribe=onSnapshot(q, snap=>{
    messagesDiv.innerHTML="";

    snap.forEach(docSnap=>{
      const d=docSnap.data();
      if(d.type!=="global") return;
      renderMessage(d);
    });
  });
}

/* DM CHAT */
function startDM(){
  if(unsubscribe) unsubscribe();

  const chatId=getChatId(currentUser.uid,currentDMUser);

  const q=query(collection(db,"messages"),orderBy("timestamp"));

  unsubscribe=onSnapshot(q, snap=>{
    messagesDiv.innerHTML="";

    snap.forEach(docSnap=>{
      const d=docSnap.data();
      if(d.chatId!==chatId) return;

      renderMessage(d);

      // mark as read
      if(d.to===currentUser.uid && !d.read){
        updateDoc(doc(db,"messages",docSnap.id),{read:true});
      }
    });
  });
}

/* RENDER */
function renderMessage(d){
  const div=document.createElement("div");
  div.className="msg "+(d.sender===currentUser.uid?"me":"other");

  div.innerHTML=`
    ${d.text}
    <div class="meta">
      ${d.sender===currentUser.uid ? (d.read?"Seen":"Sent") : ""}
    </div>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop=messagesDiv.scrollHeight;
}

/* SEND MESSAGE */
document.getElementById("send").onclick = sendMessage;

function sendMessage(){
  const input=document.getElementById("msg");
  const text=input.value.trim();

  if(text==="") return;

  // GLOBAL
  if(currentChat==="global"){
    addDoc(collection(db,"messages"),{
      type:"global",
      text,
      username,
      sender:currentUser.uid,
      timestamp:serverTimestamp()
    })
    .catch(err=>alert("Error: "+err.message));
  }

  // DM
  if(currentChat==="dm"){
    if(!currentDMUser){
      alert("Select a user first");
      return;
    }

    const chatId=getChatId(currentUser.uid,currentDMUser);

    addDoc(collection(db,"messages"),{
      type:"dm",
      chatId,
      text,
      username,
      sender:currentUser.uid,
      to:currentDMUser,
      read:false,
      timestamp:serverTimestamp()
    })
    .catch(err=>alert("Error: "+err.message));
  }

  input.value="";
}

/* ENTER KEY */
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

/* GLOBAL BUTTON */
window.goGlobal=()=>{
  currentChat="global";
  currentDMUser=null;
  header.innerText="Global Chat";
  startGlobal();
};

/* OFFLINE FIX */
window.addEventListener("beforeunload", async ()=>{
  if(currentUser){
    await updateDoc(doc(db,"users",currentUser.uid),{
      online:false
    });
  }
});
</script>

</body>
</html>
