<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Chat | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#0b0f1a;
  color:#00ffdd;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:260px;
  background:#111422;
  border-right:1px solid #00ffdd;
  display:flex;
  flex-direction:column;
}

#sidebar h3{
  margin:10px;
}

#usersList{
  flex:1;
  overflow-y:auto;
}

.user{
  padding:12px;
  border-bottom:1px solid #1a1f35;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.user:hover{ background:#1a1f35; }

.badge{
  background:red;
  color:white;
  border-radius:50%;
  padding:2px 6px;
  font-size:10px;
}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header{
  padding:15px;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
}

/* MESSAGES */
#messages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* CHAT BUBBLES */
.msg{
  max-width:70%;
  padding:10px;
  border-radius:10px;
}

.me{
  align-self:flex-end;
  background:#00ffdd;
  color:black;
}

.other{
  align-self:flex-start;
  background:#111422;
  border:1px solid #00ffdd;
}

/* INPUT */
#inputBox{
  display:flex;
  gap:10px;
  padding:10px;
  border-top:1px solid #00ffdd;
}

input{
  flex:1;
  padding:10px;
  background:#0b0f1a;
  color:#00ffdd;
  border:1px solid #00ffdd;
  border-radius:6px;
}

button{
  background:#00ffdd;
  color:black;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}
button:hover{ background:#ff6600; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>💬 Inbox</h3>
  <div id="usersList"></div>
  <button id="globalBtn">🌐 Global</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="header">
    <span id="chatTitle">Global Chat</span>
  </div>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message...">
    <button id="send">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const auth = getAuth();
const db = getFirestore();

let currentUser, username;
let currentChat="global";
let currentDMUser=null;

const usersList = document.getElementById("usersList");
const messagesDiv = document.getElementById("messages");
const chatTitle = document.getElementById("chatTitle");
const input = document.getElementById("msg");

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser=user;

  const snap = await getDoc(doc(db,"users",user.uid));
  username = snap.exists()?snap.data().username:user.email;

  loadInbox();
  listenMessages();
});

/* GET CHAT ID */
function getChatId(a,b){
  return [a,b].sort().join("_");
}

/* INBOX */
function loadInbox(){
  onSnapshot(collection(db,"messages"), snap=>{
    const map={};

    snap.forEach(docSnap=>{
      const d=docSnap.data();

      if(d.type!=="dm") return;

      const other = d.sender===currentUser.uid ? d.to : d.sender;
      if(!other) return;

      if(!map[other]){
        map[other]={count:0};
      }

      if(!d.readBy || !d.readBy.includes(currentUser.uid)){
        map[other].count++;
      }
    });

    usersList.innerHTML="";

    Object.keys(map).forEach(uid=>{
      const div=document.createElement("div");
      div.className="user";

      div.innerHTML = `
        <span>${uid}</span>
        ${map[uid].count>0 ? `<span class="badge">${map[uid].count}</span>`:""}
      `;

      div.onclick=()=>{
        currentChat="dm";
        currentDMUser=uid;
        chatTitle.innerText="DM: "+uid;
        listenMessages();
      };

      usersList.appendChild(div);
    });
  });
}

/* LISTEN MESSAGES */
function listenMessages(){
  const q = query(collection(db,"messages"), orderBy("timestamp"));

  onSnapshot(q, snap=>{
    messagesDiv.innerHTML="";

    snap.forEach(docSnap=>{
      const d=docSnap.data();

      if(currentChat==="global" && d.type!=="global") return;

      if(currentChat==="dm"){
        const id=getChatId(currentUser.uid,currentDMUser);
        if(d.chatId!==id) return;
      }

      const div=document.createElement("div");
      const isMe=d.sender===currentUser.uid;

      div.className="msg "+(isMe?"me":"other");

      div.innerHTML = `
        ${!isMe ? `<b>${d.username}</b><br>`:""}
        ${d.text}
      `;

      messagesDiv.appendChild(div);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

/* SEND */
document.getElementById("send").onclick = async()=>{
  const text=input.value.trim();
  if(!text) return;

  if(currentChat==="global"){
    await addDoc(collection(db,"messages"),{
      type:"global",
      text, username,
      sender:currentUser.uid,
      timestamp:serverTimestamp()
    });
  }

  if(currentChat==="dm"){
    await addDoc(collection(db,"messages"),{
      type:"dm",
      chatId:getChatId(currentUser.uid,currentDMUser),
      text, username,
      sender:currentUser.uid,
      to:currentDMUser,
      timestamp:serverTimestamp(),
      readBy:[currentUser.uid]
    });
  }

  input.value="";
};

/* ENTER KEY */
input.addEventListener("keypress", e=>{
  if(e.key==="Enter") document.getElementById("send").click();
});

/* GLOBAL */
document.getElementById("globalBtn").onclick=()=>{
  currentChat="global";
  currentDMUser=null;
  chatTitle.innerText="Global Chat";
  listenMessages();
};
</script>

</body>
</html>
