
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Chat | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#05070d;
  color:#00ffdd;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
#sidebar{
  width:230px;
  background:#0b0f1a;
  border-right:1px solid #00ffdd;
  padding:10px;
  overflow-y:auto;
}
.user{
  padding:8px;
  cursor:pointer;
  border-bottom:1px solid #111;
}
.user:hover{background:#111;}
.online{color:#00ff99}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header{
  padding:10px;
  border-bottom:1px solid #00ffdd;
  background:#0b0f1a;
}

/* MESSAGES */
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin-bottom:10px;
  padding:8px;
  background:#0b0f1a;
  border-left:3px solid #00ffdd;
}

/* INPUT */
#inputBox{
  display:flex;
  gap:5px;
  padding:10px;
  border-top:1px solid #00ffdd;
  background:#0b0f1a;
}
#msg{
  flex:1;
  padding:10px;
  background:black;
  color:#00ffdd;
  border:1px solid #00ffdd;
}
button{
  background:#00ffdd;
  border:none;
  padding:10px;
  cursor:pointer;
}
button:hover{
  background:#ff6600;
}

/* TERMINAL EFFECT */
#messages::after{
  content:"_";
  animation:blink 1s infinite;
}
@keyframes blink{
  0%{opacity:0}
  50%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>🟢 Users</h3>
  <div id="users"></div>
  <hr>
  <button id="globalBtn">🌐 Global Chat</button>
</div>

<div id="main">

  <div id="header">Global Chat</div>

  <div id="messages"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message...">
    <button id="send">Send</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth();
const db = getFirestore();

/* STATE */
let currentUser;
let username = "Hacker";
let currentChat = "global";
let dmTarget = null;

/* ELEMENTS */
const messagesDiv = document.getElementById("messages");
const usersDiv = document.getElementById("users");
const header = document.getElementById("header");

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;

  // FIX: ALWAYS GET USERNAME FROM FIRESTORE
  const snap = await getDoc(doc(db,"users",user.uid));
  if(snap.exists()){
    username = snap.data().username || "Hacker";
  }

  loadUsers();
  loadMessages();
});

/* LOAD USERS */
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    usersDiv.innerHTML="";
    snap.forEach(docSnap=>{
      if(docSnap.id === currentUser.uid) return;

      const data = docSnap.data();

      const div = document.createElement("div");
      div.className="user online";
      div.innerText = data.username;

      div.onclick = ()=>{
        currentChat="dm";
        dmTarget = docSnap.id;
        header.innerText = "DM: " + data.username;
        loadMessages();
      };

      usersDiv.appendChild(div);
    });
  });
}

/* CHAT ID */
function getChatId(a,b){
  return [a,b].sort().join("_");
}

/* LOAD MESSAGES */
let unsubscribe;

function loadMessages(){
  if(unsubscribe) unsubscribe();

  const q = query(collection(db,"messages"), orderBy("timestamp"));

  unsubscribe = onSnapshot(q, snap=>{
    messagesDiv.innerHTML="";

    snap.forEach(docSnap=>{
      const m = docSnap.data();

      if(currentChat==="global" && m.type!=="global") return;

      if(currentChat==="dm"){
        const chatId = getChatId(currentUser.uid, dmTarget);
        if(m.chatId !== chatId) return;
      }

      const div = document.createElement("div");
      div.className="msg";
      div.innerHTML = "<b>"+m.username+"</b>: "+m.text;

      messagesDiv.appendChild(div);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

/* SEND MESSAGE */
document.getElementById("send").onclick = async ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text) return;

  // 🤖 AI BOT
  if(text.toLowerCase().includes("help")){
    await addDoc(collection(db,"messages"),{
      type:"global",
      username:"🤖 AI",
      text:"Try solving stages or ask about hacking basics.",
      timestamp:serverTimestamp()
    });
  }

  if(currentChat==="global"){
    await addDoc(collection(db,"messages"),{
      type:"global",
      username,
      text,
      sender:currentUser.uid,
      timestamp:serverTimestamp()
    });
  }

  if(currentChat==="dm"){
    await addDoc(collection(db,"messages"),{
      type:"dm",
      chatId:getChatId(currentUser.uid,dmTarget),
      username,
      text,
      sender:currentUser.uid,
      timestamp:serverTimestamp()
    });
  }

  document.getElementById("msg").value="";
};

/* ENTER SEND */
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") document.getElementById("send").click();
});

/* GLOBAL BTN */
document.getElementById("globalBtn").onclick = ()=>{
  currentChat="global";
  dmTarget=null;
  header.innerText="Global Chat";
  loadMessages();
};
</script>

</body>
</html>
