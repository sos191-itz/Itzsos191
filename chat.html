<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs Chat</title>
<!-- Favicon -->
<link rel="icon" href="assets/images/logo-crop.png">

<!-- CSS for green atoms background -->
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  overflow: hidden;
  color: #00ff9c;
}

#chat-container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 600px;
  margin: 50px auto;
  background: rgba(0,0,0,0.7);
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 0 20px #00ff9c;
}

#messages {
  max-height: 400px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.message {
  margin-bottom: 8px;
  padding: 5px;
  border-radius: 5px;
  background: rgba(0,255,156,0.2);
}

input, button {
  padding: 8px;
  border-radius: 5px;
  border: none;
  margin-right: 5px;
}

button {
  background: #00ff9c;
  cursor: pointer;
}

/* Green atom animation background */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}
</style>
</head>
<body>

<div id="chat-container">
  <h2>Itzsos Labs Chat</h2>
  <div id="messages"></div>
  <input type="text" id="msgInput" placeholder="Type message..." />
  <button id="sendBtn">Send</button>
</div>

<canvas id="atoms"></canvas>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.appspot.com",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

// Check if user is logged in
onAuthStateChanged(auth, user => {
  if (!user) {
    alert("You must be logged in to access the chat!");
    window.location.href = "index.html"; // redirect if not logged in
  } else {
    // Listen for messages
    const messagesRef = collection(db, "chat");
    const q = query(messagesRef, orderBy("timestamp"));
    onSnapshot(q, snapshot => {
      messagesDiv.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "message";
        div.textContent = `${data.user}: ${data.text}`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    });

    // Send message
    sendBtn.onclick = async () => {
      if(msgInput.value.trim() === "") return;
      await addDoc(messagesRef, {
        user: user.displayName || user.email,
        text: msgInput.value,
        timestamp: serverTimestamp()
      });
      msgInput.value = "";
    };
  }
});

// Green atoms background animation
const canvas = document.getElementById("atoms");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Atom {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.radius = Math.random() * 2 + 1;
    this.dx = Math.random() * 1 - 0.5;
    this.dy = Math.random() * 1 - 0.5;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = "#00ff9c";
    ctx.fill();
  }
  update() {
    if(this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx *= -1;
    if(this.y + this.radius > canvas.height || this.y - this.radius < 0) this.dy *= -1;
    this.x += this.dx;
    this.y += this.dy;
    this.draw();
  }
}

const atoms = [];
for(let i=0; i<150; i++) atoms.push(new Atom());

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  atoms.forEach(a => a.update());
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
