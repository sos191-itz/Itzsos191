<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs Chat | Cyber Arena</title>

<!-- SEO & Meta -->
<meta name="description" content="Chat with other hackers at Itzsos Labs. Real-time, beginner-friendly, and secure.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://sos191-itz.github.io/Itzsos191/chat.html">

<!-- Styles -->
<style>
  body {
    margin:0;
    font-family: monospace;
    background:#0f111a;
    color:#00ffdd;
    overflow-x:hidden;
    position:relative;
  }

  /* Floating particles */
  .particles {
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
  }
  .particles span {
    position:absolute;
    width:3px; height:3px;
    background:#00ffdd;
    border-radius:50%;
    animation:float 8s linear infinite;
    opacity:0.5;
  }
  @keyframes float {
    0% { transform:translateY(0) translateX(0); opacity:0.3; }
    50% { transform:translateY(-50px) translateX(20px); opacity:0.6; }
    100% { transform:translateY(0) translateX(-10px); opacity:0.3; }
  }

  /* Chat Container */
  #chat-container {
    display:none;
    position:fixed;
    bottom:20px; right:20px;
    width:350px;
    background:#111422;
    color:#00ffdd;
    border:1px solid #00ffdd;
    border-radius:12px;
    padding:10px;
    z-index:999;
    box-shadow:0 0 20px #00ffdd44 inset, 0 0 25px #ff660044;
  }
  #chat-container header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:5px;
  }
  #username { font-weight:bold; }
  #chat-close {
    background:#ff6600; border:none; color:black; cursor:pointer; padding:2px 6px; border-radius:5px;
  }

  #chat-messages {
    height:250px;
    overflow-y:auto;
    border-top:1px solid #00ffdd;
    border-bottom:1px solid #00ffdd;
    padding:5px;
    margin:5px 0;
  }
  #chat-messages div { padding:2px 0; }

  #msg-input { width:calc(100% - 60px); padding:5px; border-radius:5px; border:none; }
  #send-btn { width:50px; padding:5px; background:#00ffdd; border:none; cursor:pointer; font-weight:bold; }
  #send-btn:hover { background:#ff6600; color:black; }

</style>
</head>
<body>

<!-- Particles Background -->
<div class="particles" id="particles"></div>

<!-- Chat Box -->
<div id="chat-container">
  <header>
    <div id="username">Username</div>
    <button id="chat-close">X</button>
  </header>
  <div id="chat-messages"></div>
  <div style="display:flex; gap:5px; margin-top:5px;">
    <input id="msg-input" type="text" placeholder="Type a message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<!-- Firebase Chat Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const chatContainer = document.getElementById("chat-container");
const chatMessages = document.getElementById("chat-messages");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const usernameDisplay = document.getElementById("username");
const chatClose = document.getElementById("chat-close");

let currentUser;
let currentUsername;

onAuthStateChanged(auth, async (user) => {
  if (!user) return; // hide chat if not logged in
  currentUser = user;

  // Fetch username from Firestore
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);
  if (!userSnap.exists()) return;

  currentUsername = userSnap.data().username || user.email.split("@")[0];
  usernameDisplay.textContent = currentUsername;

  chatContainer.style.display = "block";

  // Load messages
  const messagesRef = collection(db, "chatMessages");
  const q = query(messagesRef, orderBy("timestamp", "asc"));
  onSnapshot(q, snapshot => {
    chatMessages.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const msgEl = document.createElement("div");
      msgEl.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
      chatMessages.appendChild(msgEl);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  });
});

sendBtn.addEventListener("click", async () => {
  if (!currentUser || msgInput.value.trim() === "") return;
  await addDoc(collection(db, "chatMessages"), {
    user: currentUsername,
    text: msgInput.value,
    timestamp: serverTimestamp()
  });
  msgInput.value = "";
});

msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendBtn.click();
});

chatClose.addEventListener("click", () => chatContainer.style.display = "none");

/* === PARTICLES === */
const particles = document.getElementById('particles');
for(let i=0;i<80;i++){
  const span = document.createElement('span');
  const size = Math.random()*3+2;
  span.style.width = `${size}px`;
  span.style.height = `${size}px`;
  span.style.top = `${Math.random()*100}%`;
  span.style.left = `${Math.random()*100}%`;
  span.style.animationDuration = `${Math.random()*5+5}s`;
  span.style.opacity = Math.random();
  particles.appendChild(span);
}
</script>

</body>
</html>
