<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Chat | Itzsos Labs</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
#sidebar{
  width:240px;
  background:#111422;
  border-right:1px solid #00ffdd;
  padding:10px;
  display:flex;
  flex-direction:column;
}
#sidebar h3{margin-top:0;}
.user{
  padding:6px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
.user:hover{background:#1a1f35;}
.online{color:#00ff99;}
.offline{color:#555;}

/* MAIN CHAT */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#header{
  padding:10px;
  border-bottom:1px solid #00ffdd;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin-bottom:8px;
  padding:6px;
  border-left:3px solid #00ffdd;
  background:#111422;
  position:relative;
}

.msg .reactions{
  display:flex;
  gap:5px;
  margin-top:3px;
}

.reaction{
  cursor:pointer;
}

.read{
  font-size:10px;
  position:absolute;
  right:5px;
  bottom:2px;
  color:#00ff99;
}

.typing{
  font-size:12px;
  color:#aaa;
  padding-left:10px;
}

/* INPUT */
#inputBox{
  display:flex;
  padding:10px;
  gap:10px;
  border-top:1px solid #00ffdd;
}

input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
}

button{
  background:#00ffdd;
  border:none;
  padding:8px;
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}
button:hover{background:#ff6600; color:black;}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h3>🟢 Online Users</h3>
  <div id="usersList"></div>
  <hr style="border-color:#00ffdd;">
  <button id="globalBtn">🌐 Global Chat</button>
</div>

<!-- Main Chat -->
<div id="main">
  <div id="header">
    <span id="chatTitle">Global Chat</span>
  </div>
  <div id="messages"></div>
  <div id="typing" class="typing"></div>
  <div id="inputBox">
    <input id="msg" placeholder="Type a message...">
    <button id="send">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, doc, getDoc, updateDoc, where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* Firebase config */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth();
const db = getFirestore();

let currentUser, username;
let currentChat="global";
let currentDMUser=null;

/* Elements */
const messagesDiv = document.getElementById("messages");
const usersList = document.getElementById("usersList");
const typingDiv = document.getElementById("typing");
const chatTitle = document.getElementById("chatTitle");
const inputMsg = document.getElementById("msg");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;
  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);

  username = snap.exists() ? snap.data().username : user.email.split("@")[0];

  await updateDoc(userRef,{online:true,lastSeen:serverTimestamp()});
  loadUsers();
  loadMessages();
});

/* ONLINE USERS LIST */
function loadUsers(){
  const q = query(collection(db,"users"), where("online","==",true));
  onSnapshot(q, snap=>{
    usersList.innerHTML="";
    snap.forEach(docSnap=>{
      const data = docSnap.data();
      const div=document.createElement("div");
      div.className="user online";
      div.innerHTML=`<span>${data.username}</span><span>${data.role||""}</span>`;
      div.onclick=()=>{
        currentChat="dm";
        currentDMUser=docSnap.id;
        chatTitle.innerText="DM: "+data.username;
        loadMessages();
      };
      usersList.appendChild(div);
    });
  });
}

/* CHAT ID FOR DMs */
function getChatId(uid1, uid2){
  return [uid1,uid2].sort().join("_");
}

/* LOAD MESSAGES */
function loadMessages(){
  const q = query(collection(db,"messages"), orderBy("timestamp"));
  onSnapshot(q, snap=>{
    messagesDiv.innerHTML="";
    snap.forEach(docSnap=>{
      const data=docSnap.data();

      // FILTER
      if(currentChat==="global" && data.type!=="global") return;
      if(currentChat==="dm"){
        const chatId=getChatId(currentUser.uid,currentDMUser);
        if(data.chatId!==chatId) return;
      }

      // Message div
      const div=document.createElement("div");
      div.className="msg";
      div.innerHTML=`<b>${data.username}</b>: ${data.text}`;

      // Reactions
      const reactionsDiv=document.createElement("div");
      reactionsDiv.className="reactions";
      ["👍","❤️","😂"].forEach(r=>{
        const btn=document.createElement("span");
        btn.className="reaction";
        btn.innerText=r;
        btn.onclick=()=> addReaction(docSnap.id,r);
        reactionsDiv.appendChild(btn);
      });
      div.appendChild(reactionsDiv);

      // Read receipts
      const read=document.createElement("div");
      read.className="read";
      read.innerText=(data.readBy||[]).includes(currentUser.uid)?"✓":"";
      div.appendChild(read);

      messagesDiv.appendChild(div);

      // Notifications for DMs
      if(data.to===currentUser.uid && data.sender!==currentUser.uid) alert("New DM from "+data.username);
    });

    // Scroll
    messagesDiv.scroll({top:messagesDiv.scrollHeight,behavior:"smooth"});
  });
}

/* ADD REACTION */
async function addReaction(msgId,reaction){
  const msgRef=doc(db,"messages",msgId);
  const msgSnap=await getDoc(msgRef);
  const data=msgSnap.data();
  const reactions=data.reactions||{};
  reactions[reaction]=reactions[reaction]||[];
  if(!reactions[reaction].includes(currentUser.uid)) reactions[reaction].push(currentUser.uid);
  await updateDoc(msgRef,{reactions});
}

/* TYPING INDICATOR */
let typingTimeout;
inputMsg.addEventListener("input", async ()=>{
  const chatId = currentChat==="dm"?getChatId(currentUser.uid,currentDMUser):"global";
  await addDoc(collection(db,"typing"),{chatId,user:username,timestamp:serverTimestamp()});
  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>typingDiv.innerText="",2000);
});

onSnapshot(collection(db,"typing"), snap=>{
  snap.forEach(docSnap=>{
    const data=docSnap.data();
    const chatId = currentChat==="dm"?getChatId(currentUser.uid,currentDMUser):"global";
    if(data.chatId===chatId && data.user!==username) typingDiv.innerText=data.user+" is typing...";
  });
});

/* SEND MESSAGE */
document.getElementById("send").onclick=async ()=>{
  const text=inputMsg.value;
  if(!text) return;

  if(currentChat==="global"){
    await addDoc(collection(db,"messages"),{
      type:"global", username, text,
      sender:currentUser.uid,
      timestamp:serverTimestamp(),
      readBy:[currentUser.uid]
    });
  }

  if(currentChat==="dm"){
    const chatId=getChatId(currentUser.uid,currentDMUser);
    await addDoc(collection(db,"messages"),{
      type:"dm", chatId, username, text,
      sender:currentUser.uid,
      to:currentDMUser,
      timestamp:serverTimestamp(),
      readBy:[currentUser.uid]
    });
  }

  inputMsg.value="";
};

inputMsg.addEventListener("keypress", e=>{
  if(e.key==="Enter") document.getElementById("send").click();
});

/* GLOBAL CHAT BUTTON */
document.getElementById("globalBtn").onclick=()=>{
  currentChat="global";
  currentDMUser=null;
  chatTitle.innerText="Global Chat";
  loadMessages();
};
</script>
</body>
</html>
