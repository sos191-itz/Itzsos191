<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Hacker Chat</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#05070d;
  color:#00ffdd;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
#sidebar{
  width:230px;
  background:#0b0f1a;
  border-right:1px solid #00ffdd;
  overflow-y:auto;
}
.user{
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #111;
}
.user:hover{background:#111}

/* MAIN */
#main{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* HEADER */
#header{
  padding:10px;
  border-bottom:1px solid #00ffdd;
}

/* MESSAGES */
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:120px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* CHAT BUBBLES */
.msg{
  max-width:70%;
  padding:10px;
  border-radius:10px;
  animation:fadeIn 0.3s ease;
}

.me{
  align-self:flex-end;
  background:#00ffdd;
  color:black;
}

.other{
  align-self:flex-start;
  background:#111422;
  border:1px solid #00ffdd;
}

/* IMAGE */
.msg img{
  max-width:200px;
  border-radius:8px;
}

/* INPUT FIX */
#inputBox{
  position:fixed;
  bottom:15px;
  left:240px;
  right:10px;
  display:flex;
  gap:5px;
  background:#0b0f1a;
  padding:10px;
  border-radius:10px;
  border:1px solid #00ffdd;
}

input{
  flex:1;
  padding:10px;
  background:black;
  color:#00ffdd;
  border:1px solid #00ffdd;
}

/* BUTTON */
button{
  background:#00ffdd;
  border:none;
  padding:10px;
  cursor:pointer;
}
button:hover{background:#ff6600}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* TYPING */
#typing{
  font-size:12px;
  padding-left:10px;
  color:#aaa;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>💬 Users</h3>
  <div id="users"></div>
</div>

<div id="main">
  <div id="header">Global Chat</div>
  <div id="messages"></div>
  <div id="typing"></div>

  <div id="inputBox">
    <input id="msg" placeholder="Type message...">
    <input type="file" id="imgInput">
    <button id="voice">🎤</button>
    <button id="send">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, addDoc, serverTimestamp,
  query, orderBy, onSnapshot, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const auth = getAuth();
const db = getFirestore();

let currentUser, username;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  currentUser=user;
  const snap=await getDoc(doc(db,"users",user.uid));
  username=snap.data().username;
  loadMessages();
});

/* LOAD MESSAGES */
function loadMessages(){
  const q=query(collection(db,"messages"),orderBy("timestamp"));

  onSnapshot(q,snap=>{
    const messages=document.getElementById("messages");
    messages.innerHTML="";

    snap.forEach(docSnap=>{
      const d=docSnap.data();

      const div=document.createElement("div");
      const isMe=d.sender===currentUser.uid;

      div.className="msg "+(isMe?"me":"other");

      let content = `<b>${d.username}</b><br>${d.text||""}`;

      if(d.image){
        content += `<br><img src="${d.image}">`;
      }

      if(d.voice){
        content += `<br><audio controls src="${d.voice}"></audio>`;
      }

      content += `<div>${(d.readBy||[]).length>1?"✓✓":"✓"}</div>`;

      div.innerHTML=content;
      messages.appendChild(div);

      // mark seen
      if(!d.readBy || !d.readBy.includes(currentUser.uid)){
        updateDoc(doc(db,"messages",docSnap.id),{
          readBy:[...(d.readBy||[]),currentUser.uid]
        });
      }
    });

    messages.scrollTop=messages.scrollHeight;
  });
}

/* SEND */
document.getElementById("send").onclick=async()=>{
  const text=document.getElementById("msg").value;

  await addDoc(collection(db,"messages"),{
    text,
    username,
    sender:currentUser.uid,
    timestamp:serverTimestamp(),
    readBy:[currentUser.uid]
  });

  document.getElementById("msg").value="";
};

/* IMAGE */
document.getElementById("imgInput").onchange=async(e)=>{
  const file=e.target.files[0];
  const url=URL.createObjectURL(file);

  await addDoc(collection(db,"messages"),{
    image:url,
    username,
    sender:currentUser.uid,
    timestamp:serverTimestamp(),
    readBy:[currentUser.uid]
  });
};

/* VOICE */
let recorder, audioChunks=[];

document.getElementById("voice").onclick=async()=>{
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(stream);

  recorder.ondataavailable=e=>audioChunks.push(e.data);

  recorder.onstop=async()=>{
    const blob=new Blob(audioChunks);
    const url=URL.createObjectURL(blob);

    await addDoc(collection(db,"messages"),{
      voice:url,
      username,
      sender:currentUser.uid,
      timestamp:serverTimestamp(),
      readBy:[currentUser.uid]
    });

    audioChunks=[];
  };

  recorder.start();
  setTimeout(()=>recorder.stop(),3000);
};

/* TYPING */
document.getElementById("msg").addEventListener("input",()=>{
  document.getElementById("typing").innerText="Typing...";
  setTimeout(()=>document.getElementById("typing").innerText="",1000);
});
</script>

</body>
</html>
