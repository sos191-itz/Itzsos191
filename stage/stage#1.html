<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav{
  background:#111422;
  padding:15px;
  display:flex;
  justify-content:space-between;
}
button{
  background:#00ffdd;
  border:none;
  padding:8px;
  cursor:pointer;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

/* CARD */
.card{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

/* IMAGE */
.stage-img{
  width:100%;
  max-height:250px;
  object-fit:cover;
  border-radius:8px;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* RESULT */
#result{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<nav>
  <h3>Itzsos Labs</h3>
  <button onclick="location.href='stages.html'">Back</button>
</nav>

<div class="container">

  <!-- STAGE TITLE -->
  <div class="card">
    <h2 id="title">Loading...</h2>
    <p id="text"></p>

    <!-- IMAGE WILL LOAD HERE -->
    <img id="image" class="stage-img" style="display:none;">
  </div>

  <!-- EDUCATION / EXPLANATION -->
  <div class="card">
    <h3>📘 What is this?</h3>
    <p id="explanation">
      Loading explanation...
    </p>
  </div>

  <!-- ANSWER -->
  <div class="card">
    <h3>🧠 Your Answer</h3>
    <input id="answer" placeholder="Type your answer here...">
    <button onclick="submitAnswer()">Submit</button>
    <div id="result"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,doc,getDoc,setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* 🔑 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let correctAnswer="";
let xpValue=0;
let stageId;

/* GET ID FROM URL */
const params = new URLSearchParams(window.location.search);
stageId = params.get("id");

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;

  /* LOAD STAGE FROM FIRESTORE */
  const stageRef = doc(db,"stages",stageId);
  const snap = await getDoc(stageRef);

  if(!snap.exists()){
    document.getElementById("title").innerText="Stage not found";
    return;
  }

  const data = snap.data();

  document.getElementById("title").innerText = data.title;
  document.getElementById("text").innerText = data.text;
  document.getElementById("explanation").innerText = data.explanation || "No explanation provided.";

  /* IMAGE */
  if(data.image){
    const img = document.getElementById("image");
    img.src = data.image;
    img.style.display="block";
  }

  correctAnswer = (data.answer || "").toLowerCase();
  xpValue = data.xp || 0;
});

/* SUBMIT ANSWER */
window.submitAnswer = async ()=>{
  const userAnswer = document.getElementById("answer").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if(!userAnswer){
    result.innerText="❌ Enter answer first";
    return;
  }

  if(userAnswer === correctAnswer){

    result.innerText="✅ Correct! +" + xpValue + " XP";

    const userRef = doc(db,"users",currentUser.uid);
    const snap = await getDoc(userRef);
    const data = snap.data();

    let solved = data.solvedStages || [];

    /* PREVENT XP FARMING */
    if(!solved.includes(stageId)){
      solved.push(stageId);

      await setDoc(userRef,{
        xp:(data.xp||0)+xpValue,
        solvedStages: solved
      },{merge:true});
    }

  }else{
    result.innerText="❌ Wrong answer. Try again.";
  }
};
</script>

</body>
</html>
