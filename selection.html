<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Select Your Field</title>
<meta name="description" content="Choose your field: Programming, IT/Cybersecurity, Pentesting.">
<style>
  /* BASIC RESET */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: monospace; background:#0f111a; color:#00ffdd; overflow-x:hidden; }

  /* CONTAINER */
  .container {
    display:flex; 
    flex-direction:column; 
    align-items:center; 
    justify-content:center; 
    min-height:100vh;
    position:relative;
    perspective:1000px;
    overflow:hidden;
    text-align:center;
  }

  h1 {
    font-size:3rem; 
    color:#ff6600; 
    margin-bottom:50px; 
    animation: slideIn 1s ease-out;
  }

  @keyframes slideIn {
    0% { transform: translateY(-50px); opacity:0; }
    100% { transform: translateY(0); opacity:1; }
  }

  /* BUTTONS */
  .btn {
    padding:20px 40px;
    margin:20px;
    font-size:1.5rem;
    font-weight:bold;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: linear-gradient(45deg,#ff6600,#00ffdd);
    color:black;
    transition: transform 0.3s, box-shadow 0.3s;
    position:relative;
    z-index:2;
  }

  .btn:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 20px #00ffdd, 0 0 30px #ff6600;
  }

  /* PARTICLES BACKGROUND */
  .particles {
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:1;
  }
  .particles span {
    position:absolute;
    background:#00ffdd;
    border-radius:50%;
    animation: float 5s linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(0px); opacity:0.8; }
    50% { transform: translateY(-20px); opacity:0.4; }
    100% { transform: translateY(0px); opacity:0.8; }
  }

  /* MOBILE */
  @media(max-width:768px){
    h1 { font-size:2rem; margin-bottom:30px; }
    .btn { padding:15px 30px; font-size:1.2rem; margin:15px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Choose Your Field</h1>
  <button class="btn" onclick="chooseField('programming')">💻 Programming</button>
  <button class="btn" onclick="chooseField('IT')">🖥 IT / Cybersecurity</button>
  <button class="btn" onclick="chooseField('pentesting')">🕵 Pentesting</button>

  <div class="particles"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// CHECK LOGIN
onAuthStateChanged(auth, user => {
  if (!user || !user.emailVerified) {
    alert("❌ Login and verify your email first!");
    window.location.href = "index.html#login";
  }
});

// PARTICLES
const particleContainer = document.querySelector('.particles');
for(let i=0;i<70;i++){
  const span = document.createElement('span');
  const size = Math.random()*5 + 2;
  span.style.width = `${size}px`;
  span.style.height = `${size}px`;
  span.style.top = `${Math.random()*100}%`;
  span.style.left = `${Math.random()*100}%`;
  span.style.animationDuration = `${Math.random()*5 + 3}s`;
  particleContainer.appendChild(span);
}

// CHOOSE FIELD FUNCTION
function chooseField(field){
  localStorage.setItem("selectedField", field);

  const user = auth.currentUser;
  if(user){
    setDoc(doc(db, "users", user.uid), { selectedField: field }, { merge:true })
    .then(()=> {
      alert(`✅ You selected: ${field}`);
      window.location.href = "games.html"; // redirect to games page
    })
    .catch(err => console.error(err));
  } else {
    window.location.href = "games.html";
  }
}
</script>
</body>
</html>
