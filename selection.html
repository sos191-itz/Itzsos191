<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="8qTPfxaWZr3Utd41Q9rcD61dBhCvwINivYjw-dFKpm8" />
<title>Itzsos Labs | Select Your Field</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
  overflow:hidden;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  position:relative;
}

h1{
  font-size:3rem;
  color:#ff6600;
  margin-bottom:50px;
  animation:fadeDown 1s ease-out;
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-40px);}
  to{opacity:1; transform:translateY(0);}
}

.btn{
  padding:20px 45px;
  margin:20px;
  font-size:1.4rem;
  font-weight:bold;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  color:black;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08) translateY(-8px);
  box-shadow:0 0 20px #00ffdd,0 0 30px #ff6600;
}

.particles{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-1;
}

.particles span{
  position:absolute;
  background:#00ffdd;
  border-radius:50%;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0);}
}

@media(max-width:768px){
  h1{font-size:2rem;}
  .btn{padding:15px 30px;font-size:1.1rem;}
}
</style>
</head>
<body>

<div class="container">
  <h1>Choose Your Field</h1>

  <button class="btn" onclick="chooseField('programming')">
    💻 Programming
  </button>

  <button class="btn" onclick="chooseField('IT')">
    🖥 IT / Cybersecurity
  </button>

  <div class="particles"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/*✅ Check login + skip if already selected field */
onAuthStateChanged(auth, async (user) => {

  if (!user || !user.emailVerified) {
    window.location.href = "index.html#login";
    return;
  }

  currentUser = user;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (snap.exists()) {
    const data = snap.data();

    if (data.selectedField === "IT" && data.role) {
      // Already chose field AND role → go to stages
      window.location.href = "stages.html";
      return;
    }

    if (data.selectedField) {
      // Field chosen but role not chosen → go to choose page
      window.location.href = "choose.html";
      return;
    }
  }

});

/* 🎯 FIELD SELECTION */
window.chooseField = async function(field) {
  if (!currentUser) {
    alert("Please wait... loading user.");
    return;
  }

  const userRef = doc(db, "users", currentUser.uid);

  try {
    await setDoc(userRef, {
      email: currentUser.email,
      selectedField: field
    }, { merge: true });

    // 🔥 Redirect to choose.html
    window.location.href = "choose.html";

  } catch(err) {
    console.error(err);
    alert("Error saving selection.");
  }
};

/* ✨ PARTICLES */
const particleContainer=document.querySelector('.particles');
for(let i=0;i<70;i++){
  const span=document.createElement('span');
  const size=Math.random()*5+2;
  span.style.width=size+"px";
  span.style.height=size+"px";
  span.style.top=Math.random()*100+"%";
  span.style.left=Math.random()*100+"%";
  span.style.animationDuration=Math.random()*5+3+"s";
  particleContainer.appendChild(span);
}

</script>

</body>
</html>
