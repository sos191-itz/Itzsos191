<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Team | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0b0f1a;
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #ff0033;
}

nav h3{ color:#ff0033; }

nav button{
  background:#ff0033;
  border:none;
  padding:8px;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* USER */
#userBox{
  display:flex;
  gap:10px;
  background:#111422;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff0033,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111422;
  padding:15px;
  border-radius:10px;
  border:1px solid #ff0033;
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px #ff0033;
}

.card img{
  width:100%;
  max-height:150px;
  object-fit:cover;
  border-radius:8px;
}

/* LOCKED */
.locked{
  opacity:0.4;
}

/* BADGE */
.badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#00ff99;
  color:black;
  padding:5px;
  border-radius:6px;
  font-size:12px;
}

/* PROGRESS */
.progressBar{
  height:8px;
  background:#222;
  border-radius:10px;
  margin:10px 0;
}
.progressFill{
  height:8px;
  background:linear-gradient(90deg,#ff0033,#00ffdd);
  border-radius:10px;
}

/* BUTTON */
button{
  margin-top:8px;
  padding:8px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  color:black;
  border-radius:6px;
  font-weight:bold;
}

button:disabled{
  background:#444;
  color:#888;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.header h2{
  color:#ff0033;
}

/* CHAT */
#chatBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff0033;
  padding:14px;
  border-radius:50%;
}
</style>
</head>

<body>

<nav>
  <h3>🔴 Red Team</h3>
  <div>
    <button onclick="location.href='stages.html'">All</button>
    <button onclick="location.href='profile.html'">Profile</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

<div class="header">
  <h2>Offensive Security Path</h2>
  <p>Learn reconnaissance, exploitation, and real hacking techniques.</p>
</div>

<!-- USER -->
<div id="userBox">
  <div class="avatar" id="avatar">U</div>
  <div>
    <div id="username">Loading...</div>
    <div id="xp">XP: 0</div>
  </div>
</div>

<!-- STAGES -->
<div id="stages" class="grid"></div>

</div>

<button id="chatBtn" onclick="location.href='chat.html'">💬</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="index.html";
    return;
  }

  currentUser=user;

  const ref=doc(db,"users",user.uid);
  let snap=await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      username:"Hacker"+Math.floor(Math.random()*9999),
      xp:0,
      solvedStages:[],
      stageProgress:{}
    });
    snap=await getDoc(ref);
  }

  const data=snap.data();

  document.getElementById("username").innerText=data.username;
  document.getElementById("xp").innerText="XP: "+(data.xp||0);
  document.getElementById("avatar").innerText=data.username[0].toUpperCase();

  loadStages(data);
});

/* LOAD RED TEAM STAGES */
async function loadStages(userData){
  const snap=await getDocs(collection(db,"stages"));

  const container=document.getElementById("stages");
  container.innerHTML="";

  let index=1;

  snap.forEach(docSnap=>{
    const s=docSnap.data();
    const id=docSnap.id;

    // 🔴 ONLY RED TEAM
    if(!["Networking","Web","Exploitation","Recon"].includes(s.category)){
      return;
    }

    const solved=userData.solvedStages||[];
    const progressData=userData.stageProgress||{};

    const locked=index>1 && !solved.includes("stage"+(index-1));
    const progress=progressData[id]||0;

    const totalXP=(s.tasks||[]).reduce((sum,t)=>sum+(t.xp||0),0);

    const card=document.createElement("div");
    card.className="card "+(locked?"locked":"");

    card.innerHTML=`
      ${solved.includes(id)?'<div class="badge">🏆 Completed</div>':''}

      <h4>${s.title || id}</h4>
      <p>${s.description || ""}</p>

      ${s.image?`<img src="${s.image}">`:""}

      <div class="progressBar">
        <div class="progressFill" style="width:${progress}%"></div>
      </div>

      <p>⚡ XP: ${totalXP}</p>

      <button ${locked?"disabled":`onclick="openStage('${id}')"`}>
        ${locked?"🔒 Locked":"🚀 Attack"}
      </button>
    `;

    container.appendChild(card);
    index++;
  });
}

window.openStage=id=>{
  location.href="stage.html?id="+id;
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick=()=>{
  signOut(auth).then(()=>location.href="index.html");
};
</script>

</body>
</html>
