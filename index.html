/* ===== BODY & NAV ===== */
body { margin:0; font-family:monospace; background:#0f111a; color:#00ffdd; }
nav { background:#111422; border-bottom:1px solid #00ffdd; display:flex; justify-content:space-between; align-items:center; padding:15px 30px; position:sticky; top:0; }

/* ===== BUTTONS ===== */
.btn { padding:10px 22px; background:#ff6600; color:black; border:none; border-radius:5px; font-weight:bold; cursor:pointer; margin:5px; }
.btn:hover { background:#00ffdd; }

/* ===== LOGIN BOX ===== */
#loginBox { background:#111422; border:1px solid #00ffdd; width:320px; margin:40px auto; padding:25px; border-radius:10px; text-align:center; }
#loginBox input { width:90%; padding:10px; margin:10px 0; background:black; border:1px solid #00ffdd; color:white; }

/* ===== CATEGORY SELECTION ===== */

/* ===== FOOTER ===== */
footer { background:#111422; text-align:center; padding:20px; border-top:1px solid #00ffdd; margin-top:50px; }

/* ===== 3D LOGO ===== */
.logo-3d-container { position: relative; width: 350px; height: 350px; margin: 50px auto; perspective: 1000px; }
.logo-3d-text { position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:monospace; font-size:3rem; font-weight:bold; background: linear-gradient(90deg, #ff6600, #00ffdd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 5px #ff6600,0 0 10px #00ffdd,0 0 20px #ff6600; transition: transform 0.1s ease; z-index:10; pointer-events:none; }
.globe { position:absolute; top:50%; left:50%; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #00ffdd, #111422); transform: translate(-50%,-50%); animation: rotateGlobe 20s linear infinite; box-shadow: 0 0 30px #00ffdd,0 0 60px #ff6600; z-index:5; }
.rings { position:absolute; top:50%; left:50%; width:240px; height:240px; border-radius:50%; border:2px solid #00ffdd; animation: rotateRings 12s linear infinite; transform: translate(-50%, -50%) rotateX(45deg); box-shadow:0 0 20px #00ffdd,0 0 40px #ff6600; z-index:4; }
.particles { position:absolute; width:100%; height:100%; overflow:hidden; z-index:1; }
.particles span { position:absolute; background:#00ffdd; border-radius:50%; animation: float 5s linear infinite; }

@keyframes float {0%{transform:translateY(0px);}50%{transform:translateY(-20px);}100%{transform:translateY(0px);}}
@keyframes rotateGlobe {0%{transform:translate(-50%,-50%) rotateX(0deg) rotateY(0deg);}100%{transform:translate(-50%,-50%) rotateX(360deg) rotateY(360deg);}}
@keyframes rotateRings {0%{transform:translate(-50%,-50%) rotateX(45deg) rotateZ(0deg);}100%{transform:translate(-50%,-50%) rotateX(45deg) rotateZ(360deg);}}

@media (max-width:768px){

<!-- FIREBASE + CATEGORY SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, sendEmailVerification, applyActionCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const categorySection = document.getElementById("categorySelection");
const categoryButtons = categorySection.querySelectorAll(".btn");

let currentUser = null;

// REGISTER
document.getElementById("registerBtn").onclick = async () => {
  try {
    const res = await createUserWithEmailAndPassword(auth,email.value,password.value);
    await sendEmailVerification(res.user);
    await setDoc(doc(db,"users",res.user.uid), { xp:0, solvedStages:[], category:null });
    status.textContent = "Registered! Check email 📧";
  } catch(e){ status.textContent = e.message; }
};

// LOGIN
document.getElementById("loginBtn").onclick = async () => {
  try {
    const res = await signInWithEmailAndPassword(auth,email.value,password.value);
    if(res.user.emailVerified){
      status.textContent = "Logged In ✅";
      checkCategoryAndRedirect();
    } else {
      status.textContent = "Verify Email First 📧";
      sendEmailVerification(res.user);
    }
  } catch(e){ status.textContent = e.message; }
};

// RESET & LOGOUT
document.getElementById("resetBtn").onclick = ()=>{
  if(!email.value){ status.textContent="Enter email first"; return; }
  sendPasswordResetEmail(auth,email.value).then(()=>status.textContent="Reset link sent 📧").catch(e=>status.textContent=e.message);
};
document.getElementById("logoutBtn").onclick = ()=>{ signOut(auth); status.textContent="Logged out"; };

// AUTH STATE
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(user){ status.textContent = "Welcome "+user.email; checkCategoryAndRedirect(); }
  else{ status.textContent="Not logged in"; }
});

// START BUTTON
startBtn.onclick = ()=>{ 
  if(!currentUser){ alert("❌ Please login first!"); location.href="#login"; return; }
  if(!currentUser.emailVerified){ alert("❌ Verify email first!"); sendEmailVerification(currentUser); return; }
  checkCategoryAndRedirect();
};

// CATEGORY BUTTONS
categoryButtons.forEach(btn=>{
  btn.onclick = async ()=>{
    const category = btn.dataset.category;
    await updateDoc(doc(db,"users",currentUser.uid), { category });
    window.location.href = `${category}_stages.html`;
  };
});

// CHECK CATEGORY
async function checkCategoryAndRedirect(){
  if(!currentUser) return;
  const userRef = doc(db,"users",currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();
  if(data && data.category){ window.location.href = `${data.category}_stages.html`; }
  else { categorySection.style.display = "block"; }
}

// EMAIL ACTIONS
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
const oobCode = params.get("oobCode");
if(mode==="verifyEmail" && oobCode){ applyActionCode(auth,oobCode).then(()=>alert("Email verified ✅")).catch(()=>alert("Verification failed ❌")); }
if(mode==="resetPassword" && oobCode){ const newPass = prompt("Enter new password:"); if(newPass){ confirmPasswordReset(auth,oobCode,newPass).then(()=>alert("Password changed ✅")).catch(()=>alert("Reset failed ❌")); } }
</script>

<!-- 3D LOGO PARTICLES + MOUSE -->
<script>
const particleContainer=document.querySelector('.particles');
for(let i=0;i<70;i++){ const span=document.createElement('span'); const size=Math.random()*4+2; span.style.width=`${size}px`; span.style.height=`${size}px`; span.style.top=`${Math.random()*100}%`; span.style.left=`${Math.random()*100}%`; span.style.animationDuration=`${Math.random()*3+3}s`; particleContainer.appendChild(span); }

const logoContainer=document.querySelector('.logo-3d-container');
const logoText=document.querySelector('.logo-3d-text');
const globe=document.querySelector('.globe');
const rings=document.querySelector('.rings');

logoContainer.addEventListener('mousemove',(e)=>{
  const rect=logoContainer.getBoundingClientRect();
  const x=e.clientX-rect.left-rect.width/2;
  const y=e.clientY-rect.top-rect.height/2;
  const rotX=y/rect.height*20;
  const rotY=x/rect.width*20;
  logoText.style.transform=`translate(-50%,-50%) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  globe.style.transform=`translate(-50%,-50%) rotateY(${rotY+360}deg) rotateX(${rotX+360}deg)`;
  rings.style.transform=`translate(-50%,-50%) rotateX(45deg) rotateZ(${rotY}deg)`;
});
logoContainer.addEventListener('mouseleave', ()=>{
  logoText.style.transform='translate(-50%,-50%) rotateX(0deg) rotateY(0deg)';
  globe.style.transform='translate(-50%,-50%) rotateX(0deg) rotateY(0deg)';
  rings.style.transform='translate(-50%,-50%) rotateX(45deg) rotateZ(0deg)';
});
</script>
