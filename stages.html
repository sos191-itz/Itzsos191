<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs - Stages</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav {
  background:#111422;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  border-bottom:1px solid #00ffdd;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  cursor:pointer;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* USER BOX */
#userBox {
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
  border:1px solid #00ffdd;
}

/* AVATAR */
.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#000;
}

/* STAGES */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.stage-card {
  background:#111422;
  padding:20px;
  border-radius:10px;
  border:1px solid #00ffdd;
  transition:0.3s;
}

.stage-card:hover {
  transform:scale(1.05);
  border-color:#ff6600;
}

.stage-card h3 { color:#ff6600; }

button.start {
  margin-top:10px;
  padding:8px;
  background:#00ffdd;
  border:none;
  cursor:pointer;
}

button.start:disabled {
  background:gray;
  cursor:not-allowed;
}

.locked {
  opacity:0.5;
}

/* PAYPAL */
#paypalBox {
  margin-top:20px;
  padding:15px;
  border:1px solid #ff6600;
  border-radius:10px;
  text-align:center;
}

/* CHAT BUTTON */
#chatBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6600;
  padding:10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs</h2>
  <div>
    <button onclick="window.location.href='chat.html'">Chat</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- USER -->
  <div id="userBox">
    <div style="display:flex; gap:10px; align-items:center;">
      <div class="avatar" id="avatar">U</div>
      <div>
        <div id="email">Loading...</div>
        <div id="xp">XP: 0</div>
      </div>
    </div>

    <!-- PAYPAL -->
    <div id="paypalBox">
      <h3>🔥 Buy 300 XP</h3>

      <script src="https://www.paypal.com/sdk/js?client-id=BAANEM-ym-VkUny86qGnLGSCrXAuYaQlr4XDgcjJtB1A65tn9qFJIAaH61r-Pi5c0kzDKGdfgj5EIKjfuY&components=hosted-buttons&currency=USD"></script>

      <div id="paypal-container-JG97CC8L5EH3W"></div>

      <script>
        paypal.HostedButtons({
          hostedButtonId: "JG97CC8L5EH3W"
        }).render("#paypal-container-JG97CC8L5EH3W");
      </script>

      <br>
      <button id="verifyBtn">I Paid 💰</button>
    </div>
  </div>

  <!-- STAGES -->
  <div class="stage-grid" id="stages"></div>

</div>

<button id="chatBtn" onclick="window.location.href='chat.html'">Open Chat</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stagesDiv = document.getElementById("stages");
const logoutBtn = document.getElementById("logoutBtn");

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return window.location.href="index.html";

  currentUser = user;

  document.getElementById("email").innerHTML = "<b>"+user.email+"</b>";
  document.getElementById("avatar").textContent = user.email[0].toUpperCase();

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);

  let xp = 0;
  let solved = [];

  if(snap.exists()){
    xp = snap.data().xp || 0;
    solved = snap.data().solvedStages || [];
  }

  document.getElementById("xp").textContent = "XP: "+xp;

  loadStages(solved);
});

/* LOAD STAGES (FIXED LOCK SYSTEM) */
async function loadStages(solved){

  const querySnapshot = await getDocs(collection(db,"stages"));

  let stages = [];

  querySnapshot.forEach(docSnap=>{
    stages.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  // SORT
  stages.sort((a,b)=>a.order - b.order);

  stagesDiv.innerHTML = "";

  stages.forEach((stage,index)=>{

    const card = document.createElement("div");
    card.classList.add("stage-card");

    let locked = false;

    if(index > 0){
      const prevId = stages[index-1].id;
      if(!solved.includes(prevId)) locked = true;
    }

    if(locked) card.classList.add("locked");

    card.innerHTML = `
      <h3>${stage.title} ${locked?"🔒":""}</h3>
      <p>${stage.text}</p>
      <p>XP: ${stage.xp}</p>
      ${locked ? "<p style='color:red;'>Complete previous stage</p>" : ""}
      <button class="start"
        ${locked?"disabled":""}
        onclick="window.location.href='stage.html?id=${stage.id}'">
        ${locked?"Locked":"Start"}
      </button>
    `;

    stagesDiv.appendChild(card);
  });
}

/* VERIFY PAYMENT */
document.getElementById("verifyBtn").onclick = async ()=>{
  if(!currentUser) return;

  const userRef = doc(db,"users",currentUser.uid);
  const snap = await getDoc(userRef);

  let xp = snap.data().xp || 0;

  await setDoc(userRef,{
    xp: xp + 300
  },{merge:true});

  alert("🔥 XP Added!");
  location.reload();
};

/* LOGOUT */
logoutBtn.onclick = ()=>signOut(auth).then(()=>window.location.href="index.html");

</script>

</body>
</html>
