<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cybersecurity Stages | Itzsos Labs</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}

nav h2 { color:#ff6600; }

nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

.container {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

#userBox {
  margin-bottom:30px;
  padding:15px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:8px;
}

.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.stage-card {
  background:#111422;
  border:1px solid #00ffdd;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.stage-card:hover {
  transform:scale(1.05);
  border-color:#ff6600;
}

.stage-card h3 {
  color:#ff6600;
}

.stage-card button {
  margin-top:10px;
  padding:8px 12px;
  background:#00ffdd;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.stage-card button:disabled {
  background:gray;
  cursor:not-allowed;
}

.locked {
  opacity:0.5;
}

.solved {
  border-color:lightgreen !important;
}

footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #00ffdd;
  margin-top:40px;
}
#userBox {
  margin-bottom:30px;
  padding:20px;
  background:linear-gradient(145deg,#111422,#1a1f35);
  border:1px solid #00ffdd;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,255,221,0.2);
}

.user-info {
  display:flex;
  align-items:center;
  gap:15px;
}

.avatar {
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:bold;
  color:#0f111a;
}

.user-details {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.xp-badge {
  background:#00ffdd;
  color:#0f111a;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
  width:fit-content;
}
nav div button{
  margin-left:10px;
}
nav div{
  display:flex;
  align-items:center;
}

nav div button{
  margin-left:10px;
}
.activity-box{
margin-top:40px;
background:#111422;
border:1px solid #00ffdd;
padding:20px;
border-radius:10px;
}

.activity{
padding:6px;
border-bottom:1px solid #222;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs - Cybersecurity Track</h2>

  <div>
<button onclick="window.location.href='profile.html'">
Profile
</button>
    <button onclick="window.location.href='leaderboard.html'">
      Leaderboard
    </button>

    <button id="logoutBtn">
      Logout
    </button>
  </div>
</nav>

<div class="container">

  <div id="userBox">
  <div class="user-info">
    <div class="avatar" id="userAvatar">U</div>
    <div class="user-details">
      <div id="userEmail">Loading user...</div>
      <div id="userXP" class="xp-badge">XP: 0</div>
    </div>
  </div>
</div>

  <div class="stage-grid" id="stageContainer"></div>
<div class="activity-box">

<h3>🔥 Live Hacker Activity</h3>

<div id="activityFeed"></div>

</div>

</div>

<footer>© 2026 Itzsos Labs</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { 
getFirestore,
collection,
getDocs,
doc,
getDoc,
setDoc,
query,
orderBy,
limit,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageContainer = document.getElementById("stageContainer");
const userEmail = document.getElementById("userEmail");
const userXP = document.getElementById("userXP");
const logoutBtn = document.getElementById("logoutBtn");

/* AUTH + CYBERSECURITY CHECK */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (!user.emailVerified) {
    alert("Verify your email first!");
    window.location.href = "index.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  // ✅ Create user document if it doesn't exist
  if (!userSnap.exists()) {

  await setDoc(userRef,{
    email:user.email,
    xp:0,
    solvedStages:[],
    role:"",
    selectedField:""
  });

  window.location.href = "selection.html";
  return;
}

  const userData = userSnap.data();

  // 🔐 Only IT (Cybersecurity) allowed
  if (!userData.selectedField || userData.selectedField.trim().toUpperCase() !== "IT") {
  alert("🚫 This page is only for Cybersecurity track.");
  window.location.href = "selection.html";
  return;
}

  const username = userData.username || user.email;

const firstLetter = username.charAt(0).toUpperCase();

document.getElementById("userAvatar").textContent = firstLetter;

userEmail.innerHTML = "<strong>" + (userData.username || user.email) + "</strong>";
userXP.textContent = "XP: " + (userData.xp || 0);

  await loadStages(user, userData);
});

/* LOAD STAGES */
async function loadStages(user, userData) {

  const querySnapshot = await getDocs(collection(db, "stages"));

  if (querySnapshot.empty) {
    stageContainer.innerHTML = "<p>No stages added yet.</p>";
    return;
  }

  const solvedStages = userData.solvedStages || [];

  querySnapshot.forEach((docSnap) => {

    const data = docSnap.data();
    const stageId = docSnap.id;

    const card = document.createElement("div");
    card.classList.add("stage-card");

    if (solvedStages.includes(stageId)) {
      card.classList.add("solved");
    }

    // 🔒 Lock logic: Stage 1 unlocked, others require previous
    let isLocked = false;

    if (data.order > 1) {
      const previousStage = "stage" + (data.order - 1);
      if (!solvedStages.includes(previousStage)) {
        isLocked = true;
      }
    }

    if (isLocked) {
      card.classList.add("locked");
      card.innerHTML = `
        <h3>${data.title} 🔒</h3>
        <p>${data.text}</p>
        <p>XP: ${data.xp}</p>
        <button disabled>Locked</button>
      `;
    } else {
      card.innerHTML = `
        <h3>${data.title}</h3>
        <p>${data.text}</p>
        <p>XP: ${data.xp}</p>
        <button onclick="openStage('${stageId}')">Start</button>
      `;
    }

    stageContainer.appendChild(card);
  });
}

/* 🔥 LIVE ACTIVITY FEED */

const activityFeed = document.getElementById("activityFeed");

const q = query(
collection(db,"activity"),
orderBy("time","desc"),
limit(10)
);

onSnapshot(q,(snapshot)=>{

activityFeed.innerHTML="";

snapshot.forEach(doc=>{

const data = doc.data();

const div = document.createElement("div");
div.className="activity";

div.innerHTML = `
⚡ <strong>${data.username || data.email}</strong> ${data.action}
`;

activityFeed.appendChild(div);

});

});
/* OPEN STAGE */
window.openStage = function(id) {
  window.location.href = "stage.html?id=" + id;
};

/* LOGOUT */
logoutBtn.onclick = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>
