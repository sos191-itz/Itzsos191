<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stages | Itzsos Labs</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}

nav h2 { color:#ff6600; }

nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

.container {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.stage-card {
  background:#111422;
  border:1px solid #00ffdd;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.stage-card:hover {
  transform:scale(1.05);
  border-color:#ff6600;
}

.stage-card h3 {
  color:#ff6600;
}

.stage-card button {
  margin-top:10px;
  padding:8px 12px;
  background:#00ffdd;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#userInfo {
  margin:20px 0;
  color:#ccc;
}

footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #00ffdd;
  margin-top:40px;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs - Stages</h2>
  <button id="logoutBtn">Logout</button>
</nav>

<div class="container">

  <div id="userInfo">Loading user...</div>

  <div class="stage-grid" id="stageContainer">
    <!-- Challenges will load here -->
  </div>

</div>

<footer>© 2026 Itzsos Labs</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* SAME FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageContainer = document.getElementById("stageContainer");
const userInfo = document.getElementById("userInfo");
const logoutBtn = document.getElementById("logoutBtn");

/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (!user.emailVerified) {
    alert("Verify your email first!");
    window.location.href = "index.html";
    return;
  }

  userInfo.innerHTML = `👤 Logged in as: <strong>${user.email}</strong>`;

  loadChallenges();
});

/* LOAD CHALLENGES FROM FIRESTORE */
async function loadChallenges() {

  const querySnapshot = await getDocs(collection(db, "challenges"));

  if (querySnapshot.empty) {
    stageContainer.innerHTML = "<p>No challenges added yet.</p>";
    return;
  }

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const card = document.createElement("div");
    card.classList.add("stage-card");

    card.innerHTML = `
      <h3>${data.title}</h3>
      <p>Difficulty: ${data.difficulty}</p>
      <p>Points: ${data.points}</p>
      <button onclick="openStage('${doc.id}')">Start</button>
    `;

    stageContainer.appendChild(card);
  });
}

/* OPEN SINGLE STAGE */
window.openStage = function(id) {
  window.location.href = "stage.html?id=" + id;
};

/* LOGOUT */
logoutBtn.onclick = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>
