<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
  display:none;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}
nav h2{color:#ff6600;}
nav button{
  background:#ff6600;
  border:none;
  padding:8px 12px;
  margin-left:10px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* USER */
#userBox{
  background:#111422;
  padding:20px;
  border-radius:12px;
  display:flex;
  gap:15px;
  margin-bottom:30px;
}
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  color:#000;
}
.xp{
  background:#00ffdd;
  color:#000;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
}
#xp-bar{
  width:100%;
  height:8px;
  background:#111;
  margin-top:5px;
  border-radius:5px;
}
#xp-fill{
  height:100%;
  width:0%;
  background:#ff6600;
  border-radius:5px;
  transition:1s;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111422;
  padding:20px;
  border-radius:12px;
  border:1px solid #00ffdd;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}
.card.show{
  opacity:1;
  transform:translateY(0);
}
.card:hover{
  transform:scale(1.05);
  border-color:#ff6600;
}
.locked{opacity:0.4;}
.solved{border-color:#00ff99 !important;}

.card img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-top:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px;
  border:none;
  background:#00ffdd;
  cursor:pointer;
  font-weight:bold;
}

/* CHAT */
#chat-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6600;
  padding:14px;
  border-radius:50%;
  font-size:18px;
}
</style>

import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH FIXED */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  document.body.style.display = "block";

  currentUser = user;

  const ref = doc(db, "users", user.uid);
  let snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      username: user.email.split("@")[0],
      xp: 0,
      solvedStages: [],
      solvedDaily: []
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  document.getElementById("username").textContent = data.username;
  document.getElementById("xp").textContent = "XP: " + (data.xp || 0);
  document.getElementById("avatar").textContent = data.username.charAt(0).toUpperCase();

  document.getElementById("xp-fill").style.width = Math.min(data.xp || 0, 100) + "%";

  loadStages(data);
  loadDaily(data);

});

/* STAGES */
async function loadStages(userData){
  const snap = await getDocs(query(collection(db,"stages"),orderBy("order")));
  const solved = userData.solvedStages || [];
  const container = document.getElementById("stageContainer");

  container.innerHTML="";
  let delay = 0;

  snap.forEach(docSnap=>{
    const s = docSnap.data();
    const id = docSnap.id;

    const locked = s.order>1 && !solved.includes("stage"+(s.order-1));

    const card = document.createElement("div");
    card.className = "card " + (locked?"locked":"");

    card.innerHTML = `
      <h3>${s.title} ${locked?"🔒":""}</h3>
      <p>${s.text}</p>
      <p>XP: ${s.xp}</p>
      <button ${locked?"disabled":`onclick="openStage('${id}')"`}>
        ${locked?"Locked":"Start"}
      </button>
    `;

    container.appendChild(card);
    setTimeout(()=>card.classList.add("show"), delay);
    delay+=100;
  });
}

window.openStage = id => location.href="stage.html?id="+id;

/* DAILY */
async function loadDaily(userData){
  const snap = await getDocs(collection(db,"dailyChallenges"));
  const solved = userData.solvedDaily || [];
  const container = document.getElementById("dailyContainer");

  container.innerHTML="";

  snap.forEach(docSnap=>{
    const c = docSnap.data();
    const id = docSnap.id;

    const done = solved.includes(id);

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <h3>${c.title} ${done?"✅":""}</h3>
      <p>${c.text}</p>
      ${c.image ? `<img src="${c.image}">` : ""}
      <p>XP: ${c.xp}</p>
      <button onclick="alert('${c.hint}')">Hint</button>
      <button ${done?"disabled":`onclick="completeDaily('${id}',${c.xp})"`}>
        ${done?"Done":"Start"}
      </button>
    `;

    container.appendChild(card);
    setTimeout(()=>card.classList.add("show"),100);
  });
}
