<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Stages | Itzsos Labs</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#ff6600; }

nav .nav-buttons {
  display:flex;
  gap:10px;
}

nav button {
  background:#ff6600;
  border:none;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* USER BOX */
#userBox {
  margin-bottom:30px;
  padding:20px;
  background:linear-gradient(145deg,#111422,#1a1f35);
  border:1px solid #00ffdd;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,255,221,0.2);
}

.user-info {
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left {
  display:flex;
  align-items:center;
  gap:15px;
}

.avatar {
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  font-weight:bold;
  color:#0f111a;
}

.user-details {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.xp-badge {
  background:#00ffdd;
  color:#0f111a;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
  width:fit-content;
}

/* ACTION BUTTONS */
.actions button {
  margin-left:10px;
}

/* STAGES */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.stage-card {
  background:#111422;
  border:1px solid #00ffdd;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}
.stage-card:hover {
  transform:scale(1.05);
  border-color:#ff6600;
}

.stage-card h3 { color:#ff6600; }

.stage-card button {
  margin-top:10px;
  padding:8px 12px;
  background:#00ffdd;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.stage-card button:disabled {
  background:gray;
}

.locked { opacity:0.5; }
.solved { border-color:lightgreen !important; }

/* PAYPAL */
#paypal-box {
  margin-top:15px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  border-top:1px solid #00ffdd;
  margin-top:40px;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs</h2>
  <div class="nav-buttons">
    <button onclick="window.location.href='chat.html'">Chat 💬</button>
    <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

  <div id="userBox">
    <div class="user-info">

      <div class="left">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-details">
          <div id="userEmail">Loading...</div>
          <div id="userXP" class="xp-badge">XP: 0</div>
        </div>
      </div>

      <div class="actions">
        <button onclick="window.location.href='chat.html'">Open Chat</button>
      </div>

    </div>

    <!-- PAYPAL BUTTON -->
    <div id="paypal-box">
      <script src="https://www.paypal.com/sdk/js?client-id=BAANEM-ym-VkUny86qGnLGSCrXAuYaQlr4XDgcjJtB1A65tn9qFJIAaH61r-Pi5c0kzDKGdfgj5EIKjfuY&components=hosted-buttons&currency=USD"></script>
      <div id="paypal-container-JG97CC8L5EH3W"></div>
      <script>
        paypal.HostedButtons({
          hostedButtonId: "JG97CC8L5EH3W",
        }).render("#paypal-container-JG97CC8L5EH3W");
      </script>
    </div>

  </div>

  <div class="stage-grid" id="stageContainer"></div>

</div>

<footer>© 2026 Itzsos Labs</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageContainer = document.getElementById("stageContainer");
const userEmail = document.getElementById("userEmail");
const userXP = document.getElementById("userXP");
const logoutBtn = document.getElementById("logoutBtn");

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.href="index.html";
  if (!user.emailVerified) {
    alert("Verify email first!");
    return window.location.href="index.html";
  }

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) return window.location.href="selection.html";

  const data = userSnap.data();

  document.getElementById("userAvatar").textContent = user.email[0].toUpperCase();
  userEmail.innerHTML = "<strong>"+user.email+"</strong>";
  userXP.textContent = "XP: " + (data.xp || 0);

  loadStages(data);
});

/* LOAD STAGES */
async function loadStages(userData){
  const snapshot = await getDocs(collection(db,"stages"));
  const solved = userData.solvedStages || [];

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;

    const card = document.createElement("div");
    card.classList.add("stage-card");

    if(solved.includes(id)) card.classList.add("solved");

    let locked = data.order>1 && !solved.includes("stage"+(data.order-1));
    if(locked) card.classList.add("locked");

    card.innerHTML = `
      <h3>${data.title} ${locked?"🔒":""}</h3>
      <p>${data.text}</p>
      <p>XP: ${data.xp}</p>
      <button ${locked?"disabled":`onclick="openStage('${id}')"`}>
        ${locked?"Locked":"Start"}
      </button>
    `;

    stageContainer.appendChild(card);
  });
}

/* OPEN */
window.openStage = id => window.location.href="stage.html?id="+id;

/* LOGOUT */
logoutBtn.onclick = ()=>signOut(auth).then(()=>window.location.href="index.html");
</script>

</body>
</html>
