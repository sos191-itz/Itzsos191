<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Team | Itzsos Labs</title>
<style>
body {
  margin:0;
  font-family:monospace;
  background:#0a0f25;
  color:#00ffdd;
}
nav {
  background:#1a0f3c;
  border-bottom:1px solid #8000ff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#8000ff; }
nav button {
  background:#8000ff;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111133;
  border:1px solid #8000ff;
  border-radius:10px;
}
input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#000022;
  border:1px solid #8000ff;
  color:white;
}
button {
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
}
.submit { background:#00ffdd; color:#000; }
.hintBtn { background:#8000ff; color:#fff; }
#result, #hintBox { margin-top:15px; font-weight:bold; }
.locked { font-size:1.2rem; color:orange; text-align:center; margin-top:20px; opacity:0.6; }
#progressBar {
  height:12px;
  width:0%;
  background:linear-gradient(90deg,#00ffdd,#00aa88);
  transition:width 0.5s ease;
}
#sqlLoginArea input { margin-top:5px; }
#sqlLoginArea button { margin-top:10px; }
#nextStageBtn {
  margin-top:15px;
  padding:10px;
  background:orange;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  display:none;
  border-radius:5px;
}
</style>
</head>
<body>

<nav>
  <h2>Purple Team - Itzsos Labs</h2>
  <button id="backBtn">Back</button>
</nav>

<div class="container">

  <!-- Progress -->
  <div id="progressWrapper" style="margin-bottom:20px;">
    <div id="progressText" style="margin-bottom:5px; font-weight:bold;">Loading progress...</div>
    <div style="background:#111133; border-radius:8px; overflow:hidden;">
      <div id="progressBar"></div>
    </div>
  </div>

  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>
  <div id="result"></div>
  <div id="hintBox"></div>
  <div id="sqlLoginArea"></div>
  <button id="nextStageBtn">Go To Next Stage →</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageId = new URLSearchParams(window.location.search).get("id");
const TOTAL_STAGES = 50;

const stageTitleEl = document.getElementById("stageTitle");
const stageTextEl = document.getElementById("stageText");
const defaultFlagArea = document.getElementById("defaultFlagArea");
const resultEl = document.getElementById("result");
const hintBoxEl = document.getElementById("hintBox");
const sqlLoginArea = document.getElementById("sqlLoginArea");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const nextStageBtn = document.getElementById("nextStageBtn");

let currentUser = null;
let stageXP = 0;
let correctAnswer = "";
let stageHint = "";
let currentOrder = 0;

// Back button
document.getElementById("backBtn").onclick = ()=>{ window.location.href="stages.html"; }

// Auth
onAuthStateChanged(auth, async (user)=>{
  if(!user) return window.location.href="index.html";
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  if(!userSnap.exists()) return window.location.href="selection.html";
  const userData = userSnap.data();

  await loadStage(userData);
});

// Load stage
async function loadStage(userData){
  const stageRef = doc(db,"stages",stageId);
  const stageSnap = await getDoc(stageRef);
  if(!stageSnap.exists()){ stageTitleEl.textContent="Stage not found"; return; }

  const stageData = stageSnap.data();
  currentOrder = stageData.order;
  correctAnswer = stageData.answer || "";
  stageXP = stageData.xp || 0;
  stageHint = stageData.hint || "No hint available";

  const solvedStages = userData.solvedStages || [];
  let highestSolvedOrder = 0;
  solvedStages.forEach(s=>{
    const n = parseInt(s.replace("stage",""));
    if(!isNaN(n) && n>highestSolvedOrder) highestSolvedOrder = n;
  });

  // Lock logic
  if(currentOrder > highestSolvedOrder + 1){
    stageTitleEl.textContent = stageData.title + " 🔒 Locked";
    stageTextEl.textContent = "";
    defaultFlagArea.style.display = "none";
    document.getElementById("hintBtn").style.display = "none";
    resultEl.style.display = "none";
    hintBoxEl.style.display = "none";
    sqlLoginArea.style.display = "none";

    const percentage = Math.round((highestSolvedOrder/TOTAL_STAGES)*100);
    progressText.textContent = "Stage " + currentOrder + " / " + TOTAL_STAGES + " (" + percentage + "% completed)";
    progressBar.style.width = percentage + "%";
    return;
  }

  // Stage unlocked
  stageTitleEl.textContent = stageData.title;
  stageTextEl.textContent = stageData.text;
  defaultFlagArea.style.display = "block";
  document.getElementById("hintBtn").style.display = "inline-block";
  resultEl.style.display = "block";
  hintBoxEl.style.display = "block";
  sqlLoginArea.style.display = "block";

  const percentage = Math.round((highestSolvedOrder/TOTAL_STAGES)*100);
  progressText.textContent = "Stage " + currentOrder + " / " + TOTAL_STAGES + " (" + percentage + "% completed)";
  progressBar.style.width = percentage + "%";

  // Stage 3 SQL login
  if(stageId==="stage3"){
    defaultFlagArea.style.display="none";
    sqlLoginArea.innerHTML = `
      <h3>Admin Login</h3>
      <input type="text" id="loginUser" placeholder="Username">
      <input type="password" id="loginPass" placeholder="Password">
      <button id="loginBtnSim" class="submit">Login</button>
      <div id="loginResult"></div>
    `;
    document.getElementById("loginBtnSim").onclick = async ()=>{
      const userRef = doc(db,"users",currentUser.uid);
      const userSnap = await getDoc(userRef);
      const solved = userSnap.exists()?userSnap.data().solvedStages||[]:[];
      if(solved.includes(stageId)){
        document.getElementById("loginResult").textContent="⚠️ Already solved!";
        return;
      }
      const username = document.getElementById("loginUser").value;
      if(username.includes("' OR 1=1")){
        document.getElementById("loginResult").innerHTML="🎉 Access Granted!<br>Flag: ITZSOS{sql_bypass_success}";
        await updateDoc(userRef,{
          solvedStages: arrayUnion(stageId),
          xp: increment(stageXP)
        });
        showNextStage(stageData.order);
      } else {
        document.getElementById("loginResult").textContent="Access Denied.";
      }
    };
  }
}

// Hint button
document.getElementById("hintBtn").onclick = ()=>{
  hintBoxEl.textContent = "💡 Hint: " + stageHint;
};

// Flag submit
document.getElementById("submitBtn").onclick = async ()=>{
  if(!currentUser) return;
  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  if(input !== correctAnswer.trim().toLowerCase()){
    resultEl.textContent="❌ Wrong flag!"; resultEl.style.color="red"; return;
  }

  const userRef = doc(db,"users",currentUser.uid);
  const userSnap = await getDoc(userRef);
  const solvedStages = userSnap.exists()?userSnap.data().solvedStages||[]:[];
  if(solvedStages.includes(stageId)){
    resultEl.textContent="⚠️ Already solved!"; resultEl.style.color="yellow"; return;
  }

  await updateDoc(userRef,{
    solvedStages: arrayUnion(stageId),
    xp: increment(stageXP)
  });

  resultEl.textContent="✅ Correct! +" + stageXP + " XP";
  resultEl.style.color="lightgreen";

  showNextStage(currentOrder);
};

// Show next stage button
function showNextStage(order){
  const nextStageId = "stage" + (order + 1);
  nextStageBtn.style.display="block";
  nextStageBtn.onclick = ()=>{ window.location.href="stage.html?id=" + nextStageId; }
}
</script>
</body>
</html>
