<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

/* CONTAINER */
.container {
  padding:20px;
  max-width:1100px;
  margin:auto;
}

/* USER */
#userBox {
  background:#111422;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  display:flex;
  gap:15px;
  align-items:center;
}
.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

/* GRID */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.stage-card {
  background:#111422;
  padding:15px;
  border-radius:10px;
  border:1px solid #00ffdd;
}
.stage-card img {
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-top:10px;
}

.locked { opacity:0.4; }

button {
  margin-top:10px;
  padding:6px;
  border:none;
  background:#00ffdd;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs</h2>
  <div>
    <button onclick="location.href='profile.html'">Profile</button>
    <button onclick="location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

<div id="userBox">
  <div class="avatar" id="avatar">U</div>
  <div>
    <div id="username">Loading...</div>
    <div id="xp">XP: 0</div>
  </div>
</div>

<h2>🔥 Daily Challenges</h2>
<div id="dailyContainer" class="stage-grid"></div>

<h2>🎯 Stages</h2>
<div id="stageContainer" class="stage-grid"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH FIX (NO REDIRECT LOOP) */
onAuthStateChanged(auth, async (user) => {

  if (user === null) return; // ✅ DO NOT redirect

  currentUser = user;

  const ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      username:"Hacker"+Math.floor(Math.random()*9999),
      xp:0,
      solvedStages:[],
      solvedDaily:[]
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  document.getElementById("username").textContent = data.username || "User";
  document.getElementById("xp").textContent = "XP: " + (data.xp||0);
  document.getElementById("avatar").textContent = (data.username||"U")[0].toUpperCase();

  loadStages(data);
  loadDaily(data);
});

/* STAGES */
async function loadStages(userData){
  const snap = await getDocs(query(collection(db,"stages"),orderBy("order")));
  const solved = userData.solvedStages || [];

  const container = document.getElementById("stageContainer");
  container.innerHTML="";

  snap.forEach(docSnap=>{
    const s = docSnap.data();
    const id = docSnap.id;

    let prev = "stage"+(s.order-1);
    let locked = s.order>1 && !solved.includes(prev);

    const card = document.createElement("div");
    card.className="stage-card "+(locked?"locked":"");

    card.innerHTML = `
      <h3>${s.title} ${locked?"🔒":""}</h3>
      <p>${s.text}</p>
      <p>XP: ${s.xp}</p>
      <button ${locked?"disabled":""} onclick="openStage('${id}')">
        ${locked?"Locked":"Start"}
      </button>
    `;

    container.appendChild(card);
  });
}

window.openStage = (id)=>{
  location.href="stage.html?id="+id;
};

/* DAILY (FIXED — NO AUTO XP) */
async function loadDaily(userData){
  const snap = await getDocs(collection(db,"dailyChallenges"));
  const solved = userData.solvedDaily || [];

  const container = document.getElementById("dailyContainer");
  container.innerHTML="";

  snap.forEach(docSnap=>{
    const c = docSnap.data();
    const id = docSnap.id;

    const done = solved.includes(id);

    const card = document.createElement("div");
    card.className="stage-card";

    card.innerHTML = `
      <h3>${c.title} ${done?"✅":""}</h3>
      <p>${c.text}</p>

      ${c.image ? `<img src="${c.image}">` : ""}

      <input id="answer-${id}" placeholder="Enter answer">

      <p>XP: ${c.xp}</p>

      <button onclick="alert('${c.hint || "No hint"}')">Hint</button>

      <button ${done?"disabled":""} onclick="checkAnswer('${id}','${c.answer}',${c.xp})">
        ${done?"Solved":"Submit"}
      </button>
    `;

    container.appendChild(card);
  });
}

/* ANSWER CHECK */
window.checkAnswer = async (id, correct, xp) => {

  const input = document.getElementById("answer-"+id).value.trim();

  if(input.toLowerCase() !== correct.toLowerCase()){
    alert("❌ Wrong answer");
    return;
  }

  const ref = doc(db,"users",currentUser.uid);
  const snap = await getDoc(ref);
  const data = snap.data();

  let solved = data.solvedDaily || [];

  if(!solved.includes(id)){
    solved.push(id);

    await setDoc(ref,{
      solvedDaily: solved,
      xp:(data.xp||0)+xp
    },{merge:true});

    alert("✅ Correct! XP +" + xp);
    location.reload();
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>{
  signOut(auth).then(()=>location.href="index.html");
};
</script>

</body>
</html>
