<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Stages | Itzsos Labs</title><style>

body{
margin:0;
font-family:monospace;
background:#0f111a;
color:#00ffdd;
}

/* NAV */

nav{
background:#111422;
border-bottom:1px solid #00ffdd;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

nav h2{
color:#ff6600;
}

nav button{
background:#ff6600;
border:none;
padding:8px 15px;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:40px auto;
padding:20px;
}

/* USER BOX */

#userBox{
margin-bottom:30px;
padding:20px;
background:#111422;
border:1px solid #00ffdd;
border-radius:10px;
}

.user-info{
display:flex;
align-items:center;
gap:15px;
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(45deg,#ff6600,#00ffdd);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
color:#0f111a;
}

.xp-badge{
background:#00ffdd;
color:#0f111a;
padding:5px 10px;
border-radius:20px;
font-weight:bold;
display:inline-block;
margin-top:5px;
}

/* STAGES */

.stage-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.stage-card{
background:#111422;
border:1px solid #00ffdd;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.stage-card:hover{
transform:scale(1.05);
border-color:#ff6600;
}

.stage-card h3{
color:#ff6600;
}

.stage-card button{
margin-top:10px;
padding:8px 12px;
background:#00ffdd;
border:none;
cursor:pointer;
font-weight:bold;
}

.stage-card button:disabled{
background:gray;
cursor:not-allowed;
}

.locked{
opacity:0.5;
}

.solved{
border-color:lightgreen !important;
}

/* ACTIVITY */

#activityFeed{
margin-top:20px;
background:#111422;
border:1px solid #00ffdd;
border-radius:10px;
padding:15px;
max-height:250px;
overflow-y:auto;
}

.activity{
padding:6px;
border-bottom:1px solid #222;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
border-top:1px solid #00ffdd;
margin-top:40px;
}

</style></head><body><nav><h2>Itzsos Labs - Cybersecurity Track</h2><div>
<button onclick="window.location.href='profile.html'">Profile</button>
<button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
<button id="logoutBtn">Logout</button>
</div></nav><div class="container"><!-- USER PROFILE --><div id="userBox"><div class="user-info"><div class="avatar" id="avatar">U</div><div><div id="username">Loading...</div><div id="userXP" class="xp-badge">XP: 0</div></div></div></div><!-- STAGES --><div id="stageContainer" class="stage-grid"></div><!-- ACTIVITY FEED --><h3 style="margin-top:40px;color:#ff6600;">🔥 Live Hacker Activity</h3><div id="activityFeed"></div></div><footer>
© 2026 Itzsos Labs
</footer><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
query,
orderBy,
limit,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {
apiKey:"AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
authDomain:"itzsos-labs.firebaseapp.com",
projectId:"itzsos-labs",
storageBucket:"itzsos-labs.firebasestorage.app",
messagingSenderId:"1012826517121",
appId:"1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* DOM */

const stageContainer=document.getElementById("stageContainer");

const usernameBox=document.getElementById("username");

const avatar=document.getElementById("avatar");

const xpBox=document.getElementById("userXP");

const activityFeed=document.getElementById("activityFeed");

const logoutBtn=document.getElementById("logoutBtn");

/* AUTH */

onAuthStateChanged(auth,async(user)=>{

if(!user) return window.location.href="index.html";

const userRef=doc(db,"users",user.uid);

const snap=await getDoc(userRef);

if(!snap.exists()) return;

const data=snap.data();

const username=data.username || user.email;

usernameBox.textContent=username;

avatar.textContent=username.charAt(0).toUpperCase();

xpBox.textContent="XP: "+(data.xp || 0);

loadStages(data);

});

/* LOAD STAGES */

async function loadStages(userData){

stageContainer.innerHTML="";

const solved=userData.solvedStages || [];

const snapshot=await getDocs(query(collection(db,"stages"),orderBy("order")));

snapshot.forEach(docSnap=>{

const stage=docSnap.data();

const id=docSnap.id;

const card=document.createElement("div");

card.classList.add("stage-card");

if(solved.includes(id)) card.classList.add("solved");

let locked=stage.order>1 && !solved.includes("stage"+(stage.order-1));

card.classList.toggle("locked",locked);

card.innerHTML=`

<h3>${stage.title} ${locked?"🔒":""}</h3>

<p>${stage.text}</p>

<p>XP: ${stage.xp}</p>

<button ${locked?"disabled":`onclick="openStage('${id}')"`}>
${locked?"Locked":"Start"}
</button>

`;

stageContainer.appendChild(card);

});

}

/* OPEN STAGE */

window.openStage=(id)=>{
window.location.href="stage.html?id="+id;
};

/* LOGOUT */

logoutBtn.onclick=()=>{
signOut(auth).then(()=>{
window.location.href="index.html";
});
};

/* LIVE ACTIVITY FEED */

const q=query(
collection(db,"activity"),
orderBy("time","desc"),
limit(10)
);

onSnapshot(q,(snapshot)=>{

activityFeed.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

const username=data.username || "Unknown";

const action=data.action || "did something";

const item=document.createElement("div");

item.className="activity";

item.textContent=`⚡ ${username} ${action}`;

activityFeed.appendChild(item);

});

});

</script></body>
</html>
