<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs - Cybersecurity Stages</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* === BASE === */
body {
  margin:0;
  font-family: 'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
  overflow-x:hidden;
}
a { text-decoration:none; color:inherit; }

/* === NAV === */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background: rgba(17,20,34,0.95);
  border-bottom:1px solid #00ffdd;
  box-shadow: 0 0 15px #00ffdd44 inset;
}
nav h2 { color:#ff6600; text-shadow:0 0 10px #ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  box-shadow:0 0 10px #ff6600,0 0 20px #00ffdd;
  transition:0.3s;
}
nav button:hover { background:#00ffdd; color:black; transform:scale(1.05); }

/* === USER BOX === */
.container { max-width:1100px; margin:40px auto; padding:0 20px; }
#userBox {
  background: rgba(17,20,34,0.85);
  border:1px solid #00ffdd;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  box-shadow:0 0 25px #00ffdd55 inset;
  backdrop-filter:blur(10px);
}
.user-info { display:flex; align-items:center; gap:15px; }
.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background: linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:1.8rem;
  color:#0f111a;
  text-shadow:0 0 5px #fff;
}
.user-details { display:flex; flex-direction:column; gap:6px; }
.xp-badge { background:#00ffdd; color:#0f111a; padding:5px 12px; border-radius:20px; font-weight:bold; width:fit-content; text-shadow:0 0 5px #111; }
#xp-bar { height:10px; width:100%; background:#111422; border-radius:6px; overflow:hidden; margin-top:6px; }
#xp-bar-fill { height:100%; width:0%; background:#ff6600; transition:width 1s ease; }

/* === STAGE GRID === */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* === STAGE CARD === */
.stage-card {
  background: rgba(17,20,34,0.7);
  border:1px solid #00ffdd;
  border-radius:12px;
  padding:20px;
  transform:translateY(20px);
  opacity:0;
  transition:0.5s;
  box-shadow:0 0 15px #00ffdd33 inset;
  cursor:pointer;
  backdrop-filter:blur(5px);
}
.stage-card.show { transform:translateY(0); opacity:1; }
.stage-card:hover { transform:scale(1.05) rotateY(3deg); border-color:#ff6600; box-shadow:0 0 25px #ff6600,0 0 40px #00ffdd; }
.stage-card h3 { color:#ff6600; margin-bottom:10px; text-shadow:0 0 5px #ff6600; }
.stage-card p { color:#ccc; line-height:1.4; }
.stage-card button {
  margin-top:10px; padding:8px 12px; background:#00ffdd; border:none; border-radius:6px; font-weight:bold;
  cursor:pointer; transition:0.3s; box-shadow:0 0 5px #00ffdd,0 0 10px #ff6600;
}
.stage-card button:hover { background:#ff6600; color:black; transform:scale(1.05); }
.stage-card button:disabled { background:gray; cursor:not-allowed; }
.locked { opacity:0.4; filter:blur(0.5px); }
.solved { border-color:#00ff99 !important; animation: solvedGlow 1.5s infinite alternate; }
@keyframes solvedGlow {
  0% { box-shadow:0 0 10px #00ff99; transform:scale(1); }
  50% { box-shadow:0 0 25px #00ff99; transform:scale(1.02); }
  100% { box-shadow:0 0 10px #00ff99; transform:scale(1); }
}

/* === CHAT === */
#chat-toggle { position:fixed; bottom:20px; right:20px; padding:10px 15px; border:none; background:#ff6600; color:black; font-weight:bold; cursor:pointer; border-radius:12px; z-index:25; box-shadow:0 0 15px #ff6600,0 0 20px #00ffdd; transition:0.3s; }
#chat-toggle:hover { background:#00ffdd; color:black; transform:scale(1.05);}
#chat-container { display:none; position:fixed; bottom:70px; right:20px; width:300px; max-height:400px; background:rgba(0,0,0,0.85); border:1px solid #00ffdd; border-radius:12px; padding:10px; overflow:hidden; z-index:20; }

/* === DONATION MODAL === */
#donationModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:50; justify-content:center; align-items:center; }
#donationModal .modal-content { background:#111422; padding:20px; border:1px solid #00ffdd; border-radius:12px; width:300px; text-align:center; }

footer { text-align:center; padding:20px; border-top:1px solid #00ffdd; margin-top:40px; text-shadow:0 0 10px #00ffdd; }
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs - Cybersecurity Track</h2>
  <div>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

  <div id="userBox">
    <div class="user-info">
      <div class="avatar" id="userAvatar">U</div>
      <div class="user-details">
        <div id="userName">Loading user...</div>
        <div id="userXP" class="xp-badge">XP: 0</div>
        <div id="xp-bar"><div id="xp-bar-fill"></div></div>
        <button id="donate-btn">Donate</button>
      </div>
    </div>
  </div>

  <div class="stage-grid" id="stageContainer"></div>

</div>

<!-- Chat -->
<button id="chat-toggle">Open Chat</button>
<div id="chat-container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
    <span id="username">User</span>
    <button id="chat-close" style="background:#ff6600;border:none;padding:2px 6px;color:black;cursor:pointer;">X</button>
  </div>
  <div id="chat-messages" style="height:280px; overflow-y:auto; background:#111422; padding:5px; border-radius:8px;"></div>
  <div style="display:flex; gap:5px; margin-top:5px;">
    <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1; padding:5px; border-radius:6px; border:none;">
    <button id="send-btn" style="padding:5px 8px; background:#00ffdd; border:none; border-radius:6px; cursor:pointer;">Send</button>
  </div>
</div>

<!-- Donation Modal -->
<div id="donationModal">
  <div class="modal-content">
    <h3>Support Itzsos Labs</h3>
    <!-- Example PayPal hosted button -->
    <div id="paypal-container-BSAK5P9RZ486S"></div>
    <button id="donation-close">Close</button>
  </div>
</div>

<footer>© 2026 Itzsos Labs</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* === FIREBASE CONFIG === */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* === ELEMENTS === */
const stageContainer = document.getElementById("stageContainer");
const userName = document.getElementById("userName");
const userXP = document.getElementById("userXP");
const xpFill = document.getElementById("xp-bar-fill");
const logoutBtn = document.getElementById("logoutBtn");

const chatContainer = document.getElementById("chat-container");
const chatMessages = document.getElementById("chat-messages");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const usernameDisplay = document.getElementById("username");
const chatClose = document.getElementById("chat-close");
const chatToggle = document.getElementById("chat-toggle");

const donateBtn = document.getElementById("donate-btn");
const donationModal = document.getElementById("donationModal");
const donationClose = document.getElementById("donation-close");

let currentUser, currentUsername;

/* === AUTH + LOAD === */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return window.location.href="index.html";
  if(!user.emailVerified){ alert("Verify your email!"); return window.location.href="index.html"; }

  currentUser=user;
  const userRef=doc(db,"users",user.uid);
  let userSnap = await getDoc(userRef);

  if(!userSnap.exists()){
    await setDoc(userRef,{email:user.email, username:"Hacker", xp:0, solvedStages:[], solvedDaily:{}});
    userSnap = await getDoc(userRef);
  }

  const data = userSnap.data();
  currentUsername = data.username || "Hacker";

  document.getElementById("userAvatar").textContent = currentUsername.charAt(0).toUpperCase();
  userName.innerHTML = `<strong>${currentUsername}</strong>`;
  userXP.textContent = "XP: " + (data.xp||0);
  xpFill.style.width = Math.min(data.xp||0,100)+"%";
  usernameDisplay.textContent = currentUsername;

  loadStages(data);
  loadChat();
});

/* === LOGOUT === */
logoutBtn.onclick = ()=>signOut(auth).then(()=>window.location.href="index.html");

/* === LOAD STAGES === */
async function loadStages(userData){
  stageContainer.innerHTML="";
  const snapshot = await getDocs(query(collection(db,"stages"),orderBy("order")));
  const solved = userData.solvedStages||[];
  let delay=0;
  snapshot.forEach(docSnap=>{
    const stage=docSnap.data();
    const stageId=docSnap.id;
    const card=document.createElement("div");
    card.classList.add("stage-card");
    if(solved.includes(stageId)) card.classList.add("solved");
    let locked = stage.order>1 && !solved.includes("stage"+(stage.order-1));
    card.classList.toggle("locked",locked);
    card.innerHTML=`
      <h3>${stage.title} ${locked?"🔒":""}</h3>
      <p>${stage.text}</p>
      <p>XP: ${stage.xp}</p>
      <button ${locked?"disabled":`onclick="openStage('${stageId}')"`}>${locked?"Locked":"Start"}</button>
    `;
    stageContainer.appendChild(card);
    setTimeout(()=>card.classList.add("show"),delay);
    delay+=120;
  });
}

window.openStage=id=>window.location.href="stage.html?id="+id;

/* === CHAT === */
function loadChat(){
  const q=query(collection(db,"chatMessages"),orderBy("timestamp","asc"));
  onSnapshot(q,snapshot=>{
    chatMessages.innerHTML="";
    snapshot.forEach(doc=>{
      const data=doc.data();
      const msgEl=document.createElement("div");
      msgEl.style.padding="6px"; msgEl.style.marginBottom="6px";
      msgEl.style.background="#0f111a"; msgEl.style.borderRadius="6px";
      msgEl.style.borderLeft="3px solid #00ffdd";
      msgEl.innerHTML=`<div style="color:#00ffdd;font-weight:bold;">${data.user}</div><div style="color:#ccc;">${data.text}</div>`;
      chatMessages.appendChild(msgEl);
    });
    chatMessages.scrollTop=chatMessages.scrollHeight;
  });
}
sendBtn.addEventListener("click",async()=>{if(!currentUser||msgInput.value.trim()==="")return; await addDoc(collection(db,"chatMessages"),{user:currentUsername,text:msgInput.value,timestamp:serverTimestamp()}); msgInput.value="";});
msgInput.addEventListener("keypress",e=>{ if(e.key==="Enter") sendBtn.click(); });
chatClose.onclick=()=>chatContainer.style.display="none";
chatToggle.onclick=()=>chatContainer.style.display=chatContainer.style.display==="none"?"block":"none";

/* === DONATION MODAL === */
donateBtn.onclick=()=>donationModal.style.display="flex";
donationClose.onclick=()=>donationModal.style.display="none";

/* === PAYPAL BUTTON === */
const script = document.createElement('script');
script.src="https://www.paypal.com/sdk/js?client-id=BAANEM-ym-VkUny86qGnLGSCrXAuYaQlr4XDgcjJtB1A65tn9qFJIAaH61r-Pi5c0kzDKGdfgj5EIKjfuY&currency=USD";
script.onload = () => {
  paypal.Buttons({
    style:{layout:'vertical', color:'gold', shape:'pill', label:'donate'},
    createOrder: function(data, actions){ return actions.order.create({ purchase_units:[{amount:{value:'1'}}]}); },
    onApprove: function(data, actions){ return actions.order.capture().then(()=>alert('Thanks for donating!')); }
  }).render('#paypal-container-BSAK5P9RZ486S');
};
document.body.appendChild(script);

/* === PARTICLES === */
const particles=document.createElement('div'); particles.classList.add('particles'); document.body.appendChild(particles);
for(let i=0;i<80;i++){ const span=document.createElement('span'); span.style.width=`${Math.random()*3+2}px`; span.style.height=span.style.width; span.style.top=`${Math.random()*100}%`; span.style.left=`${Math.random()*100}%`; span.style.animationDuration=`${Math.random()*5+5}s`; span.style.opacity=Math.random(); particles.appendChild(span); }
</script>
</body>
</html>
