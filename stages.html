<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0b0f1a;
  color:#00ffdd;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}

nav button {
  margin-left:10px;
  background:#6a00ff;
  border:none;
  padding:8px;
  cursor:pointer;
  color:white;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* USER */
#userBox {
  display:flex;
  gap:10px;
  background:#111422;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(45deg,#6a00ff,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:#111422;
  padding:15px;
  border-radius:10px;
  border:1px solid #6a00ff;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 15px #6a00ff;
}

.card img {
  width:100%;
  max-height:160px;
  object-fit:cover;
  border-radius:8px;
}

.locked {
  opacity:0.4;
}

/* BUTTON */
button {
  margin-top:8px;
  padding:8px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  color:black;
  border-radius:6px;
  font-weight:bold;
}

button:disabled {
  background:#444;
  color:#888;
  cursor:not-allowed;
}

/* CHAT */
#chatBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6600;
  padding:14px;
  border-radius:50%;
  font-weight:bold;
}

/* SECTION TITLE */
h2 {
  border-left:4px solid #6a00ff;
  padding-left:10px;
}
</style>
</head>

<body>

<nav>
  <h3>🟣 Itzsos Labs</h3>
  <div>
    <button onclick="location.href='profile.html'">Profile</button>
    <button onclick="location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

<!-- USER -->
<div id="userBox">
  <div class="avatar" id="avatar">U</div>
  <div>
    <div id="username">Loading...</div>
    <div id="xp">XP: 0</div>
  </div>
</div>

<!-- STAGES -->
<h2>🎯 Stages</h2>
<div id="stages" class="grid"></div>

</div>

<!-- CHAT BUTTON -->
<button id="chatBtn" onclick="location.href='chat.html'">💬</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="index.html";
    return;
  }

  currentUser = user;

  const ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      username:"Hacker"+Math.floor(Math.random()*9999),
      xp:0,
      solvedStages:[]
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  document.getElementById("username").textContent = data.username;
  document.getElementById("xp").textContent = "XP: "+(data.xp||0);
  document.getElementById("avatar").textContent = data.username[0].toUpperCase();

  loadStages(data);
});

/* LOAD STAGES */
async function loadStages(userData){
  const snap = await getDocs(collection(db,"stages"));
  const solved = userData.solvedStages || [];

  const container = document.getElementById("stages");
  container.innerHTML="";

  let index = 1;

  snap.forEach(docSnap=>{
    const s = docSnap.data();
    const id = docSnap.id;

    const locked = index > 1 && !solved.includes("stage"+(index-1));

    const card = document.createElement("div");
    card.className="card "+(locked?"locked":"");

    card.innerHTML = `
      <h4>${s.title || id}</h4>
      <p>${s.description || "Cybersecurity challenge stage"}</p>

      ${s.image ? `<img src="${s.image}">` : ""}

      <button ${locked?"disabled":`onclick="openStage('${id}')"`}>
        ${locked?"🔒 Locked":"🚀 Start"}
      </button>
    `;

    container.appendChild(card);
    index++;
  });
}

window.openStage = id=>{
  location.href="stage.html?id="+id;
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>{
  signOut(auth).then(()=>location.href="index.html");
};
</script>

</body>
</html>
