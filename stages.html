<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itzsos Labs Hacking Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Itzsos Labs: Hacking Challenge</h1>
    <div id="user-profile">
      <img id="avatar" src="default-avatar.png" alt="Profile Avatar">
      <span id="username">Player1</span>
    </div>
  </header>

  <main>
    <div id="stage-container">
      <!-- Stage content will be loaded here dynamically -->
    </div>
    <div id="hint-container">
      <button id="show-hint">Show Hint</button>
      <p id="hint-text"></p>
    </div>
    <div id="answer-container">
      <input type="text" id="answer-input" placeholder="Enter your answer">
      <button id="submit-answer">Submit</button>
      <p id="feedback"></p>
    </div>
  </main>

  <script src="stages.js"></script>
</body>
</html>
