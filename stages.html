/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return window.location.href="index.html";

  currentUser = user;

  const ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      username:user.email.split("@")[0],
      xp:0,
      solvedStages:[],
      solvedDaily:{}
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  document.getElementById("username").innerText = data.username;
  document.getElementById("xp").innerText = "XP: "+data.xp;
  document.getElementById("avatar").innerText = data.username[0].toUpperCase();

  loadStages(data);
  loadDaily(data);
  loadChat(data.username);
});

/* STAGES */
async function loadStages(userData){
  const container = document.getElementById("stageContainer");
  container.innerHTML="";

  const snap = await getDocs(query(collection(db,"stages"),orderBy("order")));
  const solved = userData.solvedStages || [];

  snap.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;

    let locked = data.order>1 && !solved.includes("stage"+(data.order-1));

    const card = document.createElement("div");
    card.className = "stage-card";

    if(locked) card.classList.add("locked");
    if(solved.includes(id)) card.classList.add("solved");

    card.innerHTML = `
      <h3>${data.title}</h3>
      <p>${data.text}</p>
      <button ${locked?"disabled":""} onclick="openStage('${id}')">
        ${locked?"Locked":"Start"}
      </button>
    `;

    container.appendChild(card);
  });
}

window.openStage = (id)=> window.location.href="stage.html?id="+id;

/* DAILY */
async function loadDaily(userData){
  const container = document.getElementById("dailyContainer");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"dailyChallenges"));
  const today = new Date().toISOString().slice(0,10);
  const solved = userData.solvedDaily?.[today] || [];

  snap.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;

    const done = solved.includes(id);

    const card = document.createElement("div");
    card.className="stage-card";

    if(done) card.classList.add("solved");

    card.innerHTML=`
      <h3>${data.title}</h3>
      <p>${data.text}</p>
      <button ${done?"disabled":""} onclick="completeDaily('${id}',${data.xp})">
        ${done?"Done":"Complete"}
      </button>
    `;

    container.appendChild(card);
  });
}

window.completeDaily = async(id,xp)=>{
  const ref = doc(db,"users",currentUser.uid);
  const snap = await getDoc(ref);
  const data = snap.data();

  const today = new Date().toISOString().slice(0,10);
  let solved = data.solvedDaily || {};
  if(!solved[today]) solved[today]=[];

  solved[today].push(id);

  await setDoc(ref,{
    solvedDaily:solved,
    xp:(data.xp||0)+xp
  },{merge:true});

  alert("XP +"+xp);
  location.reload();
};
