<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Stages | Itzsos Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* === BASE === */
body {
  margin:0;
  font-family: 'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
  overflow-x:hidden;
}
a { text-decoration:none; color:inherit; }

/* === NAV === */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background: rgba(17,20,34,0.95);
  border-bottom:1px solid #00ffdd;
  box-shadow: 0 0 15px #00ffdd44 inset;
}
nav h2 { color:#ff6600; text-shadow:0 0 10px #ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  box-shadow:0 0 10px #ff6600,0 0 20px #00ffdd;
  transition:0.3s;
}
nav button:hover { background:#00ffdd; color:black; transform:scale(1.05); }

/* === USER BOX === */
.container { max-width:1100px; margin:40px auto; padding:0 20px; }
#userBox {
  background: rgba(17,20,34,0.85);
  border:1px solid #00ffdd;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  box-shadow:0 0 25px #00ffdd55 inset;
  backdrop-filter:blur(10px);
}
.user-info { display:flex; align-items:center; gap:15px; }
.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background: linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:1.8rem;
  color:#0f111a;
  text-shadow:0 0 5px #fff;
}
.user-details { display:flex; flex-direction:column; gap:6px; }
.xp-badge { background:#00ffdd; color:#0f111a; padding:5px 12px; border-radius:20px; font-weight:bold; width:fit-content; text-shadow:0 0 5px #111; }
#buyXpBtn { margin-top:8px; padding:8px 12px; border:none; border-radius:6px; background:#ff6600; color:black; font-weight:bold; cursor:pointer; transition:0.3s; }
#buyXpBtn:hover { background:#00ffdd; }

/* === STAGE GRID === */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* === STAGE CARD === */
.stage-card {
  background: rgba(17,20,34,0.7);
  border:1px solid #00ffdd;
  border-radius:12px;
  padding:20px;
  transform:translateY(20px);
  opacity:0;
  transition:0.5s;
  box-shadow:0 0 15px #00ffdd33 inset;
  cursor:pointer;
  backdrop-filter:blur(5px);
}
.stage-card.show { transform:translateY(0); opacity:1; }
.stage-card:hover { transform:scale(1.05) rotateY(3deg); border-color:#ff6600; box-shadow:0 0 25px #ff6600,0 0 40px #00ffdd; }
.stage-card h3 { color:#ff6600; margin-bottom:10px; text-shadow:0 0 5px #ff6600; }
.stage-card p { color:#ccc; line-height:1.4; }
.stage-card button {
  margin-top:10px; padding:8px 12px; background:#00ffdd; border:none; border-radius:6px; font-weight:bold;
  cursor:pointer; transition:0.3s; box-shadow:0 0 5px #00ffdd,0 0 10px #ff6600;
}
.stage-card button:hover { background:#ff6600; color:black; transform:scale(1.05); }
.stage-card button:disabled { background:gray; cursor:not-allowed; }
.locked { opacity:0.4; filter:blur(0.5px); }
.solved { border-color:#00ff99 !important; animation: solvedGlow 1.5s infinite alternate; }
@keyframes solvedGlow {
  0% { box-shadow:0 0 10px #00ff99; transform:scale(1); }
  50% { box-shadow:0 0 25px #00ff99; transform:scale(1.02); }
  100% { box-shadow:0 0 10px #00ff99; transform:scale(1); }
}

/* === FOOTER === */
footer { text-align:center; padding:20px; border-top:1px solid #00ffdd; margin-top:40px; text-shadow:0 0 10px #00ffdd; }

/* === CHAT BUTTON === */
#chatBtn { position:fixed; bottom:20px; right:20px; padding:10px 15px; border:none; background:#ff6600; color:black; font-weight:bold; cursor:pointer; border-radius:12px; z-index:25; box-shadow:0 0 15px #ff6600,0 0 20px #00ffdd; transition:0.3s; }
#chatBtn:hover { background:#00ffdd; }

/* === PAYPAL BUTTON === */
#paypal-container { margin-top:15px; }
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs - Cybersecurity Track</h2>
  <div>
    <button onclick="window.location.href='profile.html'">Profile</button>
    <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

  <div id="userBox">
    <div class="user-info">
      <div class="avatar" id="userAvatar">U</div>
      <div class="user-details">
        <div id="userName">Loading user...</div>
        <div id="userXP" class="xp-badge">XP: 0</div>
        <button id="buyXpBtn">Buy XP / Donate</button>
        <div id="paypal-container"></div>
      </div>
    </div>
  </div>

  <div class="stage-grid" id="stageContainer"></div>

</div>

<button id="chatBtn" onclick="window.location.href='chat.html'">Chat</button>

<footer>© 2026 Itzsos Labs</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const stageContainer = document.getElementById("stageContainer");
const userName = document.getElementById("userName");
const userXP = document.getElementById("userXP");
const logoutBtn = document.getElementById("logoutBtn");
const userAvatar = document.getElementById("userAvatar");
const buyXpBtn = document.getElementById("buyXpBtn");

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) return window.location.href="index.html";
  if (!user.emailVerified){ alert("Verify email first!"); window.location.href="index.html"; return; }

  const userRef = doc(db,"users",user.uid);
  let userSnap = await getDoc(userRef);
  if(!userSnap.exists()){
    alert("User not found!"); return;
  }

  const data = userSnap.data();
  userName.textContent = data.username || user.email;
  userXP.textContent = "XP: " + (data.xp||0);
  userAvatar.textContent = data.username ? data.username.charAt(0).toUpperCase() : user.email.charAt(0).toUpperCase();

  loadStages(data);
});

/* LOAD STAGES WITH LOCK LOGIC + ANIMATION */
async function loadStages(userData){
  stageContainer.innerHTML="";
  const q = query(collection(db,"stages"), orderBy("order"));
  const snapshot = await getDocs(q);
  const solved = userData.solvedStages||[];
  let delay=0;

  snapshot.forEach(docSnap=>{
    const stage = docSnap.data();
    const stageId = docSnap.id;
    const card = document.createElement("div");
    card.classList.add("stage-card");

    if(solved.includes(stageId)) card.classList.add("solved");

    let locked = stage.order>1 && !solved.includes("stage"+(stage.order-1));
    card.classList.toggle("locked",locked);

    card.innerHTML = `
      <h3>${stage.title}${locked?" 🔒":""}</h3>
      <p>${stage.text}</p>
      <p>XP: ${stage.xp}</p>
      <button ${locked? "disabled" : `onclick="openStage('${stageId}')"`}>${locked?"Locked":"Start"}</button>
    `;

    stageContainer.appendChild(card);
    setTimeout(()=>card.classList.add("show"),delay);
    delay+=120;
  });
}

window.openStage=id=>window.location.href="stage.html?id="+id;

/* LOGOUT */
logoutBtn.onclick = ()=>signOut(auth).then(()=>window.location.href="index.html");

/* PAYPAL BUTTON */
buyXpBtn.onclick = ()=>{
  const container = document.getElementById("paypal-container");
  container.scrollIntoView({behavior:"smooth"});
  alert("PayPal button below. Complete your purchase to gain XP!");
};
</script>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=BAANEM-ym-VkUny86qGnLGSCrXAuYaQlr4XDgcjJtB1A65tn9qFJIAaH61r-Pi5c0kzDKGdfgj5EIKjfuY&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
<script>
  paypal.HostedButtons({ hostedButtonId: "JG97CC8L5EH3W" }).render("#paypal-container");
</script>

</body>
</html>
