<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs - Cybersecurity Stages</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
  margin-left:10px;
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

/* USER */
#userBox {
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
  display:flex;
  align-items:center;
  gap:15px;
}
.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
  color:#000;
}
.xp-badge {
  background:#00ffdd;
  color:#000;
  padding:5px 10px;
  border-radius:20px;
}

/* GRID */
.stage-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.stage-card {
  background:#111422;
  padding:20px;
  border-radius:10px;
  border:1px solid #00ffdd;
  transition:0.3s;
}
.stage-card:hover {
  transform:scale(1.05);
  border-color:#ff6600;
}
.locked { opacity:0.4; }
.solved { border-color:#00ff99 !important; }

.stage-card img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  border-radius:8px;
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:8px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  font-weight:bold;
}

/* CHAT BUTTON */
#chat-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6600;
  color:black;
  padding:12px;
  border-radius:50%;
  font-weight:bold;
}

/* PAYPAL */
#paypal-box {
  margin:30px 0;
  text-align:center;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs</h2>
  <div>
    <button onclick="location.href='profile.html'">Profile</button>
    <button onclick="location.href='leaderboard.html'">Leaderboard</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- USER -->
  <div id="userBox">
    <div class="avatar" id="avatar">U</div>
    <div>
      <div id="username">Loading...</div>
      <div id="xp" class="xp-badge">XP: 0</div>
    </div>
  </div>

  <!-- DAILY -->
  <h2>🔥 Daily Challenge</h2>
  <div id="dailyContainer" class="stage-grid"></div>

  <!-- STAGES -->
  <h2>🎯 Stages</h2>
  <div id="stageContainer" class="stage-grid"></div>

  <!-- PAYPAL -->
  <div id="paypal-box">
    <h3>💰 Support / Unlock XP</h3>

    <script src="https://www.paypal.com/sdk/js?client-id=BAANEM-ym-VkUny86qGnLGSCrXAuYaQlr4XDgcjJtB1A65tn9qFJIAaH61r-Pi5c0kzDKGdfgj5EIKjfuY&components=hosted-buttons&currency=USD"></script>

    <div id="paypal-container-BSAK5P9RZ486S"></div>

    <script>
      paypal.HostedButtons({
        hostedButtonId: "BSAK5P9RZ486S"
      }).render("#paypal-container-BSAK5P9RZ486S");
    </script>
  </div>

</div>

<button id="chat-btn" onclick="location.href='chat.html'">💬</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

const usernameEl = document.getElementById("username");
const xpEl = document.getElementById("xp");
const avatar = document.getElementById("avatar");
const stageContainer = document.getElementById("stageContainer");
const dailyContainer = document.getElementById("dailyContainer");

/* AUTH */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const userRef = doc(db, "users", user.uid);
  let snap = await getDoc(userRef);

  if (!snap.exists()) {
    await setDoc(userRef, {
      username: user.email.split("@")[0],
      xp: 0,
      solvedStages: [],
      solvedDaily: []
    });
    snap = await getDoc(userRef);
  }

  const data = snap.data();

  usernameEl.textContent = data.username || "User";
  xpEl.textContent = "XP: " + (data.xp || 0);
  avatar.textContent = (data.username || "U")[0].toUpperCase();

  loadStages(data);
  loadDaily(data);
});

/* STAGES */
async function loadStages(userData) {
  stageContainer.innerHTML = "";

  const snapshot = await getDocs(query(collection(db, "stages"), orderBy("order")));
  const solved = userData.solvedStages || [];

  snapshot.forEach(docSnap => {
    const s = docSnap.data();
    const id = docSnap.id;

    const prev = "stage" + (s.order - 1);
    const locked = s.order > 1 && !solved.includes(prev);

    const card = document.createElement("div");
    card.className = "stage-card " + (locked ? "locked" : "");

    card.innerHTML = `
      <h3>${s.title} ${locked ? "🔒" : ""}</h3>
      <p>${s.text}</p>
      <p>XP: ${s.xp}</p>
      <button ${locked ? "disabled" : ""} onclick="openStage('${id}')">
        ${locked ? "Locked" : "Start"}
      </button>
    `;

    stageContainer.appendChild(card);
  });
}

window.openStage = (id) => {
  window.location.href = "stage.html?id=" + id;
};

/* DAILY */
async function loadDaily(userData) {
  dailyContainer.innerHTML = "";

  const snapshot = await getDocs(collection(db, "dailyChallenges"));
  const solved = userData.solvedDaily || [];

  snapshot.forEach(docSnap => {
    const c = docSnap.data();
    const id = docSnap.id;

    const done = solved.includes(id);

    const card = document.createElement("div");
    card.className = "stage-card";

    card.innerHTML = `
      <h3>${c.title} ${done ? "✅" : ""}</h3>
      <p>${c.text}</p>
      ${c.image ? `<img src="${c.image}">` : ""}
      <p>XP: ${c.xp}</p>
      <button onclick="alert('${c.hint || "No hint"}')">Hint</button>
      <button ${done ? "disabled" : ""} onclick="completeDaily('${id}', ${c.xp})">
        ${done ? "Done" : "Start"}
      </button>
    `;

    dailyContainer.appendChild(card);
  });
}

/* COMPLETE DAILY */
window.completeDaily = async (id, xp) => {
  const ref = doc(db, "users", currentUser.uid);
  const snap = await getDoc(ref);
  const data = snap.data();

  let solved = data.solvedDaily || [];

  if (!solved.includes(id)) {
    solved.push(id);

    await setDoc(ref, {
      solvedDaily: solved,
      xp: (data.xp || 0) + xp
    }, { merge: true });

    alert("XP +" + xp);
    location.reload();
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => location.href = "index.html");
};
</script>

</body>
</html>
