<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Profile | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:linear-gradient(180deg,#0b0f1a,#05070d);
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#0f111a;
  border-bottom:1px solid #00ffdd;
}

nav h2{ color:#ff6600; }

nav button{
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:50px auto;
  padding:20px;
}

/* PROFILE CARD */
.profile-card{
  background:#111422;
  padding:40px;
  border-radius:15px;
  text-align:center;
  border:1px solid #00ffdd;
  box-shadow:
    0 0 15px rgba(0,255,221,0.2),
    0 0 30px rgba(0,255,221,0.1);
  animation:fadeIn 1s ease;
}

/* AVATAR */
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
  font-weight:bold;
  background:linear-gradient(45deg,#ff6600,#00ffdd);
  color:black;
  box-shadow: 0 0 20px #00ffdd,0 0 30px #ff6600;
  margin-bottom:20px;
}

/* USER INFO */
.email{
  font-size:1.2rem;
  margin-bottom:5px;
}
.role{
  color:#ff6600;
  margin-bottom:20px;
}

/* XP BAR */
.xp-box{
  margin-top:20px;
}
.progress{
  width:100%;
  height:20px;
  background:#0f111a;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #00ffdd;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff6600,#00ffdd);
  transition:width 1s ease;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:30px;
}
.stat{
  background:#0f111a;
  padding:15px;
  border-radius:10px;
  border:1px solid #00ffdd;
}
.stat h3{
  margin:0;
  color:#ff6600;
}

/* SOLVED STAGES */
.solved{
  margin-top:40px;
}
.stage-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:10px;
  margin-top:15px;
}
.stage{
  padding:10px;
  border-radius:8px;
  background:#0f111a;
  border:1px solid #00ffdd;
}
.stage.solved{
  background:rgba(0,255,0,0.1);
  border-color:lime;
}

/* ANIMATIONS */
@keyframes fadeIn{
  from{ opacity:0; transform:translateY(20px); }
  to{ opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>
<nav>
  <h2>Itzsos Labs</h2>
  <div>
    <button onclick="window.location.href='stages.html'">Stages</button>
    <button id="logoutBtn">Logout</button>
  </div>
</nav>

<div class="container">
  <div class="profile-card">
    <div class="avatar" id="avatar">U</div>
    <div class="username email" id="email">Loading...</div>
    <div class="role" id="role">Role</div>
    <h3 id="xp">XP: 0</h3>

    <div class="xp-box">
      <div class="progress">
        <div class="progress-bar" id="xpBar"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <h3 id="rank">#0</h3>
        <p>Rank</p>
      </div>
      <div class="stat">
        <h3 id="solvedCount">0</h3>
        <p>Stages Solved</p>
      </div>
      <div class="stat">
        <h3>50</h3>
        <p>Total Stages</p>
      </div>
    </div>

    <div class="solved">
      <h3>🧠 Solved Stages</h3>
      <div class="stage-grid" id="stageGrid"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM elements
const avatar = document.getElementById("avatar");
const email = document.getElementById("email");
const role = document.getElementById("role");
const xpText = document.getElementById("xp");
const xpBar = document.getElementById("xpBar");
const solvedCount = document.getElementById("solvedCount");
const stageGrid = document.getElementById("stageGrid");
const rankText = document.getElementById("rank");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    window.location.href = "selection.html";
    return;
  }

  const data = userSnap.data();

  // Fill profile info
  avatar.textContent = (data.username || user.email).charAt(0).toUpperCase();
  email.textContent = data.username || user.email;
  role.textContent = data.role || "Hacker";

  const xp = data.xp || 0;
  xpText.textContent = "XP: " + xp;
  xpBar.style.width = Math.min((xp / 1000) * 100, 100) + "%";

  const solved = data.solvedStages || [];
  solvedCount.textContent = solved.length;

  // Build stage grid
  stageGrid.innerHTML = "";
  for (let i = 1; i <= 50; i++) {
    const box = document.createElement("div");
    box.classList.add("stage");
    box.textContent = i;
    if (solved.includes("stage" + i)) box.classList.add("solved");
    stageGrid.appendChild(box);
  }

  // Compute leaderboard rank
  const snap = await getDocs(collection(db, "users"));
  const users = [];
  snap.forEach(d => users.push(d.data()));
  users.sort((a, b) => (b.xp || 0) - (a.xp || 0));
  const rank = users.findIndex(u => u.email === user.email) + 1;
  rankText.textContent = "#" + rank;
});

// Logout
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>
