<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}
nav h2{ color:#ff6600; }
nav button{
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}
.task-card{
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:10px;
  padding:15px;
  margin-bottom:20px;
}
.task-card img{
  max-width:100%;
  border-radius:5px;
  margin-top:10px;
}
button{
  background:#00ffdd;
  border:none;
  padding:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
  border-radius:5px;
}
button:disabled{
  background:#555;
  cursor:not-allowed;
}
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs | Stage 1</h2>
  <button onclick="location.href='stages.html'">Back to Stages</button>
</nav>

<div class="container">

  <!-- INTRO -->
  <div id="introBox" class="task-card">
    <h3>Stage Introduction</h3>
    <p id="introText">Loading intro...</p>
  </div>

  <!-- TASKS -->
  <div id="tasksContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const introText = document.getElementById("introText");
const tasksContainer = document.getElementById("tasksContainer");

let currentUser;

// AUTH CHECK
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser = user;
  loadStage();
});

async function loadStage(){
  // Load intro (first doc in stage1 collection)
  const stageCol = collection(db,"stage1");
  const q = query(stageCol, orderBy("order"));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    introText.textContent = "No stage data found.";
    return;
  }

  let firstTask = true;
  snapshot.forEach(docSnap=>{
    const t = docSnap.data();

    if(firstTask){
      introText.textContent = t.intro || "No intro provided.";
      firstTask = false;
    }

    // TASK CARD
    const div = document.createElement("div");
    div.className = "task-card";
    div.innerHTML = `
      <h4>${t.title}</h4>
      <p>${t.text}</p>
      ${t.image?`<img src="${t.image}" alt="task image">`:""}
      <button onclick="checkAnswer('${docSnap.id}')">Submit Answer</button>
      <p id="hint-${docSnap.id}" style="color:#ff6600;">Hint: ${t.hint || "No hint"}</p>
    `;
    tasksContainer.appendChild(div);
  });
}

// CHECK ANSWER
window.checkAnswer = async(docId)=>{
  const answer = prompt("Enter your answer:");

  if(!answer) return;

  const taskRef = doc(db,"stage1",docId);
  const snap = await getDoc(taskRef);
  const data = snap.data();

  const correct = data.answer.map(a=>a.toLowerCase().trim());
  if(correct.includes(answer.toLowerCase().trim())){
    alert("Correct! XP +" + data.xp);
    // add xp to user in Firestore
    const userRef = doc(db,"users",currentUser.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();
    await setDoc(userRef,{
      xp:(userData.xp||0) + data.xp
    },{merge:true});
  }else{
    alert("Incorrect, try again!");
  }
};
</script>

</body>
</html>
