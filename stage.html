<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}
nav{
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2{color:#ff6600;}
nav button{
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:10px;
}
input{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:black;
  border:1px solid #00ffdd;
  color:white;
}
button{
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
}
.submit{background:#00ffdd;}
.hintBtn{background:#ff6600;}
#result,#hintBox{margin-top:15px;font-weight:bold;}
.locked{
  font-size:1.2rem;
  color:orange;
  text-align:center;
  margin-top:20px;
}
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs - Stage</h2>
  <button onclick="window.location.href='stages.html'">Back</button>
</nav>

<div class="container">
  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>

  <div id="result"></div>
  <div id="hintBox"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  arrayUnion,
  increment
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* 🔥 YOUR REAL FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* GET STAGE ID */
const params = new URLSearchParams(window.location.search);
const stageId = params.get("id");

if(!stageId){
  document.getElementById("stageTitle").textContent="Invalid stage ID.";
  throw new Error("Stage ID missing");
}

let correctAnswer="";
let stageXP=0;
let stageHint="";
let currentUser=null;

/* STAGE LOCK ORDER */
const stagePrerequisites={
  stage2:"stage1",
  stage3:"stage2"
};

onAuthStateChanged(auth, async(user)=>{

  if(!user || !user.emailVerified){
    window.location.href="index.html";
    return;
  }

  currentUser=user;

  const userRef=doc(db,"users",user.uid);
  const userSnap=await getDoc(userRef);

  if(!userSnap.exists()){
    window.location.href="selection.html";
    return;
  }

  const userData=userSnap.data();

  /* BLOCK NON-IT USERS */
  if(userData.selectedField!=="IT"){
    alert("Only Cybersecurity users allowed.");
    window.location.href="selection.html";
    return;
  }

  /* LOAD STAGE SAFELY */
  let stageSnap;
  try{
    const stageRef=doc(db,"stages",stageId);
    stageSnap=await getDoc(stageRef);
  }catch(e){
    document.getElementById("stageTitle").textContent="Error loading stage.";
    return;
  }

  if(!stageSnap.exists()){
    document.getElementById("stageTitle").textContent="Stage not found.";
    return;
  }

  const data=stageSnap.data();

  document.getElementById("stageTitle").textContent=data.title||"No Title";
  document.getElementById("stageText").textContent=data.text||"";

  correctAnswer=data.answer||"";
  stageXP=data.xp||0;
  stageHint=data.hint||"No hint available";

  let solvedStages=userData.solvedStages||[];

  /* LOCK CHECK */
  const prereq=stagePrerequisites[stageId];
  if(prereq && !solvedStages.includes(prereq)){
    document.getElementById("defaultFlagArea").style.display="none";
    document.getElementById("hintBtn").style.display="none";
    document.querySelector(".container").innerHTML+=
      `<div class="locked">🔒 Complete ${prereq} first!</div>`;
    return;
  }

  /* STAGE 3 SQL SIMULATION */
  if(stageId==="stage3"){

    document.getElementById("defaultFlagArea").style.display="none";

    const container=document.querySelector(".container");
    container.innerHTML+=`
      <h3>Admin Login</h3>
      <input type="text" id="loginUser" placeholder="Username">
      <input type="password" id="loginPass" placeholder="Password">
      <button id="loginBtnSim" class="submit">Login</button>
      <div id="loginResult"></div>
    `;

    document.getElementById("loginBtnSim").onclick=async()=>{
      const username=document.getElementById("loginUser").value;

      if(username.includes("' OR 1=1")){
        document.getElementById("loginResult").innerHTML=
          "🎉 Access Granted!<br>Flag: ITZSOS{sql_bypass_success}";
        document.getElementById("loginResult").style.color="lightgreen";

        await updateDoc(userRef,{
          solvedStages:arrayUnion(stageId),
          xp:increment(stageXP)
        });
      }else{
        document.getElementById("loginResult").textContent="Access Denied.";
        document.getElementById("loginResult").style.color="red";
      }
    };

    return;
  }

});

/* HINT BUTTON */
document.getElementById("hintBtn").onclick=()=>{
  document.getElementById("hintBox").textContent="💡 Hint: "+stageHint;
};

/* FLAG SUBMIT */
document.getElementById("submitBtn").onclick=async()=>{

  if(!currentUser) return;

  const input=document.getElementById("flagInput").value.trim().toLowerCase();
  const answer=correctAnswer.trim().toLowerCase();

  if(input!==answer){
    document.getElementById("result").textContent="❌ Wrong flag!";
    document.getElementById("result").style.color="red";
    return;
  }

  const userRef=doc(db,"users",currentUser.uid);

  await updateDoc(userRef,{
    xp:increment(stageXP),
    solvedStages:arrayUnion(stageId)
  });

  document.getElementById("result").textContent=
    "✅ Correct! +"+stageXP+" XP";
  document.getElementById("result").style.color="lightgreen";
};

</script>
</body>
</html>
