<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage 1</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}
nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 30px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}
#introBox {
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
}
.task-card {
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid #00ffdd;
}
.task-card img {
  max-width:100%;
  border-radius:8px;
  margin:10px 0;
}
button.submitBtn {
  margin-top:10px;
  padding:8px 12px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  font-weight:bold;
  border-radius:6px;
}
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs</h2>
  <button onclick="location.href='stages.html'">Back to Stages</button>
</nav>

<div class="container">

  <div id="introBox">
    <h3>Stage Introduction</h3>
    <p id="introText">Loading stage intro...</p>
  </div>

  <div id="tasksContainer">
    <!-- Tasks will load here dynamically -->
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const introText = document.getElementById("introText");
const tasksContainer = document.getElementById("tasksContainer");

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href="index.html";

  currentUser = user;

  // Load stage1
  const stageRef = doc(db, "stage1", "stage1");
  const snap = await getDoc(stageRef);

  if (!snap.exists()) {
    introText.textContent = "No stage data found.";
    return;
  }

  const data = snap.data();

  // Display intro
  introText.textContent = data.intro || "No intro provided.";

  // Create task card
  const div = document.createElement("div");
  div.className = "task-card";
  div.innerHTML = `
    <h3>${data.title}</h3>
    <p>${data.text}</p>
    ${data.image ? `<img src="${data.image}" alt="Stage Image">` : ""}
    <p>XP: ${data.xp}</p>
    <input type="text" id="answerInput" placeholder="Enter your answer" style="width:100%; padding:6px; margin-top:8px; border-radius:5px; border:none;">
    <button class="submitBtn">Submit Answer</button>
    <p style="color:#ff6600;" id="hintText">Hint: ${data.hint || "No hint available"}</p>
  `;
  tasksContainer.appendChild(div);

  // Handle submit
  const submitBtn = div.querySelector(".submitBtn");
  submitBtn.onclick = async () => {
    const answer = div.querySelector("#answerInput").value.trim().toLowerCase();
    const correct = data.answer.map(a => a.toLowerCase());
    if (correct.includes(answer)) {
      alert("✅ Correct! You earned " + data.xp + " XP");
      // Update user XP and solved stages
      const userRef = doc(db, "users", currentUser.uid);
      await updateDoc(userRef, {
        xp: arrayUnion(data.xp),
        solvedStages: arrayUnion("stage1")
      });
      submitBtn.disabled = true;
    } else {
      alert("❌ Wrong answer, try again!");
    }
  };
});
</script>

</body>
</html>
