<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Team | Itzsos Labs Stage</title>
<style>
body {
  margin:0;
  font-family:monospace;
  background:#0a0a2a; /* dark blue/black */
  color:#00ffdd;
}
nav {
  background:#2e005c; /* purple top bar */
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#ff66ff; }
nav button {
  background:#ff66ff;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111122;
  border:1px solid #00ffdd;
  border-radius:10px;
}
input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:black;
  border:1px solid #00ffdd;
  color:white;
}
button {
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
}
.submit { background:#00ffdd; }
.hintBtn { background:#ff66ff; }
#result, #hintBox { margin-top:15px; font-weight:bold; }
.locked { font-size:1.2rem; color:orange; text-align:center; margin-top:20px; opacity:0.6; }
#progressWrapper { margin-bottom:20px; }
#progressBar { height:12px; width:0%; background:linear-gradient(90deg,#00ffdd,#00aa88); transition:width 0.5s ease; }
</style>
</head>
<body>

<nav>
  <h2>Purple Team | Itzsos Labs</h2>
  <button id="backBtn">Back</button>
</nav>

<div class="container">

  <!-- Progress -->
  <div id="progressWrapper">
    <div id="progressText" style="margin-bottom:5px; font-weight:bold;">Loading progress...</div>
    <div style="background:#222; border-radius:8px; overflow:hidden;">
      <div id="progressBar"></div>
    </div>
  </div>

  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <div id="sqlLoginArea"></div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>
  <div id="result"></div>
  <div id="hintBox"></div>

  <button id="nextStageBtn" style="display:none; background:orange;">Go To Next Stage →</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageId = new URLSearchParams(window.location.search).get("id");
const TOTAL_STAGES = 50;

let currentUser = null;
let correctAnswer = "";
let stageXP = 0;
let stageHint = "";
let currentOrder = 0;

const stageTitleEl = document.getElementById("stageTitle");
const stageTextEl = document.getElementById("stageText");
const defaultFlagArea = document.getElementById("defaultFlagArea");
const sqlLoginArea = document.getElementById("sqlLoginArea");
const resultEl = document.getElementById("result");
const hintBoxEl = document.getElementById("hintBox");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const nextStageBtn = document.getElementById("nextStageBtn");

document.getElementById("backBtn").onclick = () => { window.location.href="stages.html"; };

// Auth check
onAuthStateChanged(auth, async (user) => {
  if(!user){ alert("Login first!"); window.location.href="index.html"; return; }
  if(!user.emailVerified){ alert("Verify email!"); window.location.href="index.html"; return; }
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  if(!userSnap.exists()){ window.location.href="selection.html"; return; }

  const userData = userSnap.data();
  if(userData.selectedField!=="IT"){ alert("🚫 Only Cybersecurity users allowed."); window.location.href="selection.html"; return; }

  loadStage(userData);
});

// Load stage
async function loadStage(userData){
  const stageRef = doc(db,"stages",stageId);
  const stageSnap = await getDoc(stageRef);
  if(!stageSnap.exists()){ stageTitleEl.textContent="Stage not found"; return; }

  const stageData = stageSnap.data();
  currentOrder = stageData.order || 1;
  correctAnswer = stageData.answer || "";
  stageXP = stageData.xp || 0;
  stageHint = stageData.hint || "No hint available";

  // Calculate highest solved
  let solvedStages = userData.solvedStages || [];
  let highestSolvedOrder = 0;
  solvedStages.forEach(s=>{
    const n = parseInt(s.replace("stage",""));
    if(!isNaN(n) && n>highestSolvedOrder) highestSolvedOrder=n;
  });

  // Update progress
  const progressPercent = ((highestSolvedOrder)/TOTAL_STAGES)*100;
  progressText.textContent = `Stage ${currentOrder} / ${TOTAL_STAGES} (${progressPercent.toFixed(1)}% completed)`;
  progressBar.style.width = progressPercent.toFixed(1)+"%";

  // LOCK future stages
  if(currentOrder > highestSolvedOrder + 1){
    defaultFlagArea.style.display="none";
    sqlLoginArea.style.display="none";
    document.getElementById("hintBtn").style.display="none";
    resultEl.style.display="none";
    hintBoxEl.style.display="none";
    stageTextEl.textContent="";
    stageTitleEl.textContent = stageData.title + " 🔒 Locked";
    return;
  }

  // UNLOCKED stage
  stageTitleEl.textContent = stageData.title;
  stageTextEl.textContent = stageData.text;

  const unlockPercent = (currentOrder/TOTAL_STAGES)*100;
  progressText.textContent = `Stage ${currentOrder} / ${TOTAL_STAGES} (${unlockPercent.toFixed(1)}% completed)`;
  progressBar.style.width = unlockPercent.toFixed(1)+"%";

  // Stage 3 SQL login
  if(stageId==="stage3"){
    defaultFlagArea.style.display="none";
    sqlLoginArea.innerHTML=`
      <h3>Admin Login</h3>
      <input type="text" id="loginUser" placeholder="Username">
      <input type="password" id="loginPass" placeholder="Password">
      <button id="loginBtnSim" class="submit">Login</button>
      <div id="loginResult"></div>
    `;
    document.getElementById("loginBtnSim").onclick = async ()=>{
      const userRef = doc(db,"users",currentUser.uid);
      const userSnap = await getDoc(userRef);
      const solved = userSnap.exists()? userSnap.data().solvedStages||[]:[];
      if(solved.includes(stageId)){ document.getElementById("loginResult").textContent="⚠️ Already solved!"; return; }

      const username = document.getElementById("loginUser").value;
      if(username.includes("' OR 1=1")){
        document.getElementById("loginResult").innerHTML = "🎉 Access Granted!<br>Flag: ITZSOS{sql_bypass_success}";
        await updateDoc(userRef,{ solvedStages: arrayUnion(stageId), xp: increment(stageXP) });
      } else { document.getElementById("loginResult").textContent="Access Denied."; }
    };
  }
}

// Hint button
document.getElementById("hintBtn").onclick = ()=>{
  hintBoxEl.textContent = "💡 Hint: "+stageHint;
};

// Flag submit
document.getElementById("submitBtn").onclick = async ()=>{
  if(!currentUser) return;
  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  if(input !== correctAnswer.trim().toLowerCase()){
    resultEl.textContent="❌ Wrong flag!"; resultEl.style.color="red"; return;
  }

  const userRef = doc(db,"users",currentUser.uid);
  const userSnap = await getDoc(userRef);
  const solvedStages = userSnap.exists()? userSnap.data().solvedStages||[]:[];

  if(solvedStages.includes(stageId)){
    resultEl.textContent="⚠️ Already solved!"; resultEl.style.color="yellow"; return;
  }

  await updateDoc(userRef,{ solvedStages: arrayUnion(stageId), xp: increment(stageXP) });
  resultEl.textContent=`✅ Correct! +${stageXP} XP`; resultEl.style.color="lightgreen";

  // Next stage
  const nextStageId = "stage"+(currentOrder+1);
  const nextStageRef = doc(db,"stages",nextStageId);
  const nextStageSnap = await getDoc(nextStageRef);

  if(!nextStageSnap.exists()){
    nextStageBtn.style.display="block";
    nextStageBtn.textContent="🏆 Track Completed - Back to Stages";
    nextStageBtn.onclick = ()=>{ window.location.href="stages.html"; };
    return;
  }

  nextStageBtn.style.display="block";
  let timer = setTimeout(()=>{ window.location.href="stage.html?id="+nextStageId; },5000);
  nextStageBtn.onclick = ()=>{ clearTimeout(timer); window.location.href="stage.html?id="+nextStageId; };
};
</script>
</body>
</html>
