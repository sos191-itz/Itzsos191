<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Premium Lab | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}

nav button{
  background:#6a00ff;
  border:none;
  padding:8px;
  color:white;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* TERMINAL */
.terminal{
  background:#000;
  padding:10px;
  font-size:12px;
  margin-bottom:10px;
}

/* MISSION */
.mission{
  background:#111422;
  padding:15px;
  border-left:4px solid #6a00ff;
  border-radius:10px;
}

/* OBJECTIVE */
.objective{
  background:#0d111f;
  padding:10px;
  border-left:4px solid #00ffdd;
  margin:10px 0;
}

/* PROGRESS */
.progressBar{
  height:10px;
  background:#222;
  border-radius:10px;
  margin:10px 0;
}
.progressFill{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  border-radius:10px;
  transition:1s;
}

/* TASK */
.task{
  background:#111422;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  opacity:0.3;
  pointer-events:none;
}

.task.active{
  opacity:1;
  pointer-events:auto;
}

.task.completed{
  border-left:4px solid #00ff99;
  box-shadow:0 0 15px #00ff99;
}

/* IMAGE */
.task img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
  border:2px solid #6a00ff;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  background:#000;
  color:#00ffdd;
  border:none;
  border-radius:6px;
  margin-top:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#6a00ff;
  color:white;
  border-radius:6px;
}

/* HINT */
.hintBox{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#1a1f35;
  border-left:4px solid orange;
}

/* XP POP */
#xpPop{
  position:fixed;
  top:20px;
  right:20px;
  background:#00ffdd;
  color:black;
  padding:10px;
  border-radius:8px;
  display:none;
}

/* MESSAGE */
#message{
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}
.success{ background:#003300; }
.error{ background:#330000; }

</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs PREMIUM LAB</div>
</nav>

<div class="container">

<div class="terminal">
root@itzsos:~# phishing-simulation --stage=1
</div>

<div id="missionBox" class="mission"></div>

<div class="objective">
⚠️ Objective: Analyze the email below and identify the phishing trick.
</div>

<p id="progressText"></p>
<div class="progressBar"><div id="progressFill" class="progressFill"></div></div>

<div id="tasksContainer"></div>

<div id="message"></div>

</div>

<div id="xpPop"></div>
<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let tasks=[];
let currentIndex=0;
let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser=user;

  const snap=await getDoc(doc(db,"stages","stage1"));
  const data=snap.data();

  tasks=data.tasks||[];

  document.getElementById("missionBox").innerHTML=`
    <h3>🎯 Mission Brief</h3>
    <p>${data.mission||""}</p>
    <p>${data.intro||""}</p>
  `;

  renderTasks();
});

/* RENDER TASKS */
function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  tasks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="task "+(i===0?"active":"");

    div.innerHTML=`
      <h3>Task ${i+1}: ${t.title}</h3>
      <p>${t.text}</p>

      ${t.image?`<img src="${t.image}">`:""}

      <input id="input${i}" placeholder="Enter answer">

      <button onclick="submitAnswer(${i})">Submit</button>
      <button onclick="showHint(${i})">🌍 Hint (-${t.hintCost||0})</button>

      <div id="hint${i}" class="hintBox">${t.hint||""}</div>

      <p>XP: ${t.xp||0}</p>
    `;

    container.appendChild(div);
  });

  updateProgress();
}

/* PROGRESS */
function updateProgress(){
  document.getElementById("progressText").innerText=
    "Progress: "+currentIndex+" / "+tasks.length;

  document.getElementById("progressFill").style.width=
    (currentIndex/tasks.length)*100+"%";
}

/* MESSAGE */
function showMessage(text,type){
  const msg=document.getElementById("message");
  msg.className=type;
  msg.innerText=text;
}

/* SUBMIT */
window.submitAnswer=async(i)=>{
  if(i!==currentIndex) return;

  const val=document.getElementById("input"+i).value.toLowerCase().trim();
  const task=tasks[i];

  if(task.answer.includes(val)){

    showMessage("✅ Access Granted. Threat identified.","success");

    document.getElementById("sound").play();

    const xpPop=document.getElementById("xpPop");
    xpPop.innerText="+"+task.xp+" XP ⚡";
    xpPop.style.display="block";
    setTimeout(()=>xpPop.style.display="none",2000);

    document.querySelectorAll(".task")[i].classList.add("completed");

    currentIndex++;

    if(currentIndex < tasks.length){
      document.querySelectorAll(".task")[currentIndex].classList.add("active");
    } else {
      showMessage("🏆 Stage Completed! Badge Unlocked!","success");
    }

    updateProgress();

    const userRef=doc(db,"users",currentUser.uid);
    const snap=await getDoc(userRef);
    const data=snap.data();

    await updateDoc(userRef,{
      xp:(data.xp||0)+task.xp
    });

  } else {
    showMessage("❌ Access Denied. Try again.","error");
  }
};

/* HINT */
window.showHint=async(i)=>{
  const box=document.getElementById("hint"+i);

  if(box.style.display==="block"){
    box.style.display="none";
    return;
  }

  box.style.display="block";
};
</script>

</body>
</html>
