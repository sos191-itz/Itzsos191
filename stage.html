<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="msvalidate.01" content="4C88E6ECD9E2EBD1D4719D1F3370A8E0" />
<meta name="google-site-verification" content="8qTPfxaWZr3Utd41Q9rcD61dBhCvwINivYjw-dFKpm8" />
<title>Stage | Itzsos Labs</title>
<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}
nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:10px;
}
input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:black;
  border:1px solid #00ffdd;
  color:white;
}
button {
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
}
.submit { background:#00ffdd; }
.hintBtn { background:#ff6600; }
#result, #hintBox { margin-top:15px; font-weight:bold; }
.locked { font-size:1.2rem; color:orange; text-align:center; margin-top:20px; opacity:0.6; }
/* Terminal styles for hacker/ghost vibe */
#terminal {
  background: radial-gradient(circle at top left, #111 0%, #0f111a 100%);
  border: 1px solid #00ffdd;
  border-radius: 8px;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
  font-family: monospace;
  color: #00ffdd;
  box-shadow: 0 0 20px #00ffdd, 0 0 40px #ff66cc;
}

#terminalOutput {
  white-space: pre-wrap;
  line-height: 1.4;
  font-size: 14px;
}

/* Terminal input line */
#terminalInput {
  background: transparent;
  border: none;
  outline: none;
  color: #00ffdd;
  width: 80%;
  font-family: monospace;
  font-size: 14px;
}

/* Prompt color */
.prompt {
  color: #ff66cc;
  margin-right: 5px;
}

/* Blinking cursor */
@keyframes blink {
  0%, 50%, 100% { border-right-color: #00ffdd; }
  25%, 75% { border-right-color: transparent; }
}

#terminalInput {
  border-right: 2px solid #00ffdd;
  animation: blink 1s step-start infinite;
}

/* Smooth neon glow on outputs */
#terminalOutput span {
  text-shadow: 0 0 5px #00ffdd, 0 0 10px #ff66cc;
}

/* Fade-in animations for stage content */
.container > * {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.6s forwards;
}

@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs - Stage</h2>
  <button id="backBtn">Back</button>
</nav>
<div class="container">

  <!-- 📊 Progress Section -->
  <div id="progressWrapper" style="margin-bottom:20px;">
    <div id="progressText" style="margin-bottom:5px; font-weight:bold;">
      Loading progress...
    </div>
    <div style="background:#222; border-radius:8px; overflow:hidden;">
      <div id="progressBar" style="
        height:12px;
        width:0%;
        background:linear-gradient(90deg,#00ffdd,#00aa88);
        transition:width 0.5s ease;">
      </div>
    </div>
  </div>

  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>
  <div id="result"></div>
  <div id="hintBox"></div>
<button id="nextStageBtn" style="display:none; background:orange;">
  Go To Next Stage →
</button>
<div id="terminalContainer" style="display:none;">
  <div id="terminalOutput"></div>
  <div style="display:flex; align-items:center;">
    <span class="prompt">user@itzsos:~$</span>
    <input id="terminalInput" type="text" autofocus>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// 🔑 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageId = new URLSearchParams(window.location.search).get("id");

let currentUser = null;
let correctAnswer = "";
let stageXP = 0;
let stageHint = "";
let currentOrder = 0;
const nextStageBtn = document.getElementById("nextStageBtn");
const TOTAL_STAGES = 50;

const stageTitleEl = document.getElementById("stageTitle");
const stageTextEl = document.getElementById("stageText");
const defaultFlagArea = document.getElementById("defaultFlagArea");
const resultEl = document.getElementById("result");
const hintBoxEl = document.getElementById("hintBox");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

// 🔐 Back button
document.getElementById("backBtn").onclick = () => { window.location.href="stages.html"; };

// ================= AUTH CHECK =================
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first!");
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  if (!user.emailVerified) {
    alert("Please verify your email first!");
    window.location.href = "index.html";
    return;
  }

  // Get user data
  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    window.location.href = "selection.html";
    return;
  }

  const userData = userSnap.data();

  if (userData.selectedField !== "IT") {
    alert("🚫 Only Cybersecurity users allowed.");
    window.location.href = "selection.html";
    return;
  }

  stageXP = 0;
  correctAnswer = "";
  stageHint = "";

  loadStage(userData);
});

// ================= LOAD STAGE =================
async function loadStage(userData) {
  const stageRef = doc(db, "stages", stageId);
  const stageSnap = await getDoc(stageRef);

  if (!stageSnap.exists()) {
    stageTitleEl.textContent = "Stage not found";
    return;
  }

  const stageData = stageSnap.data();
  currentOrder = stageData.order;

  // 📊 Update Progress UI
  const percentage = Math.round((currentOrder / TOTAL_STAGES) * 100);
  progressText.textContent = `Stage ${currentOrder} / ${TOTAL_STAGES} (${percentage}%)`;
  progressBar.style.width = percentage + "%";

  stageTitleEl.textContent = stageData.title;
  stageTextEl.textContent = stageData.text;
  correctAnswer = stageData.answer || "";
  stageXP = stageData.xp || 0;
  stageHint = stageData.hint || "No hint available";

  let solvedStages = userData.solvedStages || [];
  if (solvedStages.includes("[]")) solvedStages = solvedStages.filter(s => s !== "[]");

  // 🔒 Locking logic
  let highestSolved = 0;
  for (let s of solvedStages) {
    const num = parseInt(s.replace("stage",""));
    if (!isNaN(num) && num > highestSolved) highestSolved = num;
  }

  if (currentOrder > highestSolved + 1) {
    defaultFlagArea.style.display = "none";
    document.getElementById("hintBtn").style.display = "none";
    resultEl.style.display = "none";
    hintBoxEl.style.display = "none";
    stageTextEl.textContent = "";
    stageTitleEl.textContent = stageData.title + " 🔒 Locked";
    return;
  }

  // ================= STAGE 3 - SQL Injection =================
  if(stageId === "stage3") {
    defaultFlagArea.style.display = "none";
    stageTextEl.textContent = "Login as admin using SQL Injection!";

    const container = document.querySelector(".container");
    container.innerHTML += `
      <h3>Admin Login</h3>
      <input type="text" id="loginUser" placeholder="Username">
      <input type="password" id="loginPass" placeholder="Password">
      <button id="loginBtnSim" class="submit">Login</button>
      <div id="loginResult"></div>
    `;

    document.getElementById("loginBtnSim").onclick = async () => {
      const userRef = doc(db, "users", currentUser.uid);
      const userSnap = await getDoc(userRef);
      const solved = userSnap.exists() ? userSnap.data().solvedStages || [] : [];

      if (solved.includes(stageId)) {
        document.getElementById("loginResult").textContent = "⚠️ Already solved!";
        return;
      }

      const username = document.getElementById("loginUser").value;
      if (username.includes("' OR 1=1")) {
        document.getElementById("loginResult").innerHTML = "🎉 Access Granted!<br>Flag: ITZSOS{sql_bypass_success}";
        await updateDoc(userRef, {
          solvedStages: arrayUnion(stageId),
          xp: increment(stageXP)
        });
      } else {
        document.getElementById("loginResult").textContent = "Access Denied.";
      }
    };
    return;
  }

  // ================= STAGE 4 - Kali Linux Terminal =================
function typeTerminal(text, container, speed=50) {
  let i = 0;
  const interval = setInterval(() => {
    container.innerHTML += text[i];
    i++;
    if(i >= text.length) clearInterval(interval);
    container.scrollTop = container.scrollHeight;
  }, speed);
}
  if(stageId === "stage4") {
    defaultFlagArea.style.display = "none";
    stageTextEl.textContent = "🎯 Terminal Challenge: Extract the hidden flag using Linux commands!";

    const container = document.querySelector(".container");
    container.innerHTML += `
      <div id="terminal" style="
        background:#0b0d14;
        border:1px solid #00ffdd;
        border-radius:8px;
        padding:15px;
        height:300px;
        overflow-y:auto;
        font-family:monospace;
        color:#00ffdd;
        margin-top:20px;
      ">
        <div id="terminalOutput">Welcome to Kali Lab! Type <span style='color:#ff66cc'>help</span> for commands.</div>
        <div style="margin-top:5px;">
          <span style="color:#ff66cc">user@itzsos:</span>~$ <input id="terminalInput" style="
            background:none;
            border:none;
            outline:none;
            color:#00ffdd;
            width:80%;
          ">
        </div>
      </div>
    `;

    correctAnswer = "itzsos{linux_terminal_master}";
    stageXP = 300;

    const terminalOutput = document.getElementById("terminalOutput");
    const terminalInput = document.getElementById("terminalInput");

    const commands = {
      help: "Available commands: cat, ls, echo, pwd",
      pwd: "/home/user",
      ls: "flag.txt  readme.txt  notes/",
      "cat flag.txt": `🎉 FLAG FOUND: ${correctAnswer}`,
      "echo hello": "hello",
    };

    terminalInput.focus();

    terminalInput.addEventListener("keydown", async (e)=>{
      if(e.key !== "Enter") return;

      const input = terminalInput.value.trim();
      terminalOutput.innerHTML += `<br><span style='color:#ff66cc'>user@itzsos:</span>~$ ${input}`;

      if(commands[input]) {
        terminalOutput.innerHTML += `<br>${commands[input]}`;
        if(input === "cat flag.txt") {
          const userRef = doc(db,"users",currentUser.uid);
          const userSnap = await getDoc(userRef);
          const solvedStages = userSnap.exists() ? userSnap.data().solvedStages || [] : [];
          if(!solvedStages.includes(stageId)) {
            await updateDoc(userRef, {
              solvedStages: arrayUnion(stageId),
              xp: increment(stageXP)
            });
            terminalOutput.innerHTML += `<br>✅ Stage Completed! +${stageXP} XP`;
            nextStageBtn.style.display = "block";
            nextStageBtn.textContent = "→ Go To Next Stage";
            nextStageBtn.onclick = () => window.location.href="stage.html?id=stage5";
          }
        }
      } else {
        terminalOutput.innerHTML += `<br>command not found: ${input}`;
      }

      terminalInput.value = "";
      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    });
    return;
  }
}

// ================= HINT =================
document.getElementById("hintBtn").onclick = () => {
  hintBoxEl.textContent = "💡 Hint: " + stageHint;
};

// ================= FLAG SUBMIT =================
document.getElementById("submitBtn").onclick = async () => {
  if (!currentUser) return;

  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  if (input !== correctAnswer.trim().toLowerCase()) {
    resultEl.textContent = "❌ Wrong flag!";
    resultEl.style.color = "red";
    return;
  }

  const userRef = doc(db, "users", currentUser.uid);
  const userSnap = await getDoc(userRef);
  const solvedStages = userSnap.exists() ? userSnap.data().solvedStages || [] : [];

  if (solvedStages.includes(stageId)) {
    resultEl.textContent = "⚠️ Already solved!";
    resultEl.style.color = "yellow";
    return;
  }

  await updateDoc(userRef, {
    solvedStages: arrayUnion(stageId),
    xp: increment(stageXP)
  });

  resultEl.textContent = "✅ Correct! +" + stageXP + " XP";
  resultEl.style.color = "lightgreen";

  const nextStageId = "stage" + (currentOrder + 1);
  const nextStageRef = doc(db, "stages", nextStageId);
  const nextStageSnap = await getDoc(nextStageRef);

  if (!nextStageSnap.exists()) {
    nextStageBtn.style.display = "block";
    nextStageBtn.textContent = "🏆 Track Completed - Back to Stages";
    nextStageBtn.onclick = () => window.location.href = "stages.html";
    return;
  }

  nextStageBtn.style.display = "block";
  let timer = setTimeout(() => {
    window.location.href = "stage.html?id=" + nextStageId;
  }, 5000);

  nextStageBtn.onclick = () => {
    clearTimeout(timer);
    window.location.href = "stage.html?id=" + nextStageId;
  };
};
</script>
</body>
</html>
