<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* TERMINAL */
.terminal{
  background:#000;
  padding:10px;
  margin-bottom:10px;
}

/* MISSION */
.mission{
  background:#111422;
  padding:15px;
  border-left:4px solid #6a00ff;
  border-radius:10px;
}

/* TASK */
.task{
  background:#111422;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}
.task.locked{opacity:0.3;pointer-events:none;}
.task.completed{border-left:4px solid #00ff99;}

.task img{
  width:100%;
  margin-top:10px;
  border-radius:8px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#000;
  color:#00ffdd;
  border:none;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:#6a00ff;
  color:white;
  cursor:pointer;
}

/* PROGRESS */
.progressBar{height:10px;background:#222;}
.progressFill{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
}

/* TOAST */
#toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:20px;
  display:none;
}
.success{background:#00ff99;color:black;}
.error{background:#ff0033;color:white;}
.info{background:#6a00ff;color:white;}

/* XP POP */
#xpPop{
  position:fixed;
  top:20px;
  right:20px;
  background:#00ffdd;
  color:black;
  padding:10px;
  display:none;
}

/* HINT */
.hint{
  display:none;
  margin-top:10px;
  background:#1a1f35;
  padding:10px;
  border-left:4px solid orange;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs PREMIUM LAB</div>
</nav>

<div class="container">

<div id="terminal" class="terminal"></div>
<div id="missionBox" class="mission"></div>

<p id="progressText"></p>
<div class="progressBar"><div id="progressFill" class="progressFill"></div></div>

<div id="tasksContainer"></div>

</div>

<div id="toast"></div>
<div id="xpPop"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let stageId = new URLSearchParams(location.search).get("id") || "stage1";
let stageData, tasks, userData;
let completedTasks = [];
let usedHints = {};

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);
  userData = snap.data();

  if(userData.solvedStages?.includes(stageId)){
    showToast("⚠️ Already completed","info");
    setTimeout(()=>location.href="stages.html",1500);
    return;
  }

  completedTasks = userData.completedTasks?.[stageId] || [];
  usedHints = userData.usedHints?.[stageId] || {};

  const stageSnap = await getDoc(doc(db,"stages",stageId));
  stageData = stageSnap.data();
  tasks = stageData.tasks;

  document.getElementById("terminal").innerText =
    "root@itzsos:~# run " + stageId;

  document.getElementById("missionBox").innerHTML = `
    <h3>🎯 Mission</h3>
    <p>${stageData.mission}</p>
    <p>${stageData.intro}</p>
  `;

  renderTasks();
});

function renderTasks(){
  const box = document.getElementById("tasksContainer");
  box.innerHTML="";

  tasks.forEach((t,i)=>{
    const done = completedTasks.includes(i);
    const locked = i>0 && !completedTasks.includes(i-1);

    box.innerHTML += `
      <div class="task ${done?"completed":""} ${locked?"locked":""}">
        <h3>Task ${i+1}: ${t.title}</h3>
        <p>${t.text}</p>

        ${t.image ? `<img src="${t.image}">` : ""}

        <input id="ans${i}" ${done||locked?"disabled":""} placeholder="Enter answer">

        <button onclick="submitTask(${i})" ${done||locked?"disabled":""}>
          ${done?"Solved":"Submit"}
        </button>

        <button onclick="toggleHint(${i})">
          🌍 Hint (-${t.hintCost || 10})
        </button>

        <div id="hint${i}" class="hint">${t.hint}</div>

        <p>XP: ${t.xp}</p>
      </div>
    `;
  });

  updateProgress();
}

window.submitTask = async(i)=>{
  if(completedTasks.includes(i)) return;

  const val = document.getElementById("ans"+i).value.toLowerCase().trim();
  const task = tasks[i];

  if(!task.answer.some(a=>val.includes(a.toLowerCase()))){
    showToast("❌ Access Denied","error");
    return;
  }

  completedTasks.push(i);

  showToast("✔ Access Granted","success");
  showXP(task.xp);

  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let completed = data.completedTasks || {};
  completed[stageId] = completedTasks;

  await updateDoc(userRef,{
    completedTasks: completed,
    xp:(data.xp||0)+task.xp
  });

  renderTasks();

  if(completedTasks.length === tasks.length){
    completeStage();
  }
};

/* 🔥 FIXED HINT SYSTEM */
window.toggleHint = async(i)=>{
  const h = document.getElementById("hint"+i);
  const task = tasks[i];

  if(usedHints[i]){
    h.style.display = h.style.display==="block"?"none":"block";
    return;
  }

  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let xp = data.xp || 0;

  if(xp < task.hintCost){
    showToast("❌ Not enough XP","error");
    return;
  }

  xp -= task.hintCost;
  usedHints[i] = true;

  let hints = data.usedHints || {};
  hints[stageId] = usedHints;

  await updateDoc(userRef,{
    xp: xp,
    usedHints: hints
  });

  showToast("💡 Hint unlocked (-"+task.hintCost+" XP)","info");

  h.style.display = "block";
};

async function completeStage(){
  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let solved = data.solvedStages || [];
  if(!solved.includes(stageId)) solved.push(stageId);

  await updateDoc(userRef,{solvedStages: solved});

  showToast("🏆 Stage Complete","success");

  goNext();
}

async function goNext(){
  const snap = await getDocs(collection(db,"stages"));
  let next=null;

  snap.forEach(d=>{
    if(d.data().order === stageData.order+1){
      next = d.id;
    }
  });

  setTimeout(()=>{
    location.href = next ? "stage.html?id="+next : "stages.html";
  },2000);
}

function updateProgress(){
  document.getElementById("progressText").innerText =
    "Progress: "+completedTasks.length+" / "+tasks.length;

  document.getElementById("progressFill").style.width =
    (completedTasks.length/tasks.length)*100+"%";
}

function showToast(msg,type){
  const t = document.getElementById("toast");
  t.className = type;
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

function showXP(xp){
  const x = document.getElementById("xpPop");
  x.innerText = "+"+xp+" XP ⚡";
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}
</script>

</body>
</html>
