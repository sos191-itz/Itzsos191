<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* TERMINAL */
.terminal{
  background:#000;
  padding:10px;
  font-size:12px;
  margin-bottom:10px;
}

/* MISSION */
.mission{
  background:#111422;
  padding:15px;
  border-left:4px solid #6a00ff;
  border-radius:10px;
}

/* TASK */
.task{
  background:#111422;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.completed{
  border-left:4px solid #00ff99;
  opacity:0.7;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#000;
  color:#00ffdd;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:#6a00ff;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* PROGRESS */
.progressBar{
  height:10px;
  background:#222;
  border-radius:10px;
}
.progressFill{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  border-radius:10px;
  transition:0.5s;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px;
  border-radius:8px;
  display:none;
  font-weight:bold;
}

.toast-success{background:#00ff99;color:black;}
.toast-error{background:#ff0040;color:white;}
.toast-info{background:#6a00ff;color:white;}

/* XP POP */
#xpPop{
  position:fixed;
  top:20px;
  right:20px;
  background:#00ffdd;
  color:black;
  padding:10px;
  border-radius:8px;
  display:none;
}

/* HINT */
.hint{
  display:none;
  margin-top:10px;
  background:#1a1f35;
  padding:10px;
  border-left:4px solid orange;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs PREMIUM LAB</div>
</nav>

<div class="container">

<div id="terminal" class="terminal"></div>

<div id="missionBox" class="mission"></div>

<p id="progressText"></p>
<div class="progressBar"><div id="progressFill" class="progressFill"></div></div>

<div id="tasksContainer"></div>

</div>

<div id="toast"></div>
<div id="xpPop"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* STATE */
let stageId = new URLSearchParams(location.search).get("id") || "stage1";
let stageData, tasks;
let completedTasks = [];
let userData;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  userData = userSnap.data();

  /* 🔒 BLOCK REPLAY */
  if(userData.solvedStages && userData.solvedStages.includes(stageId)){
    showToast("⚠️ Stage already completed","info");
    setTimeout(()=>location.href="stages.html",1500);
    return;
  }

  completedTasks = userData.completedTasks?.[stageId] || [];

  const snap = await getDoc(doc(db,"stages",stageId));
  stageData = snap.data();
  tasks = stageData.tasks || [];

  document.getElementById("terminal").innerText =
    "root@itzsos:~# run " + stageId;

  document.getElementById("missionBox").innerHTML = `
    <h3>🎯 Mission</h3>
    <p>${stageData.mission}</p>
    <p>${stageData.intro}</p>
  `;

  renderTasks();
});

/* RENDER */
function renderTasks(){
  const box = document.getElementById("tasksContainer");
  box.innerHTML="";

  tasks.forEach((t,i)=>{
    const done = completedTasks.includes(i);

    const div = document.createElement("div");
    div.className = "task "+(done?"completed":"");

    div.innerHTML = `
      <h3>Task ${i+1}: ${t.title}</h3>
      <p>${t.text}</p>

      ${t.image ? `<img src="${t.image}" width="100%">` : ""}

      <input id="ans${i}" ${done?"disabled":""} placeholder="Enter answer">

      <button onclick="submitTask(${i})" ${done?"disabled":""}>
        ${done?"Solved":"Submit"}
      </button>

      <button onclick="toggleHint(${i})">🌍 Hint (-${t.hintCost||0})</button>

      <div id="hint${i}" class="hint">${t.hint||""}</div>

      <p>XP: ${t.xp}</p>
    `;

    box.appendChild(div);
  });

  updateProgress();
}

/* SUBMIT */
window.submitTask = async(i)=>{
  if(completedTasks.includes(i)) return;

  const val = document.getElementById("ans"+i).value.toLowerCase().trim();
  const task = tasks[i];
  const correct = task.answer.map(a=>a.toLowerCase());

  if(!correct.some(a=>val.includes(a))){
    showToast("❌ Access Denied","error");
    return;
  }

  completedTasks.push(i);

  showToast("🔥 Correct","success");
  showXP(task.xp);

  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let completed = data.completedTasks || {};
  completed[stageId] = completedTasks;

  await updateDoc(userRef,{
    completedTasks: completed,
    xp:(data.xp||0)+task.xp
  });

  renderTasks();

  if(completedTasks.length === tasks.length){
    completeStage();
  }
};

/* COMPLETE */
async function completeStage(){
  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let solved = data.solvedStages || [];
  if(!solved.includes(stageId)){
    solved.push(stageId);
  }

  await updateDoc(userRef,{solvedStages: solved});

  showToast("🏆 Stage Completed!","success");

  goNext();
}

/* NEXT */
async function goNext(){
  const snap = await getDocs(collection(db,"stages"));
  let next=null;

  snap.forEach(d=>{
    if(d.data().order === stageData.order+1){
      next = d.id;
    }
  });

  setTimeout(()=>{
    if(next){
      location.href = "stage.html?id="+next;
    }else{
      location.href = "stages.html";
    }
  },1500);
}

/* PROGRESS */
function updateProgress(){
  document.getElementById("progressText").innerText =
    "Progress: "+completedTasks.length+" / "+tasks.length;

  document.getElementById("progressFill").style.width =
    (completedTasks.length/tasks.length)*100+"%";
}

/* TOAST */
function showToast(msg,type){
  const t = document.getElementById("toast");
  t.className = "toast-"+type;
  t.innerText = msg;
  t.style.display="block";

  setTimeout(()=>t.style.display="none",2000);
}

/* XP */
function showXP(xp){
  const x = document.getElementById("xpPop");
  x.innerText = "+"+xp+" XP ⚡";
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}

/* HINT */
window.toggleHint = (i)=>{
  const h = document.getElementById("hint"+i);
  h.style.display = h.style.display==="block"?"none":"block";
};
</script>

</body>
</html>
