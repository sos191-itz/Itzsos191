
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}
nav button{
  background:#6a00ff;
  border:none;
  padding:8px;
  color:white;
  cursor:pointer;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.terminal{
  background:#000;
  padding:10px;
  font-size:12px;
  margin-bottom:10px;
}

.mission{
  background:#111422;
  padding:15px;
  border-left:4px solid #6a00ff;
  border-radius:10px;
}

.task{
  background:#111422;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.task.completed{
  border-left:4px solid #00ff99;
  box-shadow:0 0 15px #00ff99;
}

.task img{
  width:100%;
  margin:10px 0;
  border-radius:8px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#000;
  color:#00ffdd;
  border:none;
  border-radius:6px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#6a00ff;
  color:white;
  border-radius:6px;
}

.progressBar{
  height:10px;
  background:#222;
  border-radius:10px;
}
.progressFill{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  border-radius:10px;
  transition:1s;
}

.hint{
  display:none;
  margin-top:10px;
  background:#1a1f35;
  padding:10px;
  border-left:4px solid orange;
}

#message{
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}
.success{background:#003300;}
.error{background:#330000;}

#xpPop{
  position:fixed;
  top:20px;
  right:20px;
  background:#00ffdd;
  color:black;
  padding:10px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs PREMIUM LAB</div>
</nav>

<div class="container">

<div id="terminal" class="terminal"></div>

<div id="missionBox" class="mission"></div>

<p id="progressText"></p>
<div class="progressBar"><div id="progressFill" class="progressFill"></div></div>

<div id="tasksContainer"></div>

<div id="message"></div>

</div>

<div id="xpPop"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let stageData, tasks, currentUser, stageId;
let completedTasks = [];

/* GET STAGE ID */
const params = new URLSearchParams(window.location.search);
stageId = params.get("id") || "stage1";

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  const userData = userSnap.data();

  completedTasks = userData.completedTasks?.[stageId] || [];

  /* LOAD STAGE */
  const snap = await getDoc(doc(db,"stages",stageId));
  stageData = snap.data();
  tasks = stageData.tasks || [];

  document.getElementById("terminal").innerText =
    "root@itzsos:~# run " + stageId;

  document.getElementById("missionBox").innerHTML = `
    <h3>🎯 Mission Brief</h3>
    <p>${stageData.mission}</p>
    <p>${stageData.intro}</p>
  `;

  renderTasks();
});

/* RENDER TASKS */
function renderTasks(){
  const container = document.getElementById("tasksContainer");
  container.innerHTML="";

  tasks.forEach((t,i)=>{
    const done = completedTasks.includes(i);

    const div = document.createElement("div");
    div.className = "task " + (done?"completed":"");

    div.innerHTML = `
      <h3>Task ${i+1}: ${t.title}</h3>
      <p>${t.text}</p>

      ${t.image ? `<img src="${t.image}">` : ""}

      <input id="input${i}" placeholder="Enter answer" ${done?"disabled":""}>

      <button onclick="submitAnswer(${i})" ${done?"disabled":""}>
        ${done?"Solved":"Submit"}
      </button>

      <button onclick="toggleHint(${i})">🌍 Hint (-${t.hintCost||0})</button>

      <div id="hint${i}" class="hint">${t.hint||""}</div>

      <p>XP: ${t.xp}</p>
    `;

    container.appendChild(div);
  });

  updateProgress();
}

/* SUBMIT */
window.submitAnswer = async(i)=>{
  if(completedTasks.includes(i)) return;

  const val = document.getElementById("input"+i).value.toLowerCase().trim();
  const task = tasks[i];

  const correct = task.answer.map(a=>a.toLowerCase());

  const keywords = ["fake","password","weak","phishing","domain","spoof"];

  if(correct.some(a=>val.includes(a)) || keywords.some(k=>val.includes(k))){

    completedTasks.push(i);

    showMessage("🔥 Correct!","success");

    showXP(task.xp);

    document.getElementById("input"+i).disabled = true;

    /* SAVE */
    const userRef = doc(db,"users",currentUser.uid);
    const snap = await getDoc(userRef);
    const data = snap.data();

    let all = data.completedTasks || {};
    all[stageId] = completedTasks;

    await updateDoc(userRef,{
      completedTasks: all,
      xp:(data.xp||0)+task.xp
    });

    renderTasks();

    /* CHECK COMPLETE */
    if(completedTasks.length === tasks.length){
      showMessage("🏆 Stage Completed! Loading next...","success");
      goNextStage();
    }

  } else {
    showMessage("❌ Not quite. Try again.","error");
  }
};

/* PROGRESS */
function updateProgress(){
  document.getElementById("progressText").innerText =
    "Progress: "+completedTasks.length+" / "+tasks.length;

  document.getElementById("progressFill").style.width =
    (completedTasks.length/tasks.length)*100+"%";
}

/* HINT */
window.toggleHint = (i)=>{
  const h = document.getElementById("hint"+i);
  h.style.display = h.style.display==="block"?"none":"block";
};

/* XP POP */
function showXP(xp){
  const pop = document.getElementById("xpPop");
  pop.innerText = "+"+xp+" XP ⚡";
  pop.style.display="block";
  setTimeout(()=>pop.style.display="none",2000);
}

/* MESSAGE */
function showMessage(text,type){
  const m = document.getElementById("message");
  m.className = type;
  m.innerText = text;
}

/* NEXT STAGE */
async function goNextStage(){
  const snap = await getDocs(collection(db,"stages"));

  let next = null;

  snap.forEach(docSnap=>{
    const d = docSnap.data();
    if(d.order === stageData.order + 1){
      next = docSnap.id;
    }
  });

  setTimeout(()=>{
    if(next){
      location.href = "stage.html?id="+next;
    } else {
      location.href = "stages.html";
    }
  },2000);
}
</script>

</body>
</html>
