<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* HEADER / STAGE NAV */
header{
  background:#111422;
  padding:10px 20px;
  display:flex;
  justify-content:center;
  gap:10px;
  border-bottom:1px solid #00ffdd;
  position:sticky;
  top:0;
  z-index:100;
}

header button{
  background:#00ffdd;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}
header button:hover{
  background:#ff6600;
  color:black;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

/* INTRO */
#introBox{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
  border-left:4px solid #ff6600;
  line-height:1.6;
}

/* TASK */
.task{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid #00ffdd;
}

/* IMAGE */
.task img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button.submitBtn{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  font-weight:bold;
  border-radius:6px;
}
button.submitBtn:hover{
  background:#ff6600;
  color:black;
}

/* RESULT */
.result{
  margin-top:10px;
  font-weight:bold;
}
.correct{ color:#00ff99; }
.wrong{ color:#ff4444; }

</style>
</head>

<body>

<header>
  <button onclick="goToStage(1)">Stage 1</button>
  <button onclick="goToStage(2)">Stage 2</button>
  <button onclick="goToStage(3)">Stage 3</button>
  <button onclick="goToStage(4)">Stage 4</button>
  <button onclick="goToStage(5)">Stage 5</button>
  <button onclick="goToStage(6)">Stage 6</button>
</header>

<div class="container">

  <h2>🧠 Stage 1: Phishing Basics</h2>

  <!-- INTRO -->
  <div id="introBox">Loading intro...</div>

  <!-- TASKS -->
  <div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const introBox = document.getElementById("introBox");
const tasksDiv = document.getElementById("tasks");

let currentUser;
let userData;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="index.html";
    return;
  }

  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);

  if(!snap.exists()){
    location.href="index.html";
    return;
  }

  userData = snap.data();

  loadIntro();
  loadTasks();
});

/* NAVIGATION */
function goToStage(n){
  location.href = "stage" + n + ".html";
}

/* LOAD INTRO */
async function loadIntro(){
  try{
    const stageRef = doc(db,"stages","stage1");
    const snap = await getDoc(stageRef);

    if(!snap.exists()){
      introBox.innerText = "No intro found.";
      return;
    }

    const data = snap.data();
    introBox.innerHTML = "";

    if(data.intro){
      const p = document.createElement("p");
      p.innerText = data.intro;
      introBox.appendChild(p);
    } else {
      introBox.innerText = "No intro available.";
    }

  }catch(e){
    introBox.innerText = "Error loading intro.";
    console.error(e);
  }
}

/* LOAD TASKS */
async function loadTasks(){
  try{
    tasksDiv.innerHTML = "";

    // Only one task per stage (current structure)
    const stageRef = doc(db,"stages","stage1");
    const snap = await getDoc(stageRef);

    if(!snap.exists()){
      tasksDiv.innerText = "No tasks found.";
      return;
    }

    const t = snap.data();
    const id = "stage1";

    tasksDiv.innerHTML = `
      <div class="task">
        <h3>${t.title}</h3>
        <p>${t.text}</p>
        ${t.image ? `<img src="${t.image}">` : ""}
        <input id="input-${id}" placeholder="Your answer...">
        <button class="submitBtn" onclick="submitAnswer('${id}')">Submit</button>
        <div id="result-${id}" class="result"></div>
      </div>
    `;

  }catch(e){
    tasksDiv.innerText = "Error loading tasks.";
    console.error(e);
  }
}

/* CHECK ANSWER */
window.submitAnswer = async(id)=>{
  const input = document.getElementById("input-"+id).value.toLowerCase().trim();
  const resultBox = document.getElementById("result-"+id);

  if(!input){
    resultBox.innerHTML = "⚠️ Enter answer";
    return;
  }

  const taskRef = doc(db,"stages",id);
  const snap = await getDoc(taskRef);
  const task = snap.data();

  const correctAnswers = task.answer || []; // note: your Firestore field is 'answer'

  if(correctAnswers.some(a => input.includes(a.toLowerCase()))){
    resultBox.innerHTML = "✅ Correct! +" + task.xp + " XP";
    resultBox.className = "result correct";

    let solved = userData.solvedTasks || [];

    if(!solved.includes(id)){
      solved.push(id);

      await updateDoc(doc(db,"users",currentUser.uid),{
        solvedTasks: solved,
        xp: (userData.xp || 0) + task.xp
      });

      userData.xp = (userData.xp || 0) + task.xp;
      userData.solvedTasks = solved;
    }

  } else {
    resultBox.innerHTML = "❌ Wrong! " + (task.hint || "");
    resultBox.className = "result wrong";
  }
};
</script>

</body>
</html>
