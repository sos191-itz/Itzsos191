<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage 1</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111422;
  border-bottom:1px solid #00ffdd;
}

nav h2 { color:#ff6600; }

nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  cursor:pointer;
  font-weight:bold;
}

.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

.task-card {
  background:#111422;
  padding:20px;
  border-radius:10px;
  border:1px solid #00ffdd;
}

.task-card img {
  width:100%;
  border-radius:8px;
  margin:15px 0;
  border:1px solid #00ffdd;
}

/* XP */
.xp {
  background:#00ffdd;
  color:#000;
  padding:5px 10px;
  border-radius:20px;
  display:inline-block;
  margin-bottom:10px;
}

/* INPUT */
input {
  width:100%;
  padding:8px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

/* BUTTONS */
.actions {
  display:flex;
  gap:10px;
  margin-top:10px;
}

button {
  padding:8px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  border-radius:6px;
}

.submitBtn {
  background:#00ffdd;
}

.hintBtn {
  background:#ff6600;
  color:black;
}

/* HINT BOX */
.hintBox {
  display:none;
  margin-top:10px;
  background:#1a1f35;
  padding:10px;
  border-radius:6px;
  color:#ff6600;
}

/* EXPLANATION */
.explanation {
  display:none;
  margin-top:10px;
  background:#111;
  padding:10px;
  border-radius:6px;
  color:#00ff99;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs</h2>
  <button onclick="location.href='stages.html'">Back</button>
</nav>

<div class="container">

<h2>Stage Introduction</h2>
<p id="intro">Loading...</p>

<div id="task"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc,arrayUnion } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
});

const auth = getAuth();
const db = getFirestore();

let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;

  const ref = doc(db,"stages","stage1");
  const snap = await getDoc(ref);

  if(!snap.exists()){
    document.getElementById("intro").innerText = "No stage data found.";
    return;
  }

  const data = snap.data();

  document.getElementById("intro").innerText = data.intro;

  // TASK UI
  document.getElementById("task").innerHTML = `
    <div class="task-card">
      <h3>${data.title}</h3>
      <p>${data.text}</p>

      ${data.image ? `<img src="${data.image}" />` : "<p style='color:red'>⚠️ No image found</p>"}

      <div class="xp">XP: ${data.xp}</div>

      <input id="answer" placeholder="Enter answer">

      <div class="actions">
        <button class="submitBtn" onclick="submitAnswer()">Submit</button>
        <button class="hintBtn" onclick="toggleHint()">🌍 Hint</button>
      </div>

      <div id="hintBox" class="hintBox">
        ${data.hint}
      </div>

      <div id="explanation" class="explanation">
        ${data.description}
      </div>
    </div>
  `;

  window.submitAnswer = async()=>{
    const val = document.getElementById("answer").value.toLowerCase().trim();
    const correct = data.answer.map(a=>a.toLowerCase());

    if(correct.includes(val)){
      alert("✅ Correct!");

      document.getElementById("explanation").style.display="block";

      const userRef = doc(db,"users",currentUser.uid);
      await updateDoc(userRef,{
        xp: arrayUnion(data.xp),
        solvedStages: arrayUnion("stage1")
      });

    } else {
      alert("❌ Wrong");
    }
  }

  window.toggleHint = ()=>{
    const box = document.getElementById("hintBox");
    box.style.display = box.style.display==="block"?"none":"block";
  }
});
</script>

</body>
</html>
