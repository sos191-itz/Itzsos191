<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0b0f1a;
  color:#00ffdd;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.task{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border-left:4px solid #00ffdd;
}

.task img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  font-weight:bold;
}

.hintBox{
  display:none;
  margin-top:10px;
  color:#ff6600;
}
</style>
</head>

<body>

<div class="container">

<h2>🎯 Stage 1: Phishing Detection</h2>

<div id="tasksContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser = user;

  const snap = await getDoc(doc(db,"stages","stage1"));

  if(!snap.exists()){
    alert("No stage data");
    return;
  }

  const data = snap.data();

  if(!data.tasks || data.tasks.length === 0){
    alert("No tasks found");
    return;
  }

  renderTasks(data.tasks);
});

function renderTasks(tasks){
  const container = document.getElementById("tasksContainer");
  container.innerHTML = "";

  tasks.forEach((task,i)=>{

    if(!task.title) return; // safety

    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <h3>Task ${i+1}: ${task.title}</h3>
      <p>${task.text}</p>

      ${task.image ? `<img src="${task.image}">` : ""}

      <p><b>XP:</b> ${task.xp}</p>

      <input id="input${i}" placeholder="Enter answer">

      <button onclick="submitAnswer(${i})">Submit</button>
      <button onclick="toggleHint(${i})">🌍 Hint (-${task.hintCost})</button>

      <div id="hint${i}" class="hintBox">${task.hint}</div>
    `;

    container.appendChild(div);
  });
}

window.toggleHint = (i)=>{
  const box = document.getElementById("hint"+i);
  box.style.display = box.style.display === "block" ? "none" : "block";
};

window.submitAnswer = async(i)=>{
  const input = document.getElementById("input"+i).value.toLowerCase().trim();

  const snap = await getDoc(doc(db,"stages","stage1"));
  const task = snap.data().tasks[i];

  if(task.answer.includes(input)){
    alert("✅ Correct!");

    const userRef = doc(db,"users",currentUser.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();

    await updateDoc(userRef,{
      xp:(userData.xp||0)+task.xp
    });

  } else {
    alert("❌ Wrong answer");
  }
};
</script>

</body>
</html>
