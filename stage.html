<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage 1</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0b0f1a;
  color:#00ffdd;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.task{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  border-left:4px solid #00ffdd;
  opacity:0.4;
  pointer-events:none;
  transition:0.3s;
}

.task.active{
  opacity:1;
  pointer-events:auto;
  border-left:4px solid #ff6600;
}

.task.completed{
  border-left:4px solid #00ff99;
}

img{
  width:100%;
  margin:10px 0;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:8px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
}

.progress{
  margin:20px 0;
}
.bar{
  height:10px;
  background:#222;
}
.fill{
  height:10px;
  background:#00ffdd;
  width:0%;
}
</style>
</head>

<body>

<div class="container">

<h2 id="mission"></h2>
<p id="intro"></p>

<div class="progress">
  <div class="bar"><div id="progressFill" class="fill"></div></div>
</div>

<div id="tasksContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,doc,getDoc,updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const auth = getAuth();
const db = getFirestore();

let currentUser;
let currentTaskIndex = 0;
let tasksData = [];

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser = user;

  const snap = await getDoc(doc(db,"stages","stage1"));
  const data = snap.data();

  document.getElementById("mission").innerText = data.mission;
  document.getElementById("intro").innerText = data.intro;

  tasksData = data.tasks;

  renderTasks();
});

function renderTasks(){
  const container = document.getElementById("tasksContainer");
  container.innerHTML = "";

  tasksData.forEach((task,i)=>{
    const div = document.createElement("div");
    div.className = "task " + (i===0 ? "active" : "");

    div.innerHTML = `
      <h3>Task ${i+1}: ${task.title}</h3>
      <p>${task.text}</p>

      ${task.image ? `<img src="${task.image}">` : ""}

      <input id="input${i}" placeholder="Answer">
      <button onclick="checkAnswer(${i})">Submit</button>
      <p>XP: ${task.xp}</p>
    `;

    container.appendChild(div);
  });
}

window.checkAnswer = async(i)=>{
  const val = document.getElementById("input"+i).value.toLowerCase();
  const task = tasksData[i];

  if(task.answer.includes(val)){
    alert("✅ Correct!");

    document.querySelectorAll(".task")[i].classList.add("completed");

    // Unlock next
    if(i+1 < tasksData.length){
      document.querySelectorAll(".task")[i+1].classList.add("active");
    }

    // Update progress
    currentTaskIndex++;
    const progress = (currentTaskIndex / tasksData.length) * 100;
    document.getElementById("progressFill").style.width = progress+"%";

    // Give XP
    const userRef = doc(db,"users",currentUser.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();

    await updateDoc(userRef,{
      xp:(userData.xp||0)+task.xp
    });

  } else {
    alert("❌ Wrong");
  }
}
</script>

</body>
</html>
