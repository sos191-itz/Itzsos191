<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Premium Lab | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:radial-gradient(circle,#05070d,#02030a);
  color:#00ffdd;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(17,20,34,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #6a00ff;
}

nav button{
  background:#6a00ff;
  border:none;
  padding:8px 12px;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* PREMIUM BADGE */
.badge{
  color:#ffcc00;
  font-size:12px;
}

/* MISSION */
.mission{
  background:rgba(17,20,34,0.9);
  padding:20px;
  border-radius:12px;
  border-left:4px solid #6a00ff;
  box-shadow:0 0 20px #6a00ff33;
  animation:fadeIn 1s;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-10px);}
  to{opacity:1;}
}

/* PROGRESS */
.bar{
  height:10px;
  background:#222;
  border-radius:10px;
  margin:15px 0;
}
.fill{
  height:10px;
  width:0%;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  border-radius:10px;
  transition:1s;
}

/* TASK */
.task{
  background:rgba(17,20,34,0.9);
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  border-left:4px solid #333;
  opacity:0.3;
  pointer-events:none;
  transition:0.4s;
}

.task.active{
  opacity:1;
  pointer-events:auto;
  border-left:4px solid #6a00ff;
}

.task.completed{
  border-left:4px solid #00ff99;
  box-shadow:0 0 15px #00ff99;
}

/* IMAGE */
.task img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  background:#000;
  color:#00ffdd;
  border:none;
  border-radius:6px;
  margin-top:10px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#6a00ff;
  color:white;
  border-radius:6px;
}

/* HINT */
.hintBox{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#1a1f35;
  border-left:4px solid orange;
  border-radius:6px;
}

/* XP POP */
#xpPop{
  position:fixed;
  top:20px;
  right:20px;
  background:#00ffdd;
  color:black;
  padding:10px;
  border-radius:8px;
  display:none;
}

/* LOCK TEXT */
.lock{
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs <span class="badge">PREMIUM LAB</span></div>
</nav>

<div class="container">

<div id="missionBox" class="mission"></div>

<div class="bar"><div id="progressFill" class="fill"></div></div>

<div id="tasksContainer"></div>

</div>

<div id="xpPop"></div>

<audio id="sound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let currentUser;
let currentIndex = 0;
let tasks = [];

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;

  const snap = await getDoc(doc(db,"stages","stage1"));
  const data = snap.data();

  tasks = data.tasks;

  document.getElementById("missionBox").innerHTML = `
    <h3>🎯 Mission Brief</h3>
    <p>${data.mission || ""}</p>
    <p>${data.intro || ""}</p>
  `;

  renderTasks();
});

function renderTasks(){
  const container = document.getElementById("tasksContainer");
  container.innerHTML="";

  tasks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="task "+(i===0?"active":"");

    div.innerHTML=`
      <h3>Task ${i+1}: ${t.title}</h3>
      <p>${t.text}</p>

      ${t.image ? `<img src="${t.image}">` : ""}

      <input id="input${i}" placeholder="Enter answer">

      <button onclick="submitAnswer(${i})">Submit</button>
      <button onclick="showHint(${i})">🌍 Hint (-${t.hintCost})</button>

      <div id="hint${i}" class="hintBox">${t.hint}</div>

      <p>XP: ${t.xp}</p>

      ${i>0 ? `<div class="lock">🔒 Premium locked</div>` : ""}
    `;

    container.appendChild(div);
  });
}

window.submitAnswer = async(i)=>{
  if(i!==currentIndex) return;

  const input = document.getElementById("input"+i).value.toLowerCase().trim();
  const task = tasks[i];

  if(task.answer.includes(input)){

    // XP POP
    const xpPop=document.getElementById("xpPop");
    xpPop.innerText="+"+task.xp+" XP ⚡";
    xpPop.style.display="block";
    setTimeout(()=>xpPop.style.display="none",2000);

    // SOUND
    document.getElementById("sound").play();

    // COMPLETE
    document.querySelectorAll(".task")[i].classList.add("completed");

    currentIndex++;

    if(currentIndex < tasks.length){
      const next=document.querySelectorAll(".task")[currentIndex];
      next.classList.add("active");
      next.querySelector(".lock")?.remove();
    }

    // PROGRESS
    const progress=(currentIndex/tasks.length)*100;
    document.getElementById("progressFill").style.width=progress+"%";

    // UPDATE XP
    const userRef=doc(db,"users",currentUser.uid);
    const userSnap=await getDoc(userRef);
    const userData=userSnap.data();

    await updateDoc(userRef,{
      xp:(userData.xp||0)+task.xp
    });

  } else {
    alert("❌ Wrong answer");
  }
};

window.showHint = async(i)=>{
  const box=document.getElementById("hint"+i);

  if(box.style.display==="block"){
    box.style.display="none";
    return;
  }

  const task=tasks[i];

  const userRef=doc(db,"users",currentUser.uid);
  const userSnap=await getDoc(userRef);
  const userData=userSnap.data();

  let newXP=(userData.xp||0)-(task.hintCost||0);
  if(newXP<0) newXP=0;

  await updateDoc(userRef,{xp:newXP});

  box.style.display="block";

  const xpPop=document.getElementById("xpPop");
  xpPop.innerText="-"+task.hintCost+" XP 🧠";
  xpPop.style.display="block";
  setTimeout(()=>xpPop.style.display="none",2000);
};
</script>

</body>
</html>
