<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage</title>

<style>
body{
  background:#05070d;
  color:#00ffdd;
  font-family:monospace;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.task{
  background:#111;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.completed{
  border-left:4px solid #00ff99;
  opacity:0.6;
}

button{
  padding:10px;
  margin-top:10px;
  background:#6a00ff;
  border:none;
  color:white;
  cursor:pointer;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#000;
  color:#00ffdd;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<button onclick="location.href='stages.html'">⬅ Back</button>

<h2 id="title"></h2>
<div id="mission"></div>
<p id="progress"></p>

<div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* STATE */
let stageId = new URLSearchParams(location.search).get("id") || "stage1";
let stageData, tasks;
let completedTasks = [];
let userData;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  userData = userSnap.data();

  /* 🔒 HARD BLOCK (NO REPLAY) */
  if(userData.solvedStages && userData.solvedStages.includes(stageId)){
    alert("⚠️ You already completed this stage!");
    location.href = "stages.html";
    return;
  }

  completedTasks = userData.completedTasks?.[stageId] || [];

  const stageSnap = await getDoc(doc(db,"stages",stageId));
  stageData = stageSnap.data();
  tasks = stageData.tasks || [];

  document.getElementById("title").innerText = stageData.title;

  document.getElementById("mission").innerHTML = `
    <h3>🎯 Mission</h3>
    <p>${stageData.mission}</p>
    <p>${stageData.intro}</p>
  `;

  renderTasks();
});

/* RENDER */
function renderTasks(){
  const box = document.getElementById("tasks");
  box.innerHTML="";

  tasks.forEach((t,i)=>{
    const done = completedTasks.includes(i);

    const div = document.createElement("div");
    div.className = "task " + (done?"completed":"");

    div.innerHTML = `
      <h4>Task ${i+1}: ${t.title}</h4>
      <p>${t.text}</p>

      ${t.image ? `<img src="${t.image}" width="100%">` : ""}

      <input id="ans${i}" ${done?"disabled":""} placeholder="Answer">

      <button onclick="submitTask(${i})" ${done?"disabled":""}>
        ${done?"Solved":"Submit"}
      </button>

      <button onclick="alert('${t.hint || "No hint"}')">🌍 Hint</button>

      <p>XP: ${t.xp}</p>
    `;

    box.appendChild(div);
  });

  updateProgress();
}

/* SUBMIT */
window.submitTask = async(i)=>{
  if(completedTasks.includes(i)) return;

  const val = document.getElementById("ans"+i).value.toLowerCase().trim();
  const task = tasks[i];

  const correct = task.answer.map(a=>a.toLowerCase());

  if(!correct.some(a=>val.includes(a))){
    alert("❌ Wrong answer");
    return;
  }

  completedTasks.push(i);

  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let completed = data.completedTasks || {};
  completed[stageId] = completedTasks;

  await updateDoc(userRef,{
    completedTasks: completed,
    xp:(data.xp||0)+task.xp
  });

  renderTasks();

  /* 🎯 ALL TASKS DONE */
  if(completedTasks.length === tasks.length){
    completeStage();
  }
};

/* COMPLETE STAGE */
async function completeStage(){
  const userRef = doc(db,"users",auth.currentUser.uid);
  const snap = await getDoc(userRef);
  const data = snap.data();

  let solved = data.solvedStages || [];

  /* 🚫 PREVENT DUPLICATE */
  if(!solved.includes(stageId)){
    solved.push(stageId);
  }

  await updateDoc(userRef,{
    solvedStages: solved
  });

  alert("🏆 Stage Completed!");

  goNextStage();
}

/* AUTO NEXT */
async function goNextStage(){
  const snap = await getDocs(collection(db,"stages"));
  let next = null;

  snap.forEach(d=>{
    if(d.data().order === stageData.order + 1){
      next = d.id;
    }
  });

  setTimeout(()=>{
    if(next){
      location.href = "stage.html?id=" + next;
    } else {
      location.href = "stages.html";
    }
  },1500);
}

/* PROGRESS */
function updateProgress(){
  document.getElementById("progress").innerText =
    "Progress: " + completedTasks.length + " / " + tasks.length;
}
</script>

</body>
</html>
