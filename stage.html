<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>
<style>
body {
  margin:0;
  font-family: monospace;
  background:#0f111a;
  color:#00ffdd;
  overflow-x:hidden;
  transition: background 0.3s ease;
}
nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
nav button:hover { background:#00ffdd; color:#111; }
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,255,221,0.2);
  position:relative;
  overflow:hidden;
}
input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:black;
  border:1px solid #00ffdd;
  color:white;
  border-radius:5px;
}
button {
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
  border-radius:5px;
  transition:0.3s;
}
button.submit { background:#00ffdd; color:#111; }
button.submit:hover { background:#ff6600; color:#111; }
button.hintBtn { background:#ff6600; }
#result, #hintBox { margin-top:15px; font-weight:bold; }
.locked { font-size:1.2rem; color:orange; text-align:center; margin-top:20px; opacity:0.6; }
#terminalContainer {
  display:none;
  background:black;
  padding:15px;
  border-radius:8px;
  border:1px solid #00ffdd;
  max-height:400px;
  overflow-y:auto;
  margin-top:20px;
  box-shadow:0 0 15px #00ffdd;
}
.prompt {
  color:#ff6600;
}
#terminalInput {
  background:black;
  color:#00ffdd;
  border:none;
  outline:none;
  flex:1;
  font-family:monospace;
}
#progressBar {
  height:12px;
  width:0%;
  background:linear-gradient(90deg,#00ffdd,#00aa88);
  transition:width 0.5s ease;
}
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs - Stage</h2>
  <button id="backBtn">Back</button>
</nav>

<div class="container">
  <!-- Progress -->
  <div id="progressWrapper" style="margin-bottom:20px;">
    <div id="progressText" style="margin-bottom:5px; font-weight:bold;">Loading progress...</div>
    <div style="background:#222; border-radius:8px; overflow:hidden;">
      <div id="progressBar"></div>
    </div>
  </div>

  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <!-- Normal flag input -->
  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>
  <div id="result"></div>
  <div id="hintBox"></div>

  <button id="nextStageBtn" style="display:none; background:orange;">Go To Next Stage →</button>

  <!-- Terminal container for Stage 4 -->
  <div id="terminalContainer">
    <div id="terminalOutput"></div>
    <div style="display:flex; align-items:center; margin-top:5px;">
      <span class="prompt">user@itzsos:~$</span>
      <input id="terminalInput" type="text" autofocus>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { 
  getFirestore, doc, getDoc, updateDoc, arrayUnion, increment 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageId = new URLSearchParams(window.location.search).get("id");
let currentUser = null;
let correctAnswer = "";
let stageXP = 0;
let stageHint = "";
let currentOrder = 0;
const nextStageBtn = document.getElementById("nextStageBtn");
const TOTAL_STAGES = 50;

// Elements
const stageTitleEl = document.getElementById("stageTitle");
const stageTextEl = document.getElementById("stageText");
const defaultFlagArea = document.getElementById("defaultFlagArea");
const resultEl = document.getElementById("result");
const hintBoxEl = document.getElementById("hintBox");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const terminalContainer = document.getElementById("terminalContainer");
const terminalOutput = document.getElementById("terminalOutput");
const terminalInput = document.getElementById("terminalInput");

// Back button
document.getElementById("backBtn").onclick = () => { window.location.href="stages.html"; };

// Terminal typing animation
function typeTerminal(text, container, speed=30){
  let i=0;
  const interval = setInterval(()=>{
    container.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
    container.scrollTop = container.scrollHeight;
  }, speed);
}

// Auth check
onAuthStateChanged(auth, async (user)=>{
  if(!user){ alert("Please login first!"); window.location.href="index.html"; return; }
  currentUser = user;
  if(!user.emailVerified){ alert("Verify email!"); window.location.href="index.html"; return; }

  const userRef = doc(db,"users",user.uid);
  const userSnap = await getDoc(userRef);
  if(!userSnap.exists()){ window.location.href="selection.html"; return; }
  const userData = userSnap.data();
  if(userData.selectedField !== "IT"){ alert("🚫 Only Cybersecurity users allowed."); window.location.href="selection.html"; return; }

  stageXP = 0;
  correctAnswer = "";
  stageHint = "";

  await loadStage(userData);
});

// Load stage
async function loadStage(userData){
  const stageRef = doc(db,"stages",stageId);
  const stageSnap = await getDoc(stageRef);
  if(!stageSnap.exists()){ stageTitleEl.textContent="Stage not found"; return; }
  const stageData = stageSnap.data();
  currentOrder = stageData.order;
  const percentage = Math.round((currentOrder/TOTAL_STAGES)*100);
  progressText.textContent = `Stage ${currentOrder} / ${TOTAL_STAGES} (${percentage}%)`;
  progressBar.style.width = percentage+"%";
  stageTitleEl.textContent = stageData.title;
  stageTextEl.textContent = stageData.text;

  correctAnswer = stageData.answer || "";
  stageXP = stageData.xp || 0;
  stageHint = stageData.hint || "No hint available";

  // Lock stages
  let solvedStages = userData.solvedStages || [];
  if(solvedStages.includes("[]")) solvedStages = solvedStages.filter(s=>"[]");
  let highestSolved=0;
  for(let s of solvedStages){
    const num = parseInt(s.replace("stage",""));
    if(!isNaN(num) && num>highestSolved) highestSolved=num;
  }
  if(currentOrder > highestSolved+1){
    defaultFlagArea.style.display="none";
    document.getElementById("hintBtn").style.display="none";
    resultEl.style.display="none";
    hintBoxEl.style.display="none";
    stageTextEl.textContent = stageData.title + " 🔒 Locked";
    return;
  }

  // Stage 3: Admin login
  if(stageId==="stage3"){
    defaultFlagArea.style.display="none";
    document.querySelector(".container").innerHTML += `
      <h3>Admin Login</h3>
      <input type="text" id="loginUser" placeholder="Username">
      <input type="password" id="loginPass" placeholder="Password">
      <button id="loginBtnSim" class="submit">Login</button>
      <div id="loginResult"></div>
    `;
    document.getElementById("loginBtnSim").onclick = async ()=>{
      const username = document.getElementById("loginUser").value;
      const userRef = doc(db,"users",currentUser.uid);
      const userSnap = await getDoc(userRef);
      const solved = userSnap.exists()?userSnap.data().solvedStages||[]:[];
      if(solved.includes(stageId)){
        document.getElementById("loginResult").textContent="⚠️ Already solved!";
        return;
      }
      if(username.includes("' OR 1=1")){
        document.getElementById("loginResult").innerHTML="🎉 Access Granted!<br>Flag: "+correctAnswer;
        await updateDoc(userRef,{
          solvedStages: arrayUnion(stageId),
          xp: increment(stageXP)
        });
      } else {
        document.getElementById("loginResult").textContent="Access Denied.";
      }
    };
    return;
  }

  // Stage 4: Terminal
  if(stageId==="stage4"){
    defaultFlagArea.style.display="none";
    document.getElementById("hintBtn").style.display="none";
    resultEl.style.display="none";
    hintBoxEl.style.display="none";
    terminalContainer.style.display="block";
    typeTerminal("Welcome to Kali Lab! Type 'help' for commands.\n", terminalOutput);

    terminalInput.addEventListener("keydown", async (e)=>{
      if(e.key==="Enter"){
        const command = terminalInput.value.trim().toLowerCase();
        terminalOutput.innerHTML+="\nuser@itzsos:~$ "+command+"\n";
        terminalInput.value="";

        const userRef = doc(db,"users",currentUser.uid);
        const userSnap = await getDoc(userRef);
        const solved = userSnap.exists()?userSnap.data().solvedStages||[]:[];
        if(command==="help") typeTerminal("Available commands: ls, cat flag.txt, clear\n",terminalOutput);
        else if(command==="ls") typeTerminal("flag.txt  notes.txt  secret.key\n",terminalOutput);
        else if(command==="cat flag.txt"){
          typeTerminal(correctAnswer+"\n",terminalOutput);
          if(!solved.includes(stageId)){
            await updateDoc(userRef,{
              solvedStages: arrayUnion(stageId),
              xp: increment(stageXP)
            });
            resultEl.textContent="✅ Correct! +"+stageXP+" XP";
            resultEl.style.color="lightgreen";
          }
        }
        else if(command==="clear") terminalOutput.innerHTML="";
        else typeTerminal(`Command not found: ${command}\n`,terminalOutput);
      }
    });
    return;
  }
}

// Hint button
document.getElementById("hintBtn").onclick = () => {
  hintBoxEl.textContent = "💡 Hint: "+stageHint;
};

// Flag submit
document.getElementById("submitBtn").onclick = async ()=>{
  if(!currentUser) return;
  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  if(input !== correctAnswer.trim().toLowerCase()){
    resultEl.textContent="❌ Wrong flag!";
    resultEl.style.color="red";
    return;
  }

  const userRef = doc(db,"users",currentUser.uid);
  const userSnap = await getDoc(userRef);
  const solved = userSnap.exists()?userSnap.data().solvedStages||[]:[];
  if(solved.includes(stageId)){
    resultEl.textContent="⚠️ Already solved!";
    resultEl.style.color="yellow";
    return;
  }

  await updateDoc(userRef,{
    solvedStages: arrayUnion(stageId),
    xp: increment(stageXP)
  });
  resultEl.textContent="✅ Correct! +"+stageXP+" XP";
  resultEl.style.color="lightgreen";

  // Next stage
  const nextStageId = "stage"+(currentOrder+1);
  const nextStageRef = doc(db,"stages",nextStageId);
  const nextStageSnap = await getDoc(nextStageRef);
  if(!nextStageSnap.exists()){
    nextStageBtn.style.display="block";
    nextStageBtn.textContent="🏆 Track Completed - Back to Stages";
    nextStageBtn.onclick = ()=>window.location.href="stages.html";
    return;
  }

  nextStageBtn.style.display="block";
  let timer = setTimeout(()=>window.location.href="stage.html?id="+nextStageId,5000);
  nextStageBtn.onclick = ()=>{
    clearTimeout(timer);
    window.location.href="stage.html?id="+nextStageId;
  };
};
</script>

</body>
</html>
