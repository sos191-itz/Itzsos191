<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Stage</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111422;
  border-bottom:1px solid #6a00ff;
}
nav button{
  background:#6a00ff;
  border:none;
  padding:8px;
  color:white;
  cursor:pointer;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.terminal{
  background:#000;
  padding:10px;
  font-size:12px;
  margin-bottom:10px;
}

.mission{
  background:#111422;
  padding:15px;
  border-left:4px solid #6a00ff;
  border-radius:10px;
}

.objective{
  background:#0d111f;
  padding:10px;
  border-left:4px solid #00ffdd;
  margin:10px 0;
}

.task{
  background:#111422;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  opacity:0.3;
  pointer-events:none;
}
.task.active{
  opacity:1;
  pointer-events:auto;
}
.task.completed{
  border-left:4px solid #00ff99;
  box-shadow:0 0 15px #00ff99;
}

input{
  width:100%;
  padding:10px;
  background:#000;
  color:#00ffdd;
  border:none;
  border-radius:6px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#6a00ff;
  color:white;
  border-radius:6px;
}

.hintBox{
  display:none;
  margin-top:10px;
  padding:10px;
  background:#1a1f35;
  border-left:4px solid orange;
}

.progressBar{
  height:10px;
  background:#222;
  border-radius:10px;
}
.progressFill{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  border-radius:10px;
  transition:1s;
}

#message{
  margin-top:10px;
  padding:10px;
  border-radius:6px;
}
.success{ background:#003300; }
.error{ background:#330000; }

.lockScreen{
  background:#111422;
  padding:30px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 20px #00ff99;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
  <div>🟣 Itzsos Labs PREMIUM LAB</div>
</nav>

<div class="container">

<div class="terminal" id="terminal"></div>

<div id="missionBox" class="mission"></div>

<div class="objective">
⚠️ Objective: Analyze and identify the security issue.
</div>

<p id="progressText"></p>
<div class="progressBar"><div id="progressFill" class="progressFill"></div></div>

<div id="tasksContainer"></div>

<div id="message"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

let tasks=[];
let currentIndex=0;
let currentUser;

/* GET STAGE ID FROM URL */
const params = new URLSearchParams(window.location.search);
const stageId = params.get("id") || "stage1";

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";
  currentUser=user;

  const userRef=doc(db,"users",user.uid);
  const userSnap=await getDoc(userRef);
  const userData=userSnap.data();

  const solved=userData.solvedStages || [];

  /* 🔒 BLOCK COMPLETED */
  if(solved.includes(stageId)){
    lockStageScreen();
    return;
  }

  /* LOAD STAGE */
  const snap=await getDoc(doc(db,"stages",stageId));
  const data=snap.data();

  tasks=data.tasks || [];

  document.getElementById("terminal").innerText=
    "root@itzsos:~# run "+stageId;

  document.getElementById("missionBox").innerHTML=`
    <h3>🎯 Mission Brief</h3>
    <p>${data.mission||""}</p>
    <p>${data.intro||""}</p>
  `;

  renderTasks();
});

/* LOCK SCREEN */
function lockStageScreen(){
  document.getElementById("tasksContainer").innerHTML=`
    <div class="lockScreen">
      <h2>🏆 Stage Completed</h2>
      <p>This mission has already been completed.</p>
      <p>🔒 You cannot attempt it again.</p>
      <button onclick="location.href='stages.html'">⬅ Back</button>
    </div>
  `;
}

/* RENDER */
function renderTasks(){
  const container=document.getElementById("tasksContainer");
  container.innerHTML="";

  tasks.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="task "+(i===0?"active":"");

    div.innerHTML=`
      <h3>Task ${i+1}: ${t.title}</h3>
      <p>${t.text}</p>

      <div style="background:#000;padding:10px;border-radius:8px;">
        From: PayPal Support &lt;support@paypaI.com&gt;<br>
        Subject: Urgent Verification<br><br>
        Click: http://paypaI-login-security.com
      </div>

      <input id="input${i}" placeholder="Enter answer">

      <button onclick="submitAnswer(${i})">Submit</button>
      <button onclick="showHint(${i})">🌍 Hint (-${t.hintCost||0})</button>

      <div id="hint${i}" class="hintBox">${t.hint||""}</div>

      <p>XP: ${t.xp||0}</p>
    `;

    container.appendChild(div);
  });

  updateProgress();
}

/* PROGRESS */
function updateProgress(){
  document.getElementById("progressText").innerText=
    "Progress: "+currentIndex+" / "+tasks.length;

  document.getElementById("progressFill").style.width=
    (currentIndex/tasks.length)*100+"%";
}

/* MESSAGE */
function showMessage(text,type){
  const msg=document.getElementById("message");
  msg.className=type;
  msg.innerText=text;
}

/* SUBMIT */
window.submitAnswer=async(i)=>{
  if(i!==currentIndex) return;

  const val=document.getElementById("input"+i).value.toLowerCase().trim();
  const task=tasks[i];

  const correct=task.answer.map(a=>a.toLowerCase());
  const keywords=["fake","phishing","domain","paypal","spoof"];

  if(correct.some(a=>val.includes(a)) || keywords.some(k=>val.includes(k))){

    showMessage("🔥 Access Granted!","success");

    document.querySelectorAll(".task")[i].classList.add("completed");

    currentIndex++;

    if(currentIndex < tasks.length){
      document.querySelectorAll(".task")[currentIndex].classList.add("active");
    } else {

      showMessage("🏆 Stage Completed! Locked 🔒","success");

      const userRef=doc(db,"users",currentUser.uid);
      const snap=await getDoc(userRef);
      const data=snap.data();

      let solved=data.solvedStages || [];

      if(!solved.includes(stageId)){
        solved.push(stageId);

        await updateDoc(userRef,{
          solvedStages: solved,
          xp:(data.xp||0)+task.xp
        });
      }
    }

    updateProgress();

  } else {
    showMessage("❌ Not quite. Check sender or link.","error");
  }
};

/* HINT */
window.showHint=(i)=>{
  const box=document.getElementById("hint"+i);
  box.style.display = box.style.display==="block" ? "none":"block";
};
</script>

</body>
</html>
