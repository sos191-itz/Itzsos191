<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage 1 | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

/* INTRO */
#introBox{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:30px;
  border-left:4px solid #ff6600;
  line-height:1.6;
}

/* TASK */
.task{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid #00ffdd;
}

/* IMAGE */
.task img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#00ffdd;
  font-weight:bold;
  border-radius:6px;
}
button:hover{
  background:#ff6600;
  color:black;
}

/* RESULT */
.result{
  margin-top:10px;
  font-weight:bold;
}
.correct{ color:#00ff99; }
.wrong{ color:#ff4444; }
</style>
</head>

<body>

<div class="container">

  <h2>🧠 Stage 1: Phishing Basics</h2>

  <!-- INTRO -->
  <div id="introBox">Loading intro...</div>

  <!-- TASKS -->
  <div id="tasks"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const introBox = document.getElementById("introBox");
const tasksDiv = document.getElementById("tasks");

let currentUser;
let userData;

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="index.html";
    return;
  }

  currentUser = user;

  const userRef = doc(db,"users",user.uid);
  const snap = await getDoc(userRef);

  if(!snap.exists()){
    location.href="index.html";
    return;
  }

  userData = snap.data();

  loadIntro();
  loadTasks();
});

/* LOAD INTRO */
async function loadIntro(){
  try{
    const stageRef = doc(db,"stages","stage1");
    const snap = await getDoc(stageRef);

    if(!snap.exists()){
      introBox.innerText = "No intro found.";
      return;
    }

    const data = snap.data();

    introBox.innerHTML = "";

    if(Array.isArray(data.intro)){
      data.intro.forEach(p=>{
        const el = document.createElement("p");
        el.innerText = p;
        introBox.appendChild(el);
      });
    }else{
      introBox.innerText = data.intro || "No intro available.";
    }

  }catch(e){
    introBox.innerText = "Error loading intro.";
    console.error(e);
  }
}

/* LOAD TASKS */
async function loadTasks(){
  try{
    const snapshot = await getDocs(collection(db,"tasks"));

    tasksDiv.innerHTML = "";

    snapshot.forEach(docSnap=>{
      const t = docSnap.data();
      const id = docSnap.id;

      if(t.stageId !== "stage1") return;

      const div = document.createElement("div");
      div.className = "task";

      div.innerHTML = `
        <h3>${t.title}</h3>
        <p>${t.text}</p>

        ${t.image ? `<img src="${t.image}">` : ""}

        <input id="input-${id}" placeholder="Your answer...">

        <button onclick="submitAnswer('${id}')">Submit</button>

        <div id="result-${id}" class="result"></div>
      `;

      tasksDiv.appendChild(div);
    });

  }catch(e){
    tasksDiv.innerText = "Error loading tasks.";
    console.error(e);
  }
}

/* CHECK ANSWER */
window.submitAnswer = async(id)=>{
  const input = document.getElementById("input-"+id).value.toLowerCase().trim();
  const resultBox = document.getElementById("result-"+id);

  if(!input){
    resultBox.innerHTML = "⚠️ Enter answer";
    return;
  }

  const taskRef = doc(db,"tasks",id);
  const snap = await getDoc(taskRef);
  const task = snap.data();

  const correctAnswers = task.answers || [];

  if(correctAnswers.some(a => input.includes(a.toLowerCase()))){

    resultBox.innerHTML = "✅ Correct! +" + task.xp + " XP";
    resultBox.className = "result correct";

    let solved = userData.solvedTasks || [];

    if(!solved.includes(id)){
      solved.push(id);

      await updateDoc(doc(db,"users",currentUser.uid),{
        solvedTasks: solved,
        xp: (userData.xp || 0) + task.xp
      });
    }

  } else {
    resultBox.innerHTML = "❌ Wrong! " + (task.hint || "");
    resultBox.className = "result wrong";
  }
};
</script>

</body>
</html>
