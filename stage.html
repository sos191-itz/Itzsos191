<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>

<style>
body {
  margin:0;
  font-family:monospace;
  background:#0f111a;
  color:#00ffdd;
}

nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}

nav h2 { color:#ff6600; }

nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:10px;
}

h2 { color:#ff6600; }

input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:black;
  border:1px solid #00ffdd;
  color:white;
}

button.submit {
  margin-top:10px;
  padding:8px 12px;
  background:#00ffdd;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#result {
  margin-top:15px;
  font-weight:bold;
}

#hintBox {
  margin-top:10px;
  color:orange;
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs - Stage</h2>
  <button onclick="window.location.href='stages.html'">Back</button>
</nav>

<div class="container">
  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <input type="text" id="flagInput" placeholder="Enter flag">
  <button class="submit" id="submitBtn">Submit</button>
  <button id="hintBtn" style="margin-top:10px;background:#ff6600;border:none;padding:8px 12px;cursor:pointer;font-weight:bold;">
    Show Hint
  </button>

  <div id="result"></div>
  <div id="hintBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  setDoc, 
  updateDoc, 
  arrayUnion, 
  increment 
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const stageId = params.get("id");

let correctAnswer = "";
let stageXP = 0;
let stageHint = "";
let currentUser = null;

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const stageRef = doc(db, "stages", stageId);
  const stageSnap = await getDoc(stageRef);

  if (!stageSnap.exists()) {
    document.getElementById("stageTitle").textContent = "Stage not found";
    return;
  }

  const data = stageSnap.data();

  document.getElementById("stageTitle").textContent = data.title;
  document.getElementById("stageText").textContent = data.text;

  correctAnswer = data.answer;
  stageXP = data.xp || 0;
  stageHint = data.hint || "No hint available";
});

document.getElementById("hintBtn").onclick = () => {
  document.getElementById("hintBox").textContent = "💡 Hint: " + stageHint;
};

document.getElementById("submitBtn").onclick = async () => {

  if (!currentUser) return;

  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  const answer = correctAnswer.trim().toLowerCase();

  if (input !== answer) {
    document.getElementById("result").textContent = "❌ Wrong flag!";
    document.getElementById("result").style.color = "red";
    return;
  }

  const userRef = doc(db, "users", currentUser.uid);
  const userSnap = await getDoc(userRef);

  let solvedStages = [];

  if (userSnap.exists()) {
    solvedStages = userSnap.data().solvedStages || [];
  } else {
    await setDoc(userRef, { xp: 0, solvedStages: [] });
  }

  if (solvedStages.includes(stageId)) {
    document.getElementById("result").textContent = "⚠️ Already solved!";
    document.getElementById("result").style.color = "yellow";
    return;
  }

  await updateDoc(userRef, {
    xp: increment(stageXP),
    solvedStages: arrayUnion(stageId)
  });

  document.getElementById("result").textContent = "✅ Correct! +" + stageXP + " XP";
  document.getElementById("result").style.color = "lightgreen";
};
</script>

</body>
</html>
