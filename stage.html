<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#0f111a;
  color:#00ffdd;
}

/* NAV */
nav{
  background:#111422;
  padding:15px;
  border-bottom:1px solid #00ffdd;
}
nav button{
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

/* CARD */
.card{
  background:#111422;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid #00ffdd;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  border:none;
  background:#00ffdd;
  cursor:pointer;
  font-weight:bold;
}
button:hover{
  background:#ff6600;
}

/* SUCCESS / ERROR */
.success{color:#00ff99;}
.error{color:red;}
</style>
</head>

<body>

<nav>
  <button onclick="location.href='stages.html'">⬅ Back</button>
</nav>

<div class="container">

  <!-- INTRO -->
  <div class="card" id="introBox">
    <h2>🧠 What is this?</h2>
    <p id="introText">Loading...</p>
  </div>

  <!-- MISSION -->
  <div class="card">
    <h3>🎬 Mission</h3>
    <p id="mission"></p>
  </div>

  <!-- LEARN -->
  <div class="card">
    <h3>📘 Learn</h3>
    <p id="learn"></p>
  </div>

  <!-- CHALLENGE -->
  <div class="card">
    <h3>🎯 Challenge</h3>
    <pre id="challenge"></pre>

    <input id="answer" placeholder="Enter your answer...">
    <button onclick="checkAnswer()">Submit</button>

    <p id="result"></p>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

/* YOUR FIREBASE KEYS */
const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser;
let stageData;

/* GET STAGE ID */
const params = new URLSearchParams(window.location.search);
const stageId = params.get("id");

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  currentUser = user;

  const stageRef = doc(db,"stages",stageId);
  const snap = await getDoc(stageRef);

  if(!snap.exists()){
    document.body.innerHTML = "Stage not found";
    return;
  }

  stageData = snap.data();

  loadStage();
});

/* LOAD STAGE */
function loadStage(){

  document.getElementById("introText").textContent = stageData.intro;

  document.getElementById("mission").textContent = stageData.mission;

  document.getElementById("learn").textContent = stageData.explanation;

  document.getElementById("challenge").textContent = stageData.text;
}

/* CHECK ANSWER */
window.checkAnswer = async ()=>{
  const userAnswer = document.getElementById("answer").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if(!userAnswer){
    result.innerHTML = "<span class='error'>Enter answer</span>";
    return;
  }

  // compare with hidden answer in firebase
  if(userAnswer === stageData.answer.toLowerCase()){
    
    result.innerHTML = "<span class='success'>✅ Correct! +" + stageData.xp + " XP</span>";

    const userRef = doc(db,"users",currentUser.uid);
    const userSnap = await getDoc(userRef);
    const data = userSnap.data();

    let solved = data.solvedStages || [];

    if(!solved.includes(stageId)){
      solved.push(stageId);

      await updateDoc(userRef,{
        solvedStages: solved,
        xp: (data.xp || 0) + stageData.xp
      });
    }

  } else {
    result.innerHTML = "<span class='error'>❌ Wrong answer</span>";
  }
};
</script>

</body>
</html>
