<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage | Itzsos Labs</title>
<style>
body {
  margin:0;
  font-family: monospace;
  background:#0f111a;
  color:#00ffdd;
}
nav {
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h2 { color:#ff6600; }
nav button {
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#111422;
  border:1px solid #00ffdd;
  border-radius:12px;
  box-shadow: 0 0 20px #00ffdd44;
  animation: fadeIn 1s ease;
}
input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#111;
  border:1px solid #00ffdd;
  color:#0ff;
  border-radius:5px;
}
button {
  margin-top:10px;
  padding:8px 12px;
  font-weight:bold;
  cursor:pointer;
  border:none;
  border-radius:5px;
}
.submit { background:#00ffdd; color:#111; }
.hintBtn { background:#ff6600; color:#111; }
#result, #hintBox { margin-top:15px; font-weight:bold; animation: glow 1s infinite alternate; }
#terminalContainer {
  display:none;
  background:black;
  border:1px solid #00ffdd;
  padding:15px;
  margin-top:20px;
  border-radius:8px;
  min-height:200px;
  max-height:400px;
  overflow-y:auto;
}
.prompt { color:#ff6600; margin-right:5px; }
#terminalInput {
  flex:1;
  background:#111;
  border:1px solid #00ffdd;
  color:#0ff;
  padding:5px;
  border-radius:5px;
}
#progressWrapper { margin-bottom:20px; }
#progressBar {
  height:12px;
  width:0%;
  background:linear-gradient(90deg,#ff6600,#00ffdd);
  transition:width 0.5s ease;
}
@keyframes glow { from {text-shadow:0 0 5px #ff6600;} to {text-shadow:0 0 15px #00ffdd;} }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>
<body>

<nav>
  <h2>Itzsos Labs - Stage</h2>
  <button id="backBtn">Back</button>
</nav>

<div class="container">
  <div id="progressWrapper">
    <div id="progressText" style="margin-bottom:5px;font-weight:bold;">Loading progress...</div>
    <div style="background:#222; border-radius:8px; overflow:hidden;">
      <div id="progressBar"></div>
    </div>
  </div>

  <h2 id="stageTitle">Loading...</h2>
  <p id="stageText"></p>

  <div id="defaultFlagArea">
    <input type="text" id="flagInput" placeholder="Enter flag">
    <button class="submit" id="submitBtn">Submit</button>
  </div>

  <button class="hintBtn" id="hintBtn">Show Hint</button>
  <div id="result"></div>
  <div id="hintBox"></div>

  <div id="terminalContainer">
    <div id="terminalOutput"></div>
    <div style="display:flex; align-items:center; margin-top:5px;">
      <span class="prompt">user@itzsos:~$</span>
      <input id="terminalInput" type="text" autofocus>
    </div>
  </div>

  <button id="nextStageBtn" style="display:none; background:orange;">
    Go To Next Stage →
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
  authDomain: "itzsos-labs.firebaseapp.com",
  projectId: "itzsos-labs",
  storageBucket: "itzsos-labs.firebasestorage.app",
  messagingSenderId: "1012826517121",
  appId: "1:1012826517121:web:abaf58ebce7f15cfc86780"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const stageId = new URLSearchParams(window.location.search).get("id");
const TOTAL_STAGES = 50;

let currentUser = null;
let stageXP = 0;
let correctAnswer = "";
let stageHint = "";
let currentOrder = 0;

const backBtn = document.getElementById("backBtn");
const stageTitleEl = document.getElementById("stageTitle");
const stageTextEl = document.getElementById("stageText");
const defaultFlagArea = document.getElementById("defaultFlagArea");
const resultEl = document.getElementById("result");
const hintBoxEl = document.getElementById("hintBox");
const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");
const nextStageBtn = document.getElementById("nextStageBtn");

const terminalContainer = document.getElementById("terminalContainer");
const terminalOutput = document.getElementById("terminalOutput");
const terminalInput = document.getElementById("terminalInput");

// Back button
backBtn.onclick = () => window.location.href="stages.html";

// Terminal typing effect
function typeTerminal(text, container, speed=30) {
  let i = 0;
  const interval = setInterval(() => {
    container.innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
    container.scrollTop = container.scrollHeight;
  }, speed);
}

// Auth check
onAuthStateChanged(auth, async (user) => {
  if(!user) { alert("Login first"); return window.location.href="index.html"; }
  currentUser = user;
  if(!user.emailVerified) { alert("Verify email first"); return window.location.href="index.html"; }

  const userRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userRef);
  if(!userSnap.exists()) return window.location.href="selection.html";

  const userData = userSnap.data();
  if(userData.selectedField !== "IT") { alert("🚫 Only Cybersecurity allowed"); return window.location.href="selection.html"; }

  await loadStage(userData);
});

// Load stage
async function loadStage(userData){
  const stageRef = doc(db, "stages", stageId);
  const stageSnap = await getDoc(stageRef);
  if(!stageSnap.exists()) { stageTitleEl.textContent="Stage not found"; return; }

  const stageData = stageSnap.data();
  currentOrder = stageData.order;
  stageTitleEl.textContent = stageData.title;
  stageTextEl.textContent = stageData.text;
  stageXP = stageData.xp || 0;
  stageHint = stageData.hint || "No hint available";
  correctAnswer = stageData.answer || "";

  // Update progress
  const percentage = Math.round((currentOrder/TOTAL_STAGES)*100);
  progressText.textContent = `Stage ${currentOrder}/${TOTAL_STAGES} (${percentage}%)`;
  progressBar.style.width = percentage + "%";

  // Stage lock logic
  let solvedStages = userData.solvedStages || [];
  let highestSolved = Math.max(...solvedStages.map(s=>parseInt(s.replace("stage",""))).filter(n=>!isNaN(n)), 0);
  if(currentOrder > highestSolved +1){
    defaultFlagArea.style.display="none";
    document.getElementById("hintBtn").style.display="none";
    resultEl.style.display="none";
    hintBoxEl.style.display="none";
    stageTextEl.textContent = stageData.title + " 🔒 Locked";
    return;
  }

  // Stage 4 Terminal
  if(stageId === "stage4"){
    defaultFlagArea.style.display="none";
    document.getElementById("hintBtn").style.display="none";
    resultEl.style.display="none";
    hintBoxEl.style.display="none";
    terminalContainer.style.display="block";

    typeTerminal("Welcome to Kali Lab! Type 'help' for commands.\n", terminalOutput);

    terminalInput.addEventListener("keydown", async (e)=>{
      if(e.key !== "Enter") return;
      const command = terminalInput.value.trim().toLowerCase();
      terminalOutput.innerHTML += "\nuser@itzsos:~$ "+command+"\n";
      terminalInput.value = "";

      if(command==="help"){
        typeTerminal("Available commands: ls, cat flag.txt, clear\n", terminalOutput);
      } else if(command==="ls"){
        typeTerminal("flag.txt  notes.txt  secret.key\n", terminalOutput);
      } else if(command==="cat flag.txt"){
        const stageSnap = await getDoc(stageRef);
        typeTerminal(stageSnap.data().answer + "\n", terminalOutput);

        // mark as solved
        const userRef = doc(db, "users", currentUser.uid);
        await updateDoc(userRef,{
          solvedStages: arrayUnion(stageId),
          xp: increment(stageXP)
        });
        resultEl.textContent = `✅ Correct! +${stageXP} XP`;
        resultEl.style.color="lightgreen";
      } else if(command==="clear"){
        terminalOutput.innerHTML="";
      } else {
        typeTerminal(`Command not found: ${command}\n`, terminalOutput);
      }
    });
    return;
  }
}

// Show hint
document.getElementById("hintBtn").onclick = () => {
  hintBoxEl.textContent = "💡 Hint: "+stageHint;
};

// Flag submit
document.getElementById("submitBtn").onclick = async ()=>{
  if(!currentUser) return;
  const input = document.getElementById("flagInput").value.trim().toLowerCase();
  if(input !== correctAnswer.trim().toLowerCase()){
    resultEl.textContent="❌ Wrong flag!";
    resultEl.style.color="red";
    return;
  }

  const userRef = doc(db,"users",currentUser.uid);
  const userSnap = await getDoc(userRef);
  const solvedStages = userSnap.exists() ? userSnap.data().solvedStages || [] : [];
  if(solvedStages.includes(stageId)){
    resultEl.textContent="⚠️ Already solved!";
    resultEl.style.color="yellow";
    return;
  }

  await updateDoc(userRef,{
    solvedStages: arrayUnion(stageId),
    xp: increment(stageXP)
  });

  resultEl.textContent=`✅ Correct! +${stageXP} XP`;
  resultEl.style.color="lightgreen";

  // Next stage
  const nextStageId = "stage"+(currentOrder+1);
  const nextStageRef = doc(db,"stages",nextStageId);
  const nextStageSnap = await getDoc(nextStageRef);

  if(!nextStageSnap.exists()){
    nextStageBtn.style.display="block";
    nextStageBtn.textContent="🏆 Track Completed - Back to Stages";
    nextStageBtn.onclick = ()=>window.location.href="stages.html";
    return;
  }

  nextStageBtn.style.display="block";
  nextStageBtn.onclick = ()=>window.location.href="stage.html?id="+nextStageId;
};
</script>
</body>
</html>
