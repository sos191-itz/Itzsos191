<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | GOD Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#02030a;
  color:#00ffdd;
  overflow:hidden;
}

/* SCANLINES */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(rgba(0,255,221,0.03) 1px, transparent 1px);
  background-size:100% 3px;
  pointer-events:none;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0a0d18;
  border-bottom:1px solid #6a00ff;
  box-shadow:0 0 25px #6a00ff44;
}

/* TERMINAL */
.terminal{
  background:black;
  padding:15px;
  height:120px;
  overflow:auto;
  font-size:12px;
  border-bottom:1px solid #111;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* GOD CARD */
.god{
  background:linear-gradient(45deg,#6a00ff,#00ffdd);
  color:black;
  text-align:center;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{box-shadow:0 0 20px #6a00ff}
  to{box-shadow:0 0 30px #00ffdd}
}

/* FOCUS */
.focus{
  background:#000;
  padding:15px;
  border:1px solid #00ffdd;
  box-shadow:0 0 15px #00ffdd44;
  margin-bottom:20px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

tr{
  border-bottom:1px solid #111;
  transition:0.3s;
}

tr:hover{
  background:#111422;
  transform:scale(1.02);
}

td{
  padding:10px;
}

/* YOU */
.me{
  background:#0f1f2a !important;
  border-left:4px solid #00ffdd;
}

/* XP BAR */
.bar{
  height:8px;
  background:#222;
}
.fill{
  height:8px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  transition:0.5s;
}

/* ALERT */
.alert{
  color:#ff0033;
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0.3}
}

/* RANK PASS EFFECT */
.pass{
  animation:passAnim 0.5s;
}
@keyframes passAnim{
  0%{transform:scale(1.2); background:#00ffdd}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<nav>
  <div>🟣 Itzsos Labs // GOD SYSTEM</div>
  <button onclick="location.href='stages.html'">⬅ Back</button>
</nav>

<div class="terminal" id="terminal"></div>

<div class="container">

<div id="godCard" class="god"></div>

<div id="focusZone" class="focus"></div>

<table>
<tbody id="board"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

const terminal = document.getElementById("terminal");
const board = document.getElementById("board");
const focus = document.getElementById("focusZone");
const godCard = document.getElementById("godCard");

function log(msg){
  terminal.innerHTML += msg + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

let players=[];

onAuthStateChanged(auth, async(user)=>{

  log("> Connecting...");
  log("> Loading hackers...");

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(doc=>{
    const d=doc.data();
    players.push({
      id:doc.id,
      name:d.username||"Unknown",
      xp:d.xp||0
    });
  });

  players.sort((a,b)=>b.xp-a.xp);

  render(user);

  // ⚡ FAKE LIVE SYSTEM
  setInterval(()=>{
    players.forEach(p=>{
      if(Math.random() < 0.3){
        p.xp += Math.floor(Math.random()*5);
      }
    });

    players.sort((a,b)=>b.xp-a.xp);
    render(user,true);

  },3000);

});

function render(user,animate=false){

  board.innerHTML="";

  const maxXP = Math.max(...players.map(p=>p.xp),100);

  const myIndex = players.findIndex(p=>user && p.id===user.uid);
  const me = players[myIndex];
  const above = players[myIndex-1];
  const below = players[myIndex+1];

  // 👑 GOD
  godCard.innerHTML = `
    👑 DOMINATOR<br>
    ${players[0].name}<br>
    ${players[0].xp} XP
  `;

  // 🎯 FOCUS
  focus.innerHTML = `
    > USER: ${me.name}<br>
    > RANK: #${myIndex+1}<br>
    > XP: ${me.xp}<br><br>

    ${above ? `🎯 TARGET: ${above.name} (+${above.xp - me.xp} XP)` : "👑 YOU ARE #1"}<br>
    ${below ? `<span class="alert">⚠️ THREAT: ${below.name} (-${me.xp - below.xp} XP)</span>` : ""}
  `;

  const visible = players.slice(Math.max(0,myIndex-2), myIndex+3);

  visible.forEach(p=>{
    const tr=document.createElement("tr");

    if(user && p.id===user.uid) tr.classList.add("me");

    if(animate) tr.classList.add("pass");

    const width=(p.xp/maxXP)*100;

    tr.innerHTML = `
      <td>#${players.indexOf(p)+1}</td>
      <td>${p.name}</td>
      <td>${p.xp} XP</td>
      <td>
        <div class="bar">
          <div class="fill" style="width:${width}%"></div>
        </div>
      </td>
    `;

    board.appendChild(tr);
  });

}
</script>

</body>
</html>
