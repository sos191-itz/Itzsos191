<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzsos Labs | Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#05070d;
  color:#00ffdd;
  overflow-x:hidden;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0a0d18;
  border-bottom:1px solid #6a00ff;
  box-shadow:0 0 20px #6a00ff33;
}

/* TERMINAL HEADER */
.terminal{
  background:black;
  padding:10px;
  color:#00ffdd;
  border-bottom:1px solid #111;
}

/* SCAN LINE */
.scan{
  position:fixed;
  width:100%;
  height:2px;
  background:#00ffdd;
  top:0;
  animation:scan 3s linear infinite;
}
@keyframes scan{
  0%{top:0}
  100%{top:100%}
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* YOUR CARD */
#meCard{
  background:#111422;
  padding:20px;
  border-left:5px solid #00ffdd;
  margin-bottom:20px;
  box-shadow:0 0 15px #00ffdd44;
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:40px 0;
}

.podium div{
  padding:15px;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
}

.gold{
  background:#6a00ff;
  box-shadow:0 0 25px #6a00ff;
  transform:scale(1.2);
  animation:glitch 2s infinite;
}

.silver{ background:#333; }
.bronze{ background:#222; }

@keyframes glitch{
  0%{filter:hue-rotate(0)}
  50%{filter:hue-rotate(120deg)}
  100%{filter:hue-rotate(0)}
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

tr{
  border-bottom:1px solid #111;
  transition:0.2s;
}

tr:hover{
  background:#111422;
  transform:scale(1.01);
}

td{
  padding:10px;
}

/* YOU */
.me{
  background:#0f1f2a !important;
  border-left:4px solid #00ffdd;
}

/* XP BAR */
.bar{
  height:8px;
  background:#222;
}
.fill{
  height:8px;
  background:#00ffdd;
  animation:grow 1s;
}
@keyframes grow{
  from{width:0}
}

/* GLITCH TEXT */
.glitch{
  animation:glitchText 1s infinite;
}
@keyframes glitchText{
  0%{opacity:1}
  50%{opacity:0.6}
  100%{opacity:1}
}
</style>
</head>

<body>

<div class="scan"></div>

<nav>
  <div>🟣 Itzsos Labs // Leaderboard</div>
  <button onclick="location.href='stages.html'">⬅ Back</button>
</nav>

<div class="terminal" id="terminalLog"></div>

<div class="container">

<div id="meCard"></div>

<div class="podium">
  <div id="p2" class="silver"></div>
  <div id="p1" class="gold"></div>
  <div id="p3" class="bronze"></div>
</div>

<table>
<tbody id="board"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const db = getFirestore(app);
const auth = getAuth(app);

const board = document.getElementById("board");
const log = document.getElementById("terminalLog");
const meCard = document.getElementById("meCard");

function logLine(text){
  log.innerHTML += text + "<br>";
  log.scrollTop = log.scrollHeight;
}

onAuthStateChanged(auth, async(user)=>{

  logLine("Scanning network...");
  logLine("Collecting hacker profiles...");

  const snap = await getDocs(collection(db,"users"));

  const players=[];
  snap.forEach(doc=>{
    const d=doc.data();
    players.push({
      id:doc.id,
      name:d.username||"Unknown",
      xp:d.xp||0
    });
  });

  players.sort((a,b)=>b.xp-a.xp);

  logLine("Ranking players...");
  logLine("Access granted ✔");

  // PODIUM
  if(players[0]) p1.innerHTML = "👑 "+players[0].name+"<br>"+players[0].xp+" XP";
  if(players[1]) p2.innerHTML = players[1].name+"<br>"+players[1].xp+" XP";
  if(players[2]) p3.innerHTML = players[2].name+"<br>"+players[2].xp+" XP";

  const maxXP = Math.max(...players.map(p=>p.xp),100);

  let myIndex = players.findIndex(p=>user && p.id===user.uid);

  // YOU CARD
  if(myIndex !== -1){
    const me = players[myIndex];
    const target = players[myIndex-1];

    meCard.innerHTML = `
      <h3 class="glitch">YOU // Rank #${myIndex+1}</h3>
      <p>XP: ${me.xp}</p>
      ${target ? `<p>🎯 Target: ${target.name} (${target.xp - me.xp} XP ahead)</p>` : "<p>🔥 You are #1</p>"}
    `;
  }

  // TABLE
  players.forEach((p,i)=>{
    const tr=document.createElement("tr");

    if(user && p.id===user.uid) tr.classList.add("me");

    const width=(p.xp/maxXP)*100;

    tr.innerHTML = `
      <td>#${i+1}</td>
      <td>${p.name}</td>
      <td>${p.xp} XP</td>
      <td>
        <div class="bar">
          <div class="fill" style="width:${width}%"></div>
        </div>
      </td>
    `;

    board.appendChild(tr);
  });

  // AUTO SCROLL TO YOU
  setTimeout(()=>{
    const me = document.querySelector(".me");
    if(me) me.scrollIntoView({behavior:"smooth",block:"center"});
  },500);

});
</script>

</body>
</html>
