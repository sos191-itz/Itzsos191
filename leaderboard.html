<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Itzsos Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:radial-gradient(circle at top,#0b0f1a,#05070d);
  color:#00ffdd;
}

/* NAV */
nav{
  background:#111422;
  border-bottom:1px solid #6a00ff;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  box-shadow:0 0 20px rgba(106,0,255,0.4);
}
nav h2{
  color:#6a00ff;
  text-shadow:0 0 15px #6a00ff;
}

/* HEADER */
h2.center{
  text-align:center;
  margin:30px 0;
  color:#00ffdd;
  text-shadow:0 0 20px #00ffdd;
}

/* AURA SYSTEM */
.aura{
  animation:pulseAura 2s infinite;
}
@keyframes pulseAura{
  0%{box-shadow:0 0 10px #00ffdd}
  50%{box-shadow:0 0 30px #00ffdd}
  100%{box-shadow:0 0 10px #00ffdd}
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:20px;
  margin-bottom:50px;
}

.podium-card{
  width:180px;
  text-align:center;
  border-radius:15px;
  padding:15px;
  font-weight:bold;
  position:relative;
  transition:0.3s;
}

/* GOLD (TOP PLAYER = GOD MODE) */
.gold{
  background:linear-gradient(45deg,#6a00ff,#00ffdd);
  color:black;
  height:220px;
  transform:scale(1.15);
  animation:glitch 2s infinite;
}
@keyframes glitch{
  0%{filter:hue-rotate(0deg)}
  50%{filter:hue-rotate(90deg)}
  100%{filter:hue-rotate(0deg)}
}

/* SILVER + BRONZE */
.silver{
  background:#999;
  height:170px;
}
.bronze{
  background:#8b5a2b;
  height:150px;
}

/* TABLE */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#111422;
}

th,td{
  padding:12px;
}

th{
  background:#1a1f35;
}

tr{
  border-bottom:1px solid #222;
  transition:0.2s;
}

/* HOVER = POWER REVEAL */
tr:hover{
  background:#151a2c;
  transform:scale(1.02);
  box-shadow:0 0 10px #6a00ff;
}

/* CURRENT USER */
.me{
  background:#1b2a33 !important;
  border-left:5px solid #00ffdd;
}

/* XP BAR */
.xp-bar-bg{
  background:#222;
  height:10px;
  border-radius:10px;
}
.xp-bar{
  height:10px;
  background:linear-gradient(90deg,#6a00ff,#00ffdd);
  animation:grow 1s ease forwards;
}
@keyframes grow{
  from{width:0}
}

/* ROLE COLORS */
.elite{ color:#ff00ff; text-shadow:0 0 10px #ff00ff;}
.pro{ color:#00ff99;}
.noob{ color:#888;}

/* RANK EFFECT */
.rank-top{
  text-shadow:0 0 15px #00ffdd;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.5}
}

/* LOADING */
.loading{
  text-align:center;
  padding:40px;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{opacity:0.4}
  50%{opacity:1}
  100%{opacity:0.4}
}
</style>
</head>

<body>

<nav>
  <h2>🟣 Itzsos Labs Leaderboard</h2>
  <button onclick="location.href='stages.html'">⬅ Back</button>
</nav>

<h2 class="center">🏆 Global Hacker Ranking</h2>

<div class="container">

<div id="loading" class="loading">Scanning hackers...</div>

<!-- PODIUM -->
<div class="podium">
  <div id="second" class="podium-card silver"></div>
  <div id="first" class="podium-card gold aura"></div>
  <div id="third" class="podium-card bronze"></div>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>User</th>
<th>Tier</th>
<th>XP</th>
<th>Power</th>
</tr>
</thead>
<tbody id="leaderboardBody"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const auth = getAuth(app);
const db = getFirestore(app);

function getRole(xp){
  if(xp>1000) return ["Elite Hacker","elite"];
  if(xp>500) return ["Pro Hacker","pro"];
  return ["Newbie","noob"];
}

onAuthStateChanged(auth, async(user)=>{
  const snap = await getDocs(collection(db,"users"));
  const players=[];

  snap.forEach(doc=>{
    const d = doc.data();
    players.push({
      id:doc.id,
      name:d.username || "Unknown",
      xp:d.xp || 0
    });
  });

  players.sort((a,b)=>b.xp-a.xp);

  document.getElementById("loading").style.display="none";

  // PODIUM
  if(players[0]){
    first.innerHTML = `👑 ${players[0].name}<br>${players[0].xp} XP`;
  }
  if(players[1]){
    second.innerHTML = `🥈 ${players[1].name}<br>${players[1].xp} XP`;
  }
  if(players[2]){
    third.innerHTML = `🥉 ${players[2].name}<br>${players[2].xp} XP`;
  }

  const maxXP = Math.max(...players.map(p=>p.xp),100);

  players.forEach((p,i)=>{
    const tr=document.createElement("tr");
    if(user && user.uid===p.id) tr.classList.add("me");

    const [role,cls]=getRole(p.xp);
    const width=(p.xp/maxXP)*100;

    tr.innerHTML=`
      <td class="${i<3?'rank-top':''}">#${i+1}</td>
      <td>${p.name}</td>
      <td class="${cls}">${role}</td>
      <td>${p.xp}</td>
      <td>
        <div class="xp-bar-bg">
          <div class="xp-bar" style="width:${width}%"></div>
        </div>
      </td>
    `;

    document.getElementById("leaderboardBody").appendChild(tr);
  });

});
</script>

</body>
</html>
