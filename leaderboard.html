<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Itzsos Labs</title>

<style>

body{
margin:0;
font-family:monospace;
background:#0f111a;
color:#00ffdd;
overflow-x:hidden;
}

/* NAVBAR */

nav{
background:#111422;
border-bottom:1px solid #00ffdd;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

nav h2{
color:#ff6600;
}

nav button{
background:#ff6600;
border:none;
padding:8px 15px;
font-weight:bold;
cursor:pointer;
}

/* MAIN */

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

/* PODIUM */

.podium{
display:flex;
justify-content:center;
align-items:flex-end;
gap:30px;
margin-bottom:50px;
}

.podium-card{
text-align:center;
width:180px;
border-radius:12px;
padding:15px;
color:#0f111a;
font-weight:bold;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.gold{
background:linear-gradient(45deg,#ffd700,#ffae00);
height:180px;
box-shadow:0 0 25px gold;
}

.silver{
background:linear-gradient(45deg,#cfcfcf,#9e9e9e);
height:150px;
}

.bronze{
background:linear-gradient(45deg,#cd7f32,#a35a18);
height:130px;
}

.rank{
font-size:1.4rem;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#111422;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:left;
}

th{
background:#1a1f35;
}

tr{
border-bottom:1px solid #222;
}

tr:hover{
background:#151a2c;
}

/* XP BAR */

.xp-bar-bg{
background:#222;
height:10px;
border-radius:10px;
overflow:hidden;
}

.xp-bar{
height:10px;
background:linear-gradient(90deg,#00ffdd,#00aa88);
width:0%;
transition:width 1s ease;
}

/* CURRENT USER */

.me{
background:#1b2a33 !important;
border-left:4px solid #00ffdd;
}

/* GLOW TOP HACKER */

.top-glow{
text-shadow:0 0 8px #00ffdd;
}

</style>
</head>

<body>

<nav>
<h2>Itzsos Labs Leaderboard</h2>
<button onclick="window.location.href='stages.html'">Back</button>
</nav>

<div class="container">

<h2 style="text-align:center;margin-bottom:30px;">🏆 Global Leaderboard</h2>

<!-- PODIUM -->

<div class="podium">

<div id="second" class="podium-card silver">
<div class="rank">🥈</div>
<div id="silverName">---</div>
<div id="silverXP">0 XP</div>
</div>

<div id="first" class="podium-card gold">
<div class="rank">🥇</div>
<div id="goldName">---</div>
<div id="goldXP">0 XP</div>
</div>

<div id="third" class="podium-card bronze">
<div class="rank">🥉</div>
<div id="bronzeName">---</div>
<div id="bronzeXP">0 XP</div>
</div>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>User</th>
<th>Role</th>
<th>XP</th>
<th>Progress</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAViNqylDfCnXd6iyzChJiTgZaI18cU9zw",
authDomain:"itzsos-labs.firebaseapp.com",
projectId:"itzsos-labs",
storageBucket:"itzsos-labs.firebasestorage.app",
messagingSenderId:"1012826517121",
appId:"1:1012826517121:web:abaf58ebce7f15cfc86780"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const body=document.getElementById("leaderboardBody");

onAuthStateChanged(auth, async(user)=>{

const snapshot=await getDocs(collection(db,"users"));

let players=[];

snapshot.forEach(doc=>{

const data=doc.data();

players.push({
id:doc.id,
name:data.username ? data.username : "unknown"
role:data.role || "User",
xp:data.xp || 0
});

});

players.sort((a,b)=>b.xp-a.xp);

/* PODIUM */

if(players[0]){
goldName.textContent=players[0].name;
goldXP.textContent=players[0].xp+" XP";
}

if(players[1]){
silverName.textContent=players[1].name;
silverXP.textContent=players[1].xp+" XP";
}

if(players[2]){
bronzeName.textContent=players[2].name;
bronzeXP.textContent=players[2].xp+" XP";
}

/* TABLE */

players.forEach((p,i)=>{

const tr=document.createElement("tr");

if(user && user.uid===p.id){
tr.classList.add("me");
}

tr.innerHTML=`
<td class="${i<3?'top-glow':''}">#${i+1}</td>
<td>${p.name}</td>
<td>${p.role}</td>
<td>${p.xp}</td>
<td>
<div class="xp-bar-bg">
<div class="xp-bar" style="width:${Math.min(p.xp/10,100)}%"></div>
</div>
</td>
`;

body.appendChild(tr);

});

});

</script>

</body>
</html>
