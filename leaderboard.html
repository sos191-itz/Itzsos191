<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Itzsos Labs</title>

<style>
body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:radial-gradient(circle at top,#0b0f1a,#05070d);
  color:#00ffdd;
  overflow-x:hidden;
}

/* NAV */
nav{
  background:#111422;
  border-bottom:1px solid #00ffdd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  box-shadow:0 0 15px rgba(0,255,221,0.2);
}
nav h2{ color:#ff6600; }
nav button{
  background:#ff6600;
  border:none;
  padding:8px 15px;
  font-weight:bold;
  cursor:pointer;
}

/* HEADER */
h2.center{
  text-align:center;
  color:#ff6600;
  margin:30px 0;
  text-shadow:0 0 15px #ff6600;
}

/* PODIUM */
.podium{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:25px;
  margin-bottom:50px;
}

.podium-card{
  width:180px;
  text-align:center;
  border-radius:15px;
  padding:15px;
  color:black;
  font-weight:bold;
  position:relative;
  transition:0.3s;
  animation:float 3s infinite ease-in-out;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* TOP 3 */
.gold{
  background:linear-gradient(45deg,#ffd700,#ffae00);
  height:200px;
  box-shadow:0 0 30px gold;
  transform:scale(1.1);
}
.gold::before{
  content:"👑";
  position:absolute;
  top:-25px;
  font-size:2rem;
}

.silver{
  background:linear-gradient(45deg,#cfcfcf,#9e9e9e);
  height:160px;
}
.bronze{
  background:linear-gradient(45deg,#cd7f32,#a35a18);
  height:140px;
}

/* TABLE */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#111422;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
}

th{
  background:#1a1f35;
}

tr{
  border-bottom:1px solid #222;
  transition:0.2s;
}

tr:hover{
  background:#151a2c;
  transform:scale(1.01);
}

/* CURRENT USER */
.me{
  background:#1b2a33 !important;
  border-left:5px solid #00ffdd;
}

/* XP BAR */
.xp-bar-bg{
  background:#222;
  height:10px;
  border-radius:10px;
  overflow:hidden;
}
.xp-bar{
  height:10px;
  background:linear-gradient(90deg,#00ffdd,#00aa88);
  width:0%;
  animation:grow 1s ease forwards;
}
@keyframes grow{
  from{width:0}
}

/* RANK GLOW */
.top-glow{
  text-shadow:0 0 10px #00ffdd;
}

/* ROLE COLORS */
.role{
  font-weight:bold;
}
.elite{ color:#ff00ff; }
.pro{ color:#00ff99; }
.noob{ color:#888; }

/* LOADING */
.loading{
  text-align:center;
  padding:40px;
  font-size:1.2rem;
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{opacity:0.4}
  50%{opacity:1}
  100%{opacity:0.4}
}
</style>
</head>

<body>

<nav>
  <h2>Itzsos Labs Leaderboard</h2>
  <button onclick="location.href='stages.html'">Back</button>
</nav>

<h2 class="center">🏆 Global Hacker Leaderboard</h2>

<div class="container">

<div id="loading" class="loading">Loading hackers...</div>

<!-- PODIUM -->
<div class="podium">
  <div id="second" class="podium-card silver">
    🥈
    <div id="silverName"></div>
    <div id="silverXP"></div>
  </div>

  <div id="first" class="podium-card gold">
    🥇
    <div id="goldName"></div>
    <div id="goldXP"></div>
  </div>

  <div id="third" class="podium-card bronze">
    🥉
    <div id="bronzeName"></div>
    <div id="bronzeXP"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Rank</th>
<th>User</th>
<th>Tier</th>
<th>XP</th>
<th>Progress</th>
</tr>
</thead>
<tbody id="leaderboardBody"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore,collection,getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"itzsos-labs.firebaseapp.com",
  projectId:"itzsos-labs"
});

const auth = getAuth(app);
const db = getFirestore(app);

const body = document.getElementById("leaderboardBody");
const loading = document.getElementById("loading");

function getRole(xp){
  if(xp > 1000) return ["Elite Hacker","elite"];
  if(xp > 500) return ["Pro Hacker","pro"];
  return ["Newbie","noob"];
}

onAuthStateChanged(auth, async(user)=>{

  const snapshot = await getDocs(collection(db,"users"));
  const players=[];

  snapshot.forEach(doc=>{
    const d = doc.data();
    players.push({
      id: doc.id,
      name: d.username || "Unknown",
      xp: d.xp || 0
    });
  });

  players.sort((a,b)=>b.xp-a.xp);

  loading.style.display="none";

  // Podium
  if(players[0]){
    goldName.textContent = players[0].name;
    goldXP.textContent = players[0].xp+" XP";
  }
  if(players[1]){
    silverName.textContent = players[1].name;
    silverXP.textContent = players[1].xp+" XP";
  }
  if(players[2]){
    bronzeName.textContent = players[2].name;
    bronzeXP.textContent = players[2].xp+" XP";
  }

  const maxXP = Math.max(...players.map(p=>p.xp),100);

  players.forEach((p,i)=>{
    const tr=document.createElement("tr");
    if(user && user.uid===p.id) tr.classList.add("me");

    const [role,cls] = getRole(p.xp);
    const width = (p.xp/maxXP)*100;

    tr.innerHTML=`
      <td class="${i<3?'top-glow':''}">#${i+1}</td>
      <td>${p.name}</td>
      <td class="role ${cls}">${role}</td>
      <td>${p.xp}</td>
      <td>
        <div class="xp-bar-bg">
          <div class="xp-bar" style="width:${width}%"></div>
        </div>
      </td>
    `;

    body.appendChild(tr);
  });

});
</script>

</body>
</html>
